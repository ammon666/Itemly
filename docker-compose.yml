# Itemly Docker Compose Configuration
# 轻量化物品管理系统
# 数据目录：/data（挂载到命名卷 itemly_data，容器重建数据不丢失）
#
# 使用说明：
#   1. 默认使用 latest 标签（main 分支的最新构建），无需额外设置：
#        docker compose up -d
#      想指定其他标签（如某个具体提交或版本），可通过环境变量覆盖：
#        IMAGE_TAG=sha-e57f3bc    docker compose up -d
#        IMAGE_TAG=v1.0.0         docker compose up -d
#   2. 可选：通过 DOCKER_PLATFORM 强制指定架构（例如老镜像缺少 arm64 时设为 linux/amd64）
#        DOCKER_PLATFORM=linux/amd64 docker compose up -d
#      留空时由 Docker 自动匹配当前主机架构。
#   3. FLASK_SECRET 为敏感信息，请改为自己的强随机密钥（必须设置，否则每次容器重启或多
#      worker 启动时自动生成临时密钥，会导致所有已有登录会话失效）。
#   4. 若通过 HTTPS 反向代理（如 Nginx）对外提供服务，请设置：
#        SESSION_COOKIE_SECURE=true
#        PROXY_FIX_X_PROTO=1
#      若仍走 HTTP 或局域网直连，保持 SESSION_COOKIE_SECURE=false 即可。
#   5. 想确保永远拉到真正最新的镜像：
#        docker compose pull && docker compose up -d

version: '3.8'

services:
  itemly:
    # 默认使用 latest（main 分支最新构建）；可通过 IMAGE_TAG 环境变量覆盖
    image: ghcr.io/ammon666/itemly:${IMAGE_TAG:-latest}
    # 通过 DOCKER_PLATFORM 指定架构；留空由 Docker 自动匹配当前主机架构
    platform: ${DOCKER_PLATFORM:-}
    container_name: itemly
    restart: unless-stopped
    ports:
      - "9009:9009"
    environment:
      # 会话密钥：生产环境必须改为此处的占位符以外的强随机值；
      # 可使用 python -c "import secrets;print(secrets.token_hex(32))" 生成。
      - FLASK_SECRET=itemly-production-secret-key-change-me
      - FLASK_DEBUG=false
      - PORT=9009
      - ITEMLY_DB_PATH=/data/itemly.db
      - ITEMLY_UPLOAD_DIR=/data/uploads
      # Session Cookie 行为；HTTPS 部署请把 SESSION_COOKIE_SECURE 改为 true
      - SESSION_COOKIE_SECURE=${SESSION_COOKIE_SECURE:-false}
      - SESSION_COOKIE_SAMESITE=${SESSION_COOKIE_SAMESITE:-Lax}
      # 反向代理信任深度（Nginx 一层反代默认值即可；无需修改）
      - PROXY_FIX_X_FOR=${PROXY_FIX_X_FOR:-1}
      - PROXY_FIX_X_PROTO=${PROXY_FIX_X_PROTO:-1}
      - PROXY_FIX_X_HOST=${PROXY_FIX_X_HOST:-1}
      # 可选：若前端通过不同域名/端口访问后端（跨域部署），请在此声明允许的 origins，
      # 多个用英文逗号分隔；同源部署留空即可。
      # - CORS_ORIGINS=https://itemly.example.com
    # 仅挂载数据卷；代码完全来自镜像，镜像更新即生效
    volumes:
      - itemly_data:/data
    networks:
      - itemly_network

volumes:
  itemly_data:
    driver: local

networks:
  itemly_network:
    driver: bridge
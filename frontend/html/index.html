<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="Itemly - 轻量化物品管理系统">
    <meta name="theme-color" content="#0d6efd">
    <title>Itemly - 物品管理</title>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        :root {
            --primary-color: #0d6efd;
            --success-color: #198754;
            --warning-color: #ffc107;
            --danger-color: #dc3545;
            --bg-color: #f8f9fa;
            --card-shadow: 0 0.125rem 0.25rem rgba(0, 0, 0, 0.075);
            --transition-speed: 0.2s;
        }

        * { -webkit-tap-highlight-color: transparent; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-color);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* 登录页面 */
        .login-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .login-card {
            width: 100%;
            max-width: 400px;
            margin: 1rem;
            padding: 2rem;
            background: white;
            border-radius: 1rem;
            box-shadow: 0 1rem 3rem rgba(0, 0, 0, 0.2);
        }
        .login-logo { text-align: center; margin-bottom: 2rem; }
        .login-logo i { font-size: 4rem; color: var(--primary-color); }
        .login-logo h1 { font-size: 2rem; font-weight: 700; color: #333; margin-top: 0.5rem; }

        /* 主应用 */
        .app-container { display: none; min-height: 100vh; }
        .app-container.active { display: block; }

        /* 顶部导航 */
        .app-header {
            background: var(--primary-color);
            color: white;
            padding: 1rem;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: var(--card-shadow);
        }
        .app-header .navbar-brand { color: white; font-weight: 700; font-size: 1.5rem; }
        .app-header .nav-link { color: rgba(255, 255, 255, 0.85); transition: color var(--transition-speed); }
        .app-header .nav-link:hover { color: white; }

        /* 侧边栏 */
        @media (min-width: 768px) {
            .app-sidebar {
                position: fixed;
                left: 0;
                top: 56px;
                width: 240px;
                height: calc(100vh - 56px);
                background: white;
                border-right: 1px solid #dee2e6;
                overflow-y: auto;
                padding: 1rem 0;
            }
            .app-main { margin-left: 240px; padding-top: 56px; min-height: 100vh; }
        }
        @media (max-width: 767px) {
            .app-sidebar { display: none; }
            .app-main { padding-top: 56px; padding-bottom: 80px; }
            .offcanvas { width: 280px !important; }
        }

        .sidebar-menu { list-style: none; padding: 0; margin: 0; }
        .sidebar-menu-item {
            padding: 0.75rem 1rem;
            cursor: pointer;
            transition: all var(--transition-speed);
            border-left: 3px solid transparent;
        }
        .sidebar-menu-item:hover { background: var(--bg-color); }
        .sidebar-menu-item.active {
            background: #e7f1ff;
            border-left-color: var(--primary-color);
            color: var(--primary-color);
        }
        .sidebar-menu-item i { width: 24px; margin-right: 0.5rem; }

        .app-content { padding: 1rem; }

        /* 统计卡片 */
        .stats-card {
            background: white;
            border-radius: 0.5rem;
            padding: 1rem;
            box-shadow: var(--card-shadow);
            text-align: center;
            margin-bottom: 1rem;
        }
        .stats-card .stats-value { font-size: 2rem; font-weight: 700; color: var(--primary-color); }
        .stats-card .stats-label { font-size: 0.875rem; color: #6c757d; }

        /* 物品卡片网格 */
        .items-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 1rem;
            padding: 0.5rem;
        }
        @media (min-width: 576px) { .items-grid { grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); } }

        .item-card {
            background: white;
            border-radius: 0.5rem;
            overflow: hidden;
            box-shadow: var(--card-shadow);
            transition: transform var(--transition-speed), box-shadow var(--transition-speed);
            cursor: pointer;
        }
        .item-card:hover { transform: translateY(-2px); box-shadow: 0 0.5rem 1rem rgba(0, 0, 0, 0.1); }
        .item-card-img { width: 100%; aspect-ratio: 1; object-fit: cover; background: #e9ecef; }
        .item-card-body { padding: 0.75rem; }
        .item-card-title { font-size: 0.875rem; font-weight: 600; margin-bottom: 0.25rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .item-card-category { font-size: 0.75rem; color: #6c757d; }
        .item-card-attrs { display: flex; flex-wrap: wrap; gap: 0.25rem; margin-top: 0.5rem; }
        .item-attr { font-size: 0.625rem; padding: 0.125rem 0.375rem; background: #e9ecef; border-radius: 0.25rem; color: #495057; }

        /* 悬浮添加按钮 */
        .fab-button {
            position: fixed;
            bottom: 6rem;
            right: 1rem;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: var(--primary-color);
            color: white;
            border: none;
            box-shadow: 0 0.5rem 1rem rgba(13, 110, 253, 0.4);
            font-size: 1.5rem;
            z-index: 999;
            transition: transform var(--transition-speed);
        }
        .fab-button:hover { transform: scale(1.1); color: white; }
        @media (min-width: 768px) { .fab-button { bottom: 2rem; right: 2rem; } }

        /* 模态框 */
        .modal-header { border-bottom: none; padding-bottom: 0; }
        .modal-footer { border-top: none; padding-top: 0; }

        /* 表单 */
        .form-label { font-weight: 500; color: #495057; }
        .form-control:focus, .form-select:focus { border-color: var(--primary-color); box-shadow: 0 0 0 0.25rem rgba(13, 110, 253, 0.15); }

        /* 图片上传 */
        .image-upload-zone {
            border: 2px dashed #dee2e6;
            border-radius: 0.5rem;
            padding: 2rem;
            text-align: center;
            cursor: pointer;
            transition: all var(--transition-speed);
            background: #f8f9fa;
        }
        .image-upload-zone:hover { border-color: var(--primary-color); background: #e7f1ff; }
        .image-upload-zone.has-image { padding: 0; border-style: solid; }
        .image-upload-zone img { max-width: 100%; max-height: 300px; border-radius: 0.5rem; }

        /* 树形选择器 */
        .tree-selector {
            max-height: 300px;
            overflow-y: auto;
            border: 1px solid #dee2e6;
            border-radius: 0.5rem;
            padding: 0.5rem;
        }
        .tree-item { padding: 0.25rem 0.5rem; cursor: pointer; border-radius: 0.25rem; }
        .tree-item:hover { background: var(--bg-color); }
        .tree-item.selected { background: #e7f1ff; color: var(--primary-color); }
        .tree-children { padding-left: 1.5rem; }
        .tree-item-expand { cursor: pointer; width: 20px; display: inline-block; }

        /* 属性选择器（多选） */
        .attr-selector {
            max-height: 400px;
            overflow-y: auto;
            border: 1px solid #dee2e6;
            border-radius: 0.5rem;
            padding: 0.5rem;
        }
        .attr-group { margin-bottom: 0.5rem; }
        .attr-group-header { font-weight: 600; padding: 0.5rem; background: #f8f9fa; border-radius: 0.25rem; cursor: pointer; }
        .attr-group-header.required { color: var(--danger-color); }
        .attr-group-items { padding-left: 1rem; display: none; }
        .attr-group-items.show { display: block; }
        .attr-item { padding: 0.25rem 0.5rem; cursor: pointer; border-radius: 0.25rem; margin: 0.25rem 0; }
        .attr-item:hover { background: var(--bg-color); }
        .attr-item.selected { background: var(--primary-color); color: white; }
        .attr-item.disabled { opacity: 0.5; cursor: not-allowed; }

        /* 空状态 */
        .empty-state { text-align: center; padding: 3rem 1rem; color: #6c757d; }
        .empty-state i { font-size: 4rem; margin-bottom: 1rem; opacity: 0.5; }

        /* 加载状态 */
        .loading-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(255, 255, 255, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }

        /* Toast */
        .toast-container { position: fixed; top: 70px; right: 1rem; z-index: 9999; }

        /* 后台管理卡片 */
        .admin-card { background: white; border-radius: 0.5rem; box-shadow: var(--card-shadow); padding: 1rem; margin-bottom: 1rem; }
        .admin-card-title { font-size: 1rem; font-weight: 600; margin-bottom: 1rem; padding-bottom: 0.5rem; border-bottom: 1px solid #dee2e6; }

        /* 页面标题 */
        .page-title { font-size: 1.25rem; font-weight: 600; margin-bottom: 1rem; display: flex; align-items: center; justify-content: space-between; }

        /* 动画 */
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .fade-in { animation: fadeIn 0.3s ease-out; }
    </style>
</head>
<body>
    <!-- 登录页面 -->
    <div id="loginPage" class="login-page">
        <div class="login-card">
            <div class="login-logo">
                <i class="bi bi-box-seam"></i>
                <h1>Itemly</h1>
            </div>
            <form id="loginForm">
                <div class="mb-3">
                    <label for="username" class="form-label">用户名</label>
                    <input type="text" class="form-control" id="username" placeholder="请输入用户名" required>
                </div>
                <div class="mb-3">
                    <label for="password" class="form-label">密码</label>
                    <input type="password" class="form-control" id="password" placeholder="请输入密码" required>
                </div>
                <button type="submit" class="btn btn-primary w-100">登 录</button>
            </form>
            <div class="mt-3 text-center text-muted"><small>默认账号: admin / admin123</small></div>
        </div>
    </div>

    <!-- 主应用 -->
    <div id="appContainer" class="app-container">
        <!-- 顶部导航 -->
        <nav class="app-header navbar">
            <div class="container-fluid">
                <a class="navbar-brand" href="#"><i class="bi bi-box-seam"></i> Itemly</a>
                <div class="d-flex align-items-center">
                    <button class="btn btn-link nav-link" onclick="showStatsModal()"><i class="bi bi-pie-chart"></i></button>
                    <button class="btn btn-link nav-link" onclick="logout()"><i class="bi bi-box-arrow-right"></i></button>
                </div>
            </div>
        </nav>

        <!-- 侧边栏 -->
        <nav class="app-sidebar">
            <ul class="sidebar-menu">
                <li class="sidebar-menu-item active" data-page="home" onclick="navigateTo('home')"><i class="bi bi-house"></i> 首页</li>
                <li class="sidebar-menu-item" data-page="items" onclick="navigateTo('items')"><i class="bi bi-box"></i> 物品管理</li>
                <li class="sidebar-menu-item" data-page="categories" onclick="navigateTo('categories')"><i class="bi bi-folder"></i> 类别管理</li>
                <li class="sidebar-menu-item" data-page="attributes" onclick="navigateTo('attributes')"><i class="bi bi-sliders"></i> 属性管理</li>
                <li class="sidebar-menu-item" data-page="settings" onclick="navigateTo('settings')"><i class="bi bi-gear"></i> 设置</li>
            </ul>
        </nav>

        <!-- 主内容区 -->
        <main class="app-main">
            <!-- 首页 -->
            <div id="pageHome" class="app-content page">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h5 class="mb-0">物品列表</h5>
                    <button class="btn btn-outline-secondary btn-sm" data-bs-toggle="offcanvas" href="#filterOffcanvas"><i class="bi bi-funnel"></i> 筛选</button>
                </div>
                <div class="input-group mb-3">
                    <input type="text" class="form-control" id="searchInput" placeholder="搜索物品...">
                    <button class="btn btn-primary" onclick="searchItems()"><i class="bi bi-search"></i></button>
                </div>
                <div id="itemsGrid" class="items-grid"></div>
                <div id="emptyState" class="empty-state" style="display: none;">
                    <i class="bi bi-box"></i>
                    <h5>暂无物品</h5>
                    <p>点击下方按钮添加第一个物品</p>
                </div>
            </div>

            <!-- 物品管理页面 -->
            <div id="pageItems" class="app-content page" style="display: none;">
                <div class="page-title"><span>物品管理</span></div>
                <div id="itemsManagementList"></div>
            </div>

            <!-- 类别管理页面 -->
            <div id="pageCategories" class="app-content page" style="display: none;">
                <div class="page-title">
                    <span>类别管理</span>
                    <button class="btn btn-primary btn-sm" onclick="showCategoryModal()"><i class="bi bi-plus"></i> 添加类别</button>
                </div>
                <div id="categoryList"></div>
            </div>

            <!-- 属性管理页面 -->
            <div id="pageAttributes" class="app-content page" style="display: none;">
                <div class="page-title">
                    <span>属性管理</span>
                    <button class="btn btn-primary btn-sm" onclick="showAttributeModal()"><i class="bi bi-plus"></i> 添加属性</button>
                </div>
                <div class="admin-card">
                    <div id="attributeTree" class="tree-selector"></div>
                </div>
            </div>

            <!-- 设置页面 -->
            <div id="pageSettings" class="app-content page" style="display: none;">
                <div class="page-title"><span>设置</span></div>
                <div class="admin-card">
                    <div class="admin-card-title">修改密码</div>
                    <form id="passwordForm">
                        <div class="mb-3">
                            <label class="form-label">新密码</label>
                            <input type="password" class="form-control" name="new_password" required minlength="6">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">确认新密码</label>
                            <input type="password" class="form-control" name="confirm_password" required minlength="6">
                        </div>
                        <button type="submit" class="btn btn-primary">保存</button>
                    </form>
                </div>
                <div class="admin-card">
                    <div class="admin-card-title">个人信息</div>
                    <form id="profileForm">
                        <div class="mb-3">
                            <label class="form-label">显示名称</label>
                            <input type="text" class="form-control" name="display_name" required>
                        </div>
                        <button type="submit" class="btn btn-primary">保存</button>
                    </form>
                </div>
            </div>
        </main>

        <!-- 悬浮添加按钮 -->
        <button class="fab-button" onclick="showAddItemModal()"><i class="bi bi-plus"></i></button>
    </div>

    <!-- 筛选侧边栏 -->
    <div class="offcanvas offcanvas-end" tabindex="-1" id="filterOffcanvas">
        <div class="offcanvas-header">
            <h5 class="offcanvas-title">筛选</h5>
            <button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>
        </div>
        <div class="offcanvas-body">
            <div class="mb-3">
                <label class="form-label">类别</label>
                <div id="filterCategories" class="tree-selector"></div>
            </div>
            <button class="btn btn-primary w-100 mb-2" onclick="applyFilters()">应用筛选</button>
            <button class="btn btn-outline-secondary w-100" onclick="clearFilters()">清空筛选</button>
        </div>
    </div>

    <!-- 添加/编辑物品模态框 -->
    <div class="modal fade" id="itemModal" tabindex="-1">
        <div class="modal-dialog modal-lg modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="itemModalTitle">添加物品</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <form id="itemForm">
                    <div class="modal-body">
                        <!-- 选择模板 -->
                        <div class="mb-3">
                            <label class="form-label">选择类别模板 <span class="text-danger">*</span></label>
                            <select class="form-select" id="templateSelect" required onchange="loadTemplateAttributes()">
                                <option value="">请选择类别</option>
                            </select>
                        </div>

                        <!-- 图片上传 -->
                        <div class="mb-3">
                            <label class="form-label">图片 <span class="text-danger">*</span></label>
                            <div id="imageUploadZone" class="image-upload-zone" onclick="document.getElementById('imageInput').click()">
                                <i class="bi bi-cloud-arrow-up" style="font-size: 3rem; color: #6c757d;"></i>
                                <p class="text-muted mb-0">点击上传图片</p>
                            </div>
                            <input type="file" id="imageInput" accept="image/*" style="display: none;" onchange="handleImageSelect(event)">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">名称 <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" name="name" required>
                        </div>

                        <!-- 属性选择区域 -->
                        <div class="mb-3">
                            <label class="form-label">属性配置</label>
                            <div id="attributeSelector" class="attr-selector">
                                <p class="text-muted">请先选择类别模板</p>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">备注</label>
                            <textarea class="form-control" name="remark" rows="2"></textarea>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                        <button type="button" class="btn btn-outline-primary" onclick="saveItemAndContinue()">保存并继续添加</button>
                        <button type="submit" class="btn btn-primary">保存</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- 物品详情模态框 -->
    <div class="modal fade" id="itemDetailModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="itemDetailTitle">物品详情</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="itemDetailBody"></div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-outline-danger me-auto" onclick="deleteCurrentItem()"><i class="bi bi-trash"></i> 删除</button>
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">关闭</button>
                    <button type="button" class="btn btn-primary" onclick="editCurrentItem()"><i class="bi bi-pencil"></i> 编辑</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 类别模态框 -->
    <div class="modal fade" id="categoryModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="categoryModalTitle">添加类别</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <form id="categoryForm">
                    <div class="modal-body">
                        <input type="hidden" name="id">
                        <div class="mb-3">
                            <label class="form-label">类别名称</label>
                            <input type="text" class="form-control" name="name" required>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                        <button type="submit" class="btn btn-primary">保存</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- 模板配置模态框 -->
    <div class="modal fade" id="templateModal" tabindex="-1">
        <div class="modal-dialog modal-lg modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">配置模板属性</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="templateCategoryId">
                    <div class="mb-3">
                        <label class="form-label">模板名称</label>
                        <input type="text" class="form-control" id="templateNameInput">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">选择属性字段（勾选是否必填）</label>
                        <div id="templateAttributeSelector" class="attr-selector"></div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="button" class="btn btn-primary" onclick="saveTemplateConfig()">保存配置</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 属性模态框 -->
    <div class="modal fade" id="attributeModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="attributeModalTitle">添加属性</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <form id="attributeForm">
                    <div class="modal-body">
                        <input type="hidden" name="id">
                        <div class="mb-3">
                            <label class="form-label">属性名称</label>
                            <input type="text" class="form-control" name="name" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">上级属性</label>
                            <select class="form-select" name="parent_id" id="attributeParentSelect">
                                <option value="">无（顶级属性）</option>
                            </select>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                        <button type="submit" class="btn btn-primary">保存</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- 统计模态框 -->
    <div class="modal fade" id="statsModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">统计信息</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="statsModalBody"></div>
            </div>
        </div>
    </div>

    <!-- Toast 容器 -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- 加载遮罩 -->
    <div id="loadingOverlay" class="loading-overlay" style="display: none;">
        <div class="spinner-border text-primary" role="status"><span class="visually-hidden">加载中...</span></div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- 图片压缩库 -->
    <script src="https://cdn.jsdelivr.net/npm/browser-image-compression@2.0.2/dist/browser-image-compression.js"></script>

    <script>
        const API_BASE = '/api';
        let currentUser = null;
        let categories = [];
        let attributes = [];
        let items = [];
        let currentItemId = null;
        let currentCategoryFilter = null;
        let currentTemplateId = null;
        let currentItemImages = [];
        let keepAdding = false;

        // API工具
        async function api(endpoint, options = {}) {
            try {
                const config = { headers: { 'Content-Type': 'application/json' }, credentials: 'include', ...options };
                if (config.body && typeof config.body === 'object') config.body = JSON.stringify(config.body);
                const response = await fetch(API_BASE + endpoint, config);
                let data;
                try {
                    data = await response.json();
                } catch (e) {
                    return { success: false, message: '服务器返回数据格式错误' };
                }
                if (!response.ok && response.status === 401) showLogin();
                return data;
            } catch (error) {
                console.error('API请求失败:', endpoint, error);
                return { success: false, message: '网络请求失败，请检查服务器连接' };
            }
        }

        function showToast(message, type = 'info') {
            const container = document.getElementById('toastContainer');
            const bgClass = { success: 'bg-success', error: 'bg-danger', warning: 'bg-warning', info: 'bg-info' }[type] || 'bg-info';
            container.innerHTML = `<div class="toast" role="alert"><div class="toast-body text-white ${bgClass}">${message}</div></div>`;
            new bootstrap.Toast(container.querySelector('.toast'), { delay: 3000 }).show();
        }

        function showLoading() { document.getElementById('loadingOverlay').style.display = 'flex'; }
        function hideLoading() { document.getElementById('loadingOverlay').style.display = 'none'; }

        // 认证
        async function checkAuth() {
            try {
                const result = await api('/auth/check');
                if (result.authenticated) { currentUser = result.data; showApp(); loadAllData(); }
                else showLogin();
            } catch (error) {
                console.error('检查登录状态失败:', error);
                showLogin();
            }
        }

        function showLogin() { document.getElementById('loginPage').style.display = 'flex'; document.getElementById('appContainer').classList.remove('active'); }
        function showApp() { document.getElementById('loginPage').style.display = 'none'; document.getElementById('appContainer').classList.add('active'); }

        async function login(e) {
            e.preventDefault();
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            showLoading();
            const result = await api('/auth/login', { method: 'POST', body: { username, password } });
            hideLoading();
            if (result.success) { currentUser = result.data; showApp(); loadAllData(); document.getElementById('loginForm').reset(); }
            else showToast(result.message, 'error');
        }

        async function logout() { await api('/auth/logout', { method: 'POST' }); currentUser = null; showLogin(); }

        // 数据加载
        async function loadAllData() {
            showLoading();
            try {
                await Promise.all([loadCategories(), loadAttributes(), loadItems()]);
            } catch (error) {
                console.error('加载数据失败:', error);
                showToast('部分数据加载失败，请刷新页面', 'warning');
            } finally {
                hideLoading();
            }
        }

        async function loadCategories() {
            try {
                const result = await api('/categories');
                if (result.success) { categories = result.data || []; renderCategorySelectors(); }
                else categories = [];
            } catch (error) {
                console.error('加载类别失败:', error);
                categories = [];
            }
        }

        async function loadAttributes() {
            try {
                const result = await api('/attributes?flat=true');
                if (result.success) { attributes = result.data || []; renderAttributeSelectors(); }
                else attributes = [];
            } catch (error) {
                console.error('加载属性失败:', error);
                attributes = [];
            }
        }

        async function loadItems() {
            try {
                const params = new URLSearchParams();
                if (currentCategoryFilter) params.append('category_id', currentCategoryFilter);
                const result = await api('/items?' + params.toString());
                if (result.success) { items = result.data || []; renderItems(); }
                else items = [];
            } catch (error) {
                console.error('加载物品失败:', error);
                items = [];
            }
        }

        // 渲染函数
        function renderCategorySelectors() {
            document.getElementById('templateSelect').innerHTML = '<option value="">请选择类别</option>' +
                categories.map(c => `<option value="${c.template_id}" data-category-id="${c.id}">${c.name}</option>`).join('');

            document.getElementById('filterCategories').innerHTML = categories.map(c =>
                `<div class="tree-item ${currentCategoryFilter == c.id ? 'selected' : ''}" onclick="toggleCategoryFilter(${c.id})">${c.name}</div>`
            ).join('');
        }

        function renderAttributeSelectors() {
            const attrOptions = attributes.map(a =>
                `<option value="${a.id}">${a.display_name}</option>`
            ).join('');
            document.getElementById('attributeParentSelect').innerHTML = '<option value="">无（顶级属性）</option>' + attrOptions;
        }

        function renderItems() {
            const grid = document.getElementById('itemsGrid');
            const empty = document.getElementById('emptyState');
            if (items.length === 0) { grid.innerHTML = ''; empty.style.display = 'block'; return; }
            empty.style.display = 'none';
            grid.innerHTML = items.map(item => `
                <div class="item-card fade-in" onclick="showItemDetail(${item.id})">
                    <img src="/uploads/${item.images}" class="item-card-img" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect fill=%22%23e9ecef%22 width=%22100%22 height=%22100%22/><text x=%2250%22 y=%2255%22 text-anchor=%22middle%22 fill=%22%236c757d%22 font-size=%2212%22>无图片</text></svg>'" alt="${item.name}">
                    <div class="item-card-body">
                        <div class="item-card-title">${item.name}</div>
                        <div class="item-card-category">${item.category_name || '未分类'}</div>
                        ${item.attributes && item.attributes.length ? `<div class="item-card-attrs">${item.attributes.slice(0, 3).map(a => `<span class="item-attr">${a.attribute_name}</span>`).join('')}</div>` : ''}
                    </div>
                </div>
            `).join('');
        }

        function renderCategoryList() {
            const list = document.getElementById('categoryList');
            if (categories.length === 0) { list.innerHTML = '<div class="empty-state"><i class="bi bi-folder"></i><p>暂无类别</p></div>'; return; }
            list.innerHTML = categories.map(c => `
                <div class="admin-card fade-in">
                    <div class="d-flex justify-content-between align-items-center">
                        <div><strong>${c.name}</strong><span class="text-muted ms-2">模板: ${c.template_name || '未配置'}</span></div>
                        <div>
                            <button class="btn btn-sm btn-outline-primary me-1" onclick="showTemplateConfigModal(${c.id})"><i class="bi bi-sliders"></i> 配置</button>
                            <button class="btn btn-sm btn-outline-primary me-1" onclick="showCategoryModal(${c.id})"><i class="bi bi-pencil"></i></button>
                            <button class="btn btn-sm btn-outline-danger" onclick="deleteCategory(${c.id})"><i class="bi bi-trash"></i></button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function renderAttributeTree() {
            const tree = document.getElementById('attributeTree');
            const attrTree = buildTree(attributes);
            if (attrTree.length === 0) { tree.innerHTML = '<div class="empty-state"><i class="bi bi-sliders"></i><p>暂无属性</p></div>'; return; }
            tree.innerHTML = renderTreeNodes(attrTree, 'handleAttributeAction');
        }

        function buildTree(flatList) {
            const map = {};
            const roots = [];
            flatList.forEach(a => { map[a.id] = { ...a, children: [] }; });
            flatList.forEach(a => { if (a.parent_id && map[a.parent_id]) map[a.parent_id].children.push(map[a.id]); else roots.push(map[a.id]); });
            return roots;
        }

        function renderTreeNodes(nodes, actionHandler) {
            return nodes.map(n => `
                <div class="tree-item-wrapper">
                    <div class="d-flex justify-content-between align-items-center tree-item">
                        <span>${n.children.length ? '<i class="bi bi-caret-right-fill tree-item-expand" onclick="toggleTreeExpand(this)"></i>' : ''}${n.name}</span>
                        <div>
                            <button class="btn btn-sm btn-outline-primary" onclick="${actionHandler}(${n.id}, 'edit')"><i class="bi bi-pencil"></i></button>
                            <button class="btn btn-sm btn-outline-danger" onclick="${actionHandler}(${n.id}, 'delete')"><i class="bi bi-trash"></i></button>
                            <button class="btn btn-sm btn-outline-success" onclick="${actionHandler}(${n.id}, 'add')"><i class="bi bi-plus"></i></button>
                        </div>
                    </div>
                    ${n.children.length ? `<div class="tree-children" style="display:none;">${renderTreeNodes(n.children, actionHandler)}</div>` : ''}
                </div>
            `).join('');
        }

        function toggleTreeExpand(el) {
            const children = el.closest('.tree-item-wrapper').querySelector('.tree-children');
            if (children) { children.style.display = children.style.display === 'none' ? 'block' : 'none'; el.classList.toggle('bi-caret-right-fill'); el.classList.toggle('bi-caret-down-fill'); }
        }

        // 导航
        function navigateTo(page) {
            document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
            document.querySelectorAll('.sidebar-menu-item').forEach(m => m.classList.remove('active'));
            const pageEl = document.getElementById('page' + page.charAt(0).toUpperCase() + page.slice(1));
            if (pageEl) pageEl.style.display = 'block';
            const menuItem = document.querySelector(`.sidebar-menu-item[data-page="${page}"]`);
            if (menuItem) menuItem.classList.add('active');
            if (page === 'categories') renderCategoryList();
            else if (page === 'attributes') renderAttributeTree();
            else if (page === 'items') renderItemsManagement();
        }

        // 物品操作
        function showAddItemModal() {
            currentItemId = null; currentItemImages = []; currentTemplateId = null; keepAdding = false;
            document.getElementById('itemModalTitle').textContent = '添加物品';
            document.getElementById('itemForm').reset();
            document.getElementById('imageUploadZone').innerHTML = '<i class="bi bi-cloud-arrow-up" style="font-size: 3rem; color: #6c757d;"></i><p class="text-muted mb-0">点击上传图片</p>';
            document.getElementById('imageUploadZone').classList.remove('has-image');
            document.getElementById('templateSelect').value = '';
            document.getElementById('attributeSelector').innerHTML = '<p class="text-muted">请先选择类别模板</p>';
            new bootstrap.Modal(document.getElementById('itemModal')).show();
        }

        async function loadTemplateAttributes() {
            const templateId = document.getElementById('templateSelect').value;
            if (!templateId) { document.getElementById('attributeSelector').innerHTML = '<p class="text-muted">请先选择类别模板</p>'; return; }
            currentTemplateId = templateId;
            showLoading();
            const categoryOption = document.getElementById('templateSelect').selectedOptions[0];
            const categoryId = categoryOption.dataset.categoryId;
            const result = await api(`/categories/${categoryId}/template`);
            hideLoading();
            if (result.success && result.data.attributes) {
                renderAttributeSelectorForItem(result.data.attributes);
            } else {
                document.getElementById('attributeSelector').innerHTML = '<p class="text-muted">该模板暂无属性配置</p>';
            }
        }

        function renderAttributeSelectorForItem(templateAttrs) {
            const container = document.getElementById('attributeSelector');
            if (!templateAttrs.length) { container.innerHTML = '<p class="text-muted">该模板暂无属性配置</p>'; return; }
            const attrTree = buildTree(attributes);
            container.innerHTML = templateAttrs.map(ta => {
                const attr = attributes.find(a => a.id === ta.attribute_id);
                if (!attr) return '';
                const children = getAttributeChildren(attr.id);
                const isRequired = ta.is_required;
                return `
                    <div class="attr-group">
                        <div class="attr-group-header ${isRequired ? 'required' : ''}" onclick="toggleAttrGroup(this)">
                            ${isRequired ? '<i class="bi bi-exclamation-circle text-danger me-1"></i>' : ''}${attr.name}
                            ${isRequired ? '<small class="text-danger ms-2">(必填)</small>' : ''}
                            <i class="bi bi-chevron-down float-end"></i>
                        </div>
                        <div class="attr-group-items">
                            ${children.length ? children.map(c => `<div class="attr-item" data-id="${c.id}" onclick="selectAttrItem(this)">${c.name}</div>`).join('') : `<div class="attr-item" data-id="${attr.id}" onclick="selectAttrItem(this)">${attr.name}</div>`}
                        </div>
                    </div>
                `;
            }).join('');
        }

        function getAttributeChildren(attrId) {
            return attributes.filter(a => a.parent_id === attrId);
        }

        function toggleAttrGroup(el) {
            const items = el.nextElementSibling;
            items.classList.toggle('show');
            el.querySelector('.bi-chevron-down, .bi-chevron-up').classList.toggle('bi-chevron-down');
            el.querySelector('.bi-chevron-down, .bi-chevron-up').classList.toggle('bi-chevron-up');
        }

        function selectAttrItem(el) {
            const group = el.closest('.attr-group');
            group.querySelectorAll('.attr-item').forEach(i => i.classList.remove('selected'));
            el.classList.add('selected');
        }

        async function saveItem(e) {
            e.preventDefault();
            const form = e.target;
            const name = form.querySelector('[name="name"]').value.trim();
            const templateId = document.getElementById('templateSelect').value;
            const remark = form.querySelector('[name="remark"]').value;
            const images = currentItemImages[0] || '';

            if (!templateId) { showToast('请选择类别模板', 'error'); return; }
            if (!images) { showToast('请上传物品图片', 'error'); return; }

            // 获取选中的属性
            const selectedAttrs = [];
            document.querySelectorAll('.attr-item.selected').forEach(el => { selectedAttrs.push(parseInt(el.dataset.id)); });

            showLoading();
            let result;
            if (currentItemId) {
                result = await api(`/items/${currentItemId}`, { method: 'PUT', body: { name, remark, images, attribute_ids: selectedAttrs } });
            } else {
                result = await api('/items', { method: 'POST', body: { name, template_id: parseInt(templateId), remark, images, attribute_ids: selectedAttrs } });
            }
            hideLoading();

            if (result.success) {
                showToast(currentItemId ? '物品更新成功' : '物品创建成功', 'success');
                if (keepAdding) {
                    // 保持模板选择，清空其他字段
                    form.querySelector('[name="name"]').value = '';
                    form.querySelector('[name="remark"]').value = '';
                    currentItemImages = [];
                    document.getElementById('imageUploadZone').innerHTML = '<i class="bi bi-cloud-arrow-up" style="font-size: 3rem; color: #6c757d;"></i><p class="text-muted mb-0">点击上传图片</p>';
                    document.getElementById('imageUploadZone').classList.remove('has-image');
                    document.querySelectorAll('.attr-item.selected').forEach(el => el.classList.remove('selected'));
                    loadItems();
                } else {
                    bootstrap.Modal.getInstance(document.getElementById('itemModal')).hide();
                    loadItems();
                }
            } else showToast(result.message, 'error');
        }

        function saveItemAndContinue() {
            keepAdding = true;
            document.getElementById('itemForm').dispatchEvent(new Event('submit'));
        }

        async function editItem(itemId) {
            const item = items.find(i => i.id === itemId);
            if (!item) return;
            currentItemId = itemId; currentItemImages = item.images ? [item.images] : []; keepAdding = false;
            document.getElementById('itemModalTitle').textContent = '编辑物品';
            document.getElementById('itemForm').reset();
            document.getElementById('itemForm').querySelector('[name="name"]').value = item.name;
            document.getElementById('itemForm').querySelector('[name="remark"]').value = item.remark || '';
            if (item.images) {
                document.getElementById('imageUploadZone').innerHTML = `<img src="/uploads/${item.images}" alt="物品图片">`;
                document.getElementById('imageUploadZone').classList.add('has-image');
            }
            // 设置模板
            document.getElementById('templateSelect').value = item.template_id;
            currentTemplateId = item.template_id;
            await loadTemplateAttributes();
            // 选中已有属性
            if (item.attributes) {
                item.attributes.forEach(a => {
                    const el = document.querySelector(`.attr-item[data-id="${a.attribute_id}"]`);
                    if (el) el.classList.add('selected');
                });
            }
            new bootstrap.Modal(document.getElementById('itemModal')).show();
        }

        function showItemDetail(itemId) {
            const item = items.find(i => i.id === itemId);
            if (!item) return;
            currentItemId = itemId;
            document.getElementById('itemDetailTitle').textContent = item.name;
            document.getElementById('itemDetailBody').innerHTML = `
                <img src="/uploads/${item.images}" class="img-fluid rounded mb-3" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect fill=%22%23e9ecef%22 width=%22100%22 height=%22100%22/><text x=%2250%22 y=%2255%22 text-anchor=%22middle%22 fill=%22%236c757d%22 font-size=%2212%22>无图片</text></svg>'">
                <p><strong>类别：</strong>${item.category_name || '未分类'}</p>
                ${item.attributes && item.attributes.length ? `<p><strong>属性：</strong>${item.attributes.map(a => a.attribute_name).join(', ')}</p>` : ''}
                ${item.remark ? `<p><strong>备注：</strong>${item.remark}</p>` : ''}
                <p class="text-muted small">创建时间：${new Date(item.created_at).toLocaleString()}</p>
            `;
            new bootstrap.Modal(document.getElementById('itemDetailModal')).show();
        }

        function editCurrentItem() {
            bootstrap.Modal.getInstance(document.getElementById('itemDetailModal')).hide();
            editItem(currentItemId);
        }

        async function deleteCurrentItem() {
            if (!confirm('确定要删除这个物品吗？')) return;
            showLoading();
            const result = await api(`/items/${currentItemId}`, { method: 'DELETE' });
            hideLoading();
            if (result.success) { showToast('物品已删除', 'success'); bootstrap.Modal.getInstance(document.getElementById('itemDetailModal')).hide(); loadItems(); }
            else showToast(result.message, 'error');
        }

        // 图片处理
        async function handleImageSelect(event) {
            const file = event.target.files[0];
            if (!file) return;
            try {
                const compressedFile = await imageCompression(file, { maxSizeMB: 1, maxWidthOrHeight: 1024, useWebWorker: true });
                const reader = new FileReader();
                reader.onload = async (e) => {
                    showLoading();
                    const result = await api('/upload', { method: 'POST', body: { image: e.target.result } });
                    hideLoading();
                    if (result.success) {
                        currentItemImages = [result.data.filename];
                        document.getElementById('imageUploadZone').innerHTML = `<img src="/uploads/${result.data.filename}" alt="预览图">`;
                        document.getElementById('imageUploadZone').classList.add('has-image');
                    } else showToast('图片上传失败', 'error');
                };
                reader.readAsDataURL(compressedFile);
            } catch (error) { showToast('图片处理失败', 'error'); }
        }

        // 类别操作
        function showCategoryModal(id = null) {
            const modal = new bootstrap.Modal(document.getElementById('categoryModal'));
            document.getElementById('categoryForm').reset();
            document.getElementById('categoryModalTitle').textContent = id ? '编辑类别' : '添加类别';
            if (id) {
                const cat = categories.find(c => c.id === id);
                if (cat) {
                    document.getElementById('categoryForm').querySelector('[name="id"]').value = id;
                    document.getElementById('categoryForm').querySelector('[name="name"]').value = cat.name;
                }
            }
            modal.show();
        }

        async function saveCategory(e) {
            e.preventDefault();
            const form = e.target;
            const id = form.querySelector('[name="id"]').value;
            const name = form.querySelector('[name="name"]').value.trim();
            showLoading();
            let result;
            if (id) result = await api(`/categories/${id}`, { method: 'PUT', body: { name } });
            else result = await api('/categories', { method: 'POST', body: { name } });
            hideLoading();
            if (result.success) { showToast(id ? '类别更新成功' : '类别创建成功', 'success'); bootstrap.Modal.getInstance(document.getElementById('categoryModal')).hide(); loadCategories(); }
            else showToast(result.message, 'error');
        }

        async function deleteCategory(id) {
            if (!confirm('删除类别将同时删除该类别下的所有物品，确定要删除吗？')) return;
            showLoading();
            const result = await api(`/categories/${id}`, { method: 'DELETE' });
            hideLoading();
            if (result.success) { showToast('类别已删除', 'success'); loadCategories(); }
            else showToast(result.message, 'error');
        }

        // 模板配置
        async function showTemplateConfigModal(categoryId) {
            document.getElementById('templateCategoryId').value = categoryId;
            const cat = categories.find(c => c.id === categoryId);
            if (cat) document.getElementById('templateNameInput').value = cat.template_name || '';
            showLoading();
            const result = await api(`/categories/${categoryId}/template`);
            hideLoading();
            if (result.success) {
                const templateAttrs = result.data.attributes || [];
                renderTemplateAttributeSelector(templateAttrs);
            }
            new bootstrap.Modal(document.getElementById('templateModal')).show();
        }

        function renderTemplateAttributeSelector(templateAttrs) {
            const container = document.getElementById('templateAttributeSelector');
            const attrTree = buildTree(attributes);
            container.innerHTML = `
                <div class="mb-2 text-muted small">选择要添加到模板的属性，并勾选是否必填：</div>
                ${renderTemplateAttrTree(attrTree, templateAttrs)}
            `;
        }

        function renderTemplateAttrTree(nodes, templateAttrs) {
            return nodes.map(n => {
                const ta = templateAttrs.find(t => t.attribute_id === n.id);
                const isSelected = ta !== undefined;
                const isRequired = ta && ta.is_required;
                return `
                    <div class="attr-group">
                        <div class="attr-group-header" onclick="toggleAttrGroup(this)">
                            <input type="checkbox" class="me-2" ${isSelected ? 'checked' : ''} onchange="toggleTemplateAttr(this)" data-id="${n.id}">
                            ${n.name}
                            <label class="ms-2 small"><input type="checkbox" ${isRequired ? 'checked' : ''} data-required-id="${n.id}"> 必填</label>
                            ${n.children.length ? '<i class="bi bi-chevron-down float-end"></i>' : ''}
                        </div>
                        ${n.children.length ? `<div class="attr-group-items">${renderTemplateAttrTree(n.children, templateAttrs)}</div>` : ''}
                    </div>
                `;
            }).join('');
        }

        function toggleTemplateAttr(el) {
            const requiredCheckbox = document.querySelector(`[data-required-id="${el.dataset.id}"]`);
            if (requiredCheckbox) requiredCheckbox.disabled = !el.checked;
        }

        async function saveTemplateConfig() {
            const categoryId = document.getElementById('templateCategoryId').value;
            const templateName = document.getElementById('templateNameInput').value.trim();
            const attrs = [];
            document.querySelectorAll('#templateAttributeSelector input[type="checkbox"]:not([data-required-id])').forEach(el => {
                if (el.checked) {
                    const requiredEl = document.querySelector(`[data-required-id="${el.dataset.id}"]`);
                    attrs.push({ attribute_id: parseInt(el.dataset.id), is_required: requiredEl && requiredEl.checked });
                }
            });
            showLoading();
            const result = await api(`/categories/${categoryId}/template`, { method: 'PUT', body: { template_name: templateName, attributes: attrs } });
            hideLoading();
            if (result.success) { showToast('模板配置保存成功', 'success'); bootstrap.Modal.getInstance(document.getElementById('templateModal')).hide(); loadCategories(); }
            else showToast(result.message, 'error');
        }

        // 属性操作
        function showAttributeModal(id = null, parentId = null) {
            const modal = new bootstrap.Modal(document.getElementById('attributeModal'));
            document.getElementById('attributeForm').reset();
            document.getElementById('attributeModalTitle').textContent = id ? '编辑属性' : '添加属性';
            if (id) {
                const attr = attributes.find(a => a.id === id);
                if (attr) {
                    document.getElementById('attributeForm').querySelector('[name="id"]').value = id;
                    document.getElementById('attributeForm').querySelector('[name="name"]').value = attr.name;
                    document.getElementById('attributeForm').querySelector('[name="parent_id"]').value = attr.parent_id || '';
                }
            } else if (parentId) document.getElementById('attributeForm').querySelector('[name="parent_id"]').value = parentId;
            modal.show();
        }

        async function saveAttribute(e) {
            e.preventDefault();
            const form = e.target;
            const id = form.querySelector('[name="id"]').value;
            const name = form.querySelector('[name="name"]').value.trim();
            const parentId = form.querySelector('[name="parent_id"]').value || null;
            showLoading();
            let result;
            if (id) result = await api(`/attributes/${id}`, { method: 'PUT', body: { name } });
            else result = await api('/attributes', { method: 'POST', body: { name, parent_id: parentId } });
            hideLoading();
            if (result.success) { showToast(id ? '属性更新成功' : '属性创建成功', 'success'); bootstrap.Modal.getInstance(document.getElementById('attributeModal')).hide(); loadAttributes(); }
            else showToast(result.message, 'error');
        }

        function handleAttributeAction(id, action) {
            if (action === 'edit') showAttributeModal(id);
            else if (action === 'delete') deleteAttribute(id);
            else if (action === 'add') showAttributeModal(null, id);
        }

        async function deleteAttribute(id) {
            if (!confirm('确定要删除这个属性吗？')) return;
            showLoading();
            const result = await api(`/attributes/${id}`, { method: 'DELETE' });
            hideLoading();
            if (result.success) { showToast('属性已删除', 'success'); loadAttributes(); }
            else showToast(result.message, 'error');
        }

        // 筛选
        function toggleCategoryFilter(catId) {
            currentCategoryFilter = currentCategoryFilter === catId ? null : catId;
            renderCategorySelectors();
        }

        function applyFilters() {
            bootstrap.Offcanvas.getInstance(document.getElementById('filterOffcanvas')).hide();
            loadItems();
        }

        function clearFilters() {
            currentCategoryFilter = null;
            document.getElementById('searchInput').value = '';
            bootstrap.Offcanvas.getInstance(document.getElementById('filterOffcanvas')).hide();
            loadItems();
        }

        function searchItems() { loadItems(); }

        // 设置
        async function changePassword(e) {
            e.preventDefault();
            const form = e.target;
            const newPwd = form.querySelector('[name="new_password"]').value;
            const confirmPwd = form.querySelector('[name="confirm_password"]').value;
            if (newPwd !== confirmPwd) { showToast('两次输入的密码不一致', 'error'); return; }
            if (newPwd.length < 6) { showToast('密码至少6位', 'error'); return; }
            showLoading();
            const result = await api('/auth/password', { method: 'PUT', body: { new_password: newPwd, confirm_password: confirmPwd } });
            hideLoading();
            if (result.success) { showToast('密码修改成功', 'success'); form.reset(); }
            else showToast(result.message, 'error');
        }

        async function updateProfile(e) {
            e.preventDefault();
            const displayName = e.target.querySelector('[name="display_name"]').value.trim();
            showLoading();
            const result = await api('/auth/profile', { method: 'PUT', body: { display_name: displayName } });
            hideLoading();
            if (result.success) showToast('信息修改成功', 'success');
            else showToast(result.message, 'error');
        }

        // 统计
        async function showStatsModal() {
            showLoading();
            const result = await api('/stats');
            hideLoading();
            if (result.success) {
                const stats = result.data;
                document.getElementById('statsModalBody').innerHTML = `
                    <div class="text-center mb-4"><div class="stats-value">${stats.total_items}</div><div class="stats-label">物品总数</div></div>
                    <div class="row">
                        <div class="col-6"><div class="stats-card"><div class="stats-value">${stats.total_categories}</div><div class="stats-label">类别数</div></div></div>
                        <div class="col-6"><div class="stats-card"><div class="stats-value">${stats.total_attributes}</div><div class="stats-label">属性数</div></div></div>
                    </div>
                    ${stats.category_stats && stats.category_stats.length ? `<h6 class="mt-4 mb-2">分类统计</h6><ul class="list-group">${stats.category_stats.map(c => `<li class="list-group-item d-flex justify-content-between">${c.name}<span class="badge bg-primary rounded-pill">${c.count}</span></li>`).join('')}</ul>` : ''}
                `;
                new bootstrap.Modal(document.getElementById('statsModal')).show();
            }
        }

        // 物品管理页面
        function renderItemsManagement() {
            const list = document.getElementById('itemsManagementList');
            if (items.length === 0) { list.innerHTML = '<div class="empty-state"><i class="bi bi-box"></i><p>暂无物品</p></div>'; return; }
            list.innerHTML = `<div class="admin-card"><table class="table table-hover mb-0"><thead><tr><th>名称</th><th>类别</th><th>属性</th><th>操作</th></tr></thead><tbody>${items.map(item => `<tr><td><img src="/uploads/${item.images}" style="width:40px;height:40px;object-fit:cover;border-radius:4px;" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 40 40%22><rect fill=%22%23e9ecef%22 width=%2240%22 height=%2240%22/></svg>'"><span class="ms-2">${item.name}</span></td><td>${item.category_name || '-'}</td><td>${item.attributes ? item.attributes.map(a => a.attribute_name).join(', ') : '-'}</td><td><button class="btn btn-sm btn-outline-primary" onclick="editItem(${item.id})"><i class="bi bi-pencil"></i></button><button class="btn btn-sm btn-outline-danger ms-1" onclick="confirmDeleteItem(${item.id})"><i class="bi bi-trash"></i></button></td></tr>`).join('')}</tbody></table></div>`;
        }

        async function confirmDeleteItem(itemId) {
            if (!confirm('确定要删除这个物品吗？')) return;
            showLoading();
            const result = await api(`/items/${itemId}`, { method: 'DELETE' });
            hideLoading();
            if (result.success) { showToast('物品已删除', 'success'); loadItems(); }
            else showToast(result.message, 'error');
        }

        // 事件绑定
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('loginForm').addEventListener('submit', login);
            document.getElementById('itemForm').addEventListener('submit', saveItem);
            document.getElementById('categoryForm').addEventListener('submit', saveCategory);
            document.getElementById('attributeForm').addEventListener('submit', saveAttribute);
            document.getElementById('passwordForm').addEventListener('submit', changePassword);
            document.getElementById('profileForm').addEventListener('submit', updateProfile);
            checkAuth();
        });
    </script>
</body>
</html>

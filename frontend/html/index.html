async function saveItem() {
    const name = document.querySelector('#itemForm input[name="name"]').value.trim();
    const remark = document.querySelector('#itemForm textarea[name="remark"]').value.trim();
    if (!name) { showToast('请输入物品名称', 'error'); return false; }
    if (!currentItemImages.length) { showToast('请上传图片', 'error'); return false; }
    const templateId = document.getElementById('templateSelect').value;
    if (!templateId) { showToast('请选择类别', 'error'); return false; }
    
    // 校验属性：每个顶级属性必须选择一个子属性（支持三级及更深层级）
    const attrTree = window.currentAttrTree || [];
    let missingAttrs = [];
    
    for (const topAttr of attrTree) {
        if (topAttr.children && topAttr.children.length > 0) {
            // 检查该顶级属性是否有选中的值
            const topAttrIdStr = String(topAttr.id);
            const selectedValue = selectedAttrValues[topAttrIdStr];
            
            // 如果没有选中任何值，记录缺失
            if (selectedValue === undefined || selectedValue === null) {
                missingAttrs.push(topAttr.name);
            }
        }
    }
    
    if (missingAttrs.length > 0) {
        showToast(`请为以下属性选择值：${missingAttrs.join('、')}`, 'error');
        return false;
    }
    
    // 获取选中的属性值
    const attribute_ids = Object.values(selectedAttrValues);
    
    const body = { name, remark, template_id: templateId, images: currentItemImages[0], attribute_ids };
    let result;
    if (currentItemId) result = await api(`/items/${currentItemId}`, { method: 'PUT', body });
    else result = await api('/items', { method: 'POST', body });
    if (result.success) {
        showToast(currentItemId ? '物品已更新' : '物品已添加', 'success');
        // 如果不是"保存并继续"模式，才隐藏模态框
        if (!keepAdding) {
            bootstrap.Modal.getInstance(document.getElementById('itemModal')).hide();
        }
        loadItems();
    } else showToast(result.message, 'error');
    return result.success;
}

async function saveItemAndContinue() {
    keepAdding = true;
    // 保存当前选中的模板ID
    const currentTemplate = document.getElementById('templateSelect').value;
    if (await saveItem()) {
        selectedAttrValues = {};
        currentItemImages = [];
        document.getElementById('itemForm').reset();
        document.getElementById('imageUploadZone').innerHTML = `<svg width="32" height="32" fill="none" viewBox="0 0 24 24" stroke="var(--muted)" stroke-width="1.5"><path d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2 1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg><p style="color:var(--muted);font-size:12px;margin-top:8px;">点击上传图片</p>`;
        document.getElementById('imageUploadZone').classList.remove('has-image');
        selectedAttrValues = {};
        // 恢复模板选择
        if (currentTemplate) {
            document.getElementById('templateSelect').value = currentTemplate;
            loadTemplateAttributes();
        }
    }
    keepAdding = false;
}

async function editItem(itemId) {
    const item = items.find(i => i.id === itemId);
    if (!item) return;
    currentItemId = itemId;
    currentItemImages = item.images ? [item.images] : [];
    currentTemplateId = item.template_id;
    
    document.getElementById('itemModalTitle').textContent = '编辑物品';
    document.querySelector('#itemForm input[name="name"]').value = item.name;
    document.querySelector('#itemForm textarea[name="remark"]').value = item.remark || '';
    
    // 渲染类别选择器并设置为只读
    renderCategorySelectors();
    const templateSelect = document.getElementById('templateSelect');
    templateSelect.value = item.template_id || '';
    templateSelect.disabled = true;
    templateSelect.style.opacity = '0.6';
    templateSelect.style.cursor = 'not-allowed';
    
    // 设置图片为只读状态
    if (item.images) {
        const zone = document.getElementById('imageUploadZone');
        zone.innerHTML = `<img src="/uploads/${item.images}" alt="预览" style="pointer-events:none;">`;
        zone.classList.add('has-image');
        zone.style.pointerEvents = 'none';
        zone.style.cursor = 'not-allowed';
    }
    
    // 隐藏图片上传输入
    document.getElementById('imageInput').style.display = 'none';
    
    // 第一步：加载属性模板（会设置 window.currentAttrTree）
    selectedAttrValues = {};
    await loadTemplateAttributes();
    
    // 第二步：用 findTopLevelAttrId 确保每个选中值的key是正确的顶级属性ID
    // 这样与 handleItemAttrSelectDirect 和保存校验的key保持一致
    const itemAttrs = item.attributes || [];
    const attrTree = window.currentAttrTree || [];
    itemAttrs.forEach(attr => {
        const topLevelId = findTopLevelAttrId(attr.id, attrTree);
        if (topLevelId !== null) {
            selectedAttrValues[String(topLevelId)] = attr.id;
        } else {
            // 兜底：如果找不到顶级属性，用自身ID或parent_id
            if (attr.parent_id && attr.parent_id > 0) {
                selectedAttrValues[String(attr.parent_id)] = attr.id;
            } else {
                selectedAttrValues[String(attr.id)] = attr.id;
            }
        }
    });
    
    // 第三步：更新已选中属性的视觉样式
    updateSelectedAttrStyles();
    document.getElementById('saveAndContinueBtn').style.display = 'none';
    new bootstrap.Modal(document.getElementById('itemModal')).show();
}

function getCategoryAttrKey(attrOrId) {
    if (attrOrId && typeof attrOrId === 'object') {
        return String(attrOrId.tempId || attrOrId.id);
    }
    return String(attrOrId);
}

function addCategoryTopLevelToFront(attrOrId) {
    const key = getCategoryAttrKey(attrOrId);
    window.categoryTopLevelOrder = [
        key,
        ...(window.categoryTopLevelOrder || []).filter(id => id !== key)
    ];
}

function removeCategoryTopLevelFromOrder(attrOrId) {
    const key = getCategoryAttrKey(attrOrId);
    window.categoryTopLevelOrder = (window.categoryTopLevelOrder || []).filter(id => id !== key);
}

// 添加行内属性
function addCategoryInlineAttr() {
    const input = document.getElementById('categoryNewAttrName');
    const name = input.value.trim();
    
    if (!name) {
        showToast('请输入属性名称', 'error');
        return;
    }
    
    // 检查是否已存在顶级属性
    if (window.categoryCurrentAttrs.some(a => a.name === name) ||
        window.categoryNewAttrs.some(a => a.name === name)) {
        showToast('属性名称已存在', 'error');
        return;
    }
    
    // 添加到新属性列表
    const newAttr = {
        tempId: 'cat_new_' + Date.now(),
        name: name,
        parent_id: null,
        is_required: false
    };
    window.categoryNewAttrs.unshift(newAttr);
    addCategoryTopLevelToFront(newAttr.tempId);
    
    // 清空输入并重新渲染
    input.value = '';
    input.focus();
    renderCategoryCurrentAttrs();
}

// 开始添加子属性
function startAddCategoryAttr(parentId) {
    window.categoryAddingParentId = String(parentId);
    window.categoryEditingAttrId = null;
    renderCategoryCurrentAttrs();
    setTimeout(() => {
        const input = document.getElementById('categoryAddInput_' + parentId);
        if (input) input.focus();
    }, 50);
}

// 确认添加子属性
function confirmAddCategoryAttr(parentId) {
    const input = document.getElementById('categoryAddInput_' + parentId);
    if (!input) return;
    
    const name = input.value.trim();
    
    if (!name) {
        showToast('请输入属性名称', 'error');
        input.focus();
        return;
    }
    
    // 检查是否已存在同名子属性
    const parentAttr = window.categoryNewAttrs.find(a => String(a.tempId) === String(parentId)) ||
                       window.categoryCurrentAttrs?.find(a => String(a.id) === String(parentId) || String(a.tempId) === String(parentId));
    
    if (parentAttr) {
        // 检查同级是否有重名（包括新添加的属性和已有属性）
        const newSiblings = window.categoryNewAttrs.filter(a => String(a.parent_id) === String(parentId));
        if (newSiblings.some(a => a.name === name)) {
            showToast('同级已有同名属性', 'error');
            input.focus();
            return;
        }
        
        // 检查已有属性的子属性中是否有重名
        if (parentAttr.children && parentAttr.children.length > 0) {
            if (parentAttr.children.some(c => c.name === name)) {
                showToast('同级已有同名属性', 'error');
                input.focus();
                return;
            }
        }
    }
    
    // 添加到新属性列表（添加到开头，确保新添加的在上面）
    const newAttr = {
        tempId: 'cat_new_' + Date.now(),
        name: name,
        parent_id: String(parentId),  // 确保是字符串
        is_required: false
    };
    window.categoryNewAttrs.unshift(newAttr);
    
    window.categoryAddingParentId = null;
    renderCategoryCurrentAttrs();
    showToast('属性已添加', 'success');
}

// 取消添加子属性
function cancelAddCategoryAttr() {
    window.categoryAddingParentId = null;
    renderCategoryCurrentAttrs();
}

// 开始编辑属性
function startEditCategoryAttr(id) {
    window.categoryEditingAttrId = String(id);
    window.categoryAddingParentId = null;
    renderCategoryCurrentAttrs();
    setTimeout(() => {
        const input = document.getElementById('categoryEditInput_' + id);
        if (input) {
            input.focus();
            input.select();
        }
    }, 50);
}

// 确认编辑属性
function confirmEditCategoryAttr(id) {
    const input = document.getElementById('categoryEditInput_' + id);
    if (!input) return;
    
    const newName = input.value.trim();
    
    if (!newName) {
        showToast('属性名称不能为空', 'error');
        return;
    }
    
    const strId = String(id);
    
    // 递归查找属性及其父级ID
    function findAttrInList(list, parentId = null) {
        for (const attr of list) {
            const attrId = String(attr.id || attr.tempId);
            if (attrId === strId) return { attr, parentId };
            if (attr.children && attr.children.length > 0) {
                const found = findAttrInList(attr.children, attrId);
                if (found) return found;
            }
        }
        return null;
    }
    
    // 检查同级是否有重名（完整检查）
    function checkSiblingDuplicate(parentId, currentId) {
        // 检查已有属性中的同级属性
        const existingSiblings = [];
        if (!parentId) {
            // 顶级属性：检查 categoryCurrentAttrs 中的顶级属性
            existingSiblings.push(...(window.categoryCurrentAttrs || []).filter(a =>
                String(a.id) !== currentId && !a.parent_id
            ));
        } else {
            // 子属性：找到父属性，检查其 children
            const parentAttr = (window.categoryCurrentAttrs || []).find(a =>
                String(a.id) === String(parentId)
            );
            if (parentAttr && parentAttr.children) {
                existingSiblings.push(...parentAttr.children.filter(c =>
                    String(c.id) !== currentId
                ));
            }
        }
        
        // 检查已有属性中是否有重名
        if (existingSiblings.some(a => a.name === newName)) {
            return true;
        }
        
        // 检查新添加的属性中的同级属性
        const newSiblings = window.categoryNewAttrs.filter(a => {
            const aParentId = a.parent_id ? String(a.parent_id) : null;
            return aParentId === (parentId ? String(parentId) : null) && 
                   String(a.tempId) !== currentId;
        });
        if (newSiblings.some(a => a.name === newName)) {
            return true;
        }
        
        return false;
    }
    
    // 先在已有属性中查找
    const found = findAttrInList(window.categoryCurrentAttrs || []);
    if (found) {
        const { attr, parentId } = found;
        // 检查同级重名
        if (checkSiblingDuplicate(parentId, strId)) {
            showToast('同级已有同名属性', 'error');
            input.focus();
            return;
        }
        // 编辑已有属性
        attr.name = newName;
    } else {
        // 编辑新添加的属性
        const newAttr = window.categoryNewAttrs.find(a => String(a.tempId) === strId);
        if (newAttr) {
            // 检查同级重名
            const parentId = newAttr.parent_id ? String(newAttr.parent_id) : null;
            if (checkSiblingDuplicate(parentId, strId)) {
                showToast('同级已有同名属性', 'error');
                input.focus();
                return;
            }
            newAttr.name = newName;
        } else {
            showToast('未找到要编辑的属性', 'error');
            return;
        }
    }
    
    window.categoryEditingAttrId = null;
    renderCategoryCurrentAttrs();
    
    // 记录编辑操作（批量保存时执行）
    if (!strId.startsWith('cat_new_')) {
        window.categoryEditedAttrs.add(strId);
    }
}

// 取消编辑属性
function cancelEditCategoryAttr() {
    window.categoryEditingAttrId = null;
    renderCategoryCurrentAttrs();
}

// 删除属性
async function removeCategoryAttr(id, name) {
    const strId = String(id);
    
    // 检查是否是新添加的属性
    const newAttrIndex = window.categoryNewAttrs.findIndex(a => String(a.tempId) === strId);
    if (newAttrIndex >= 0) {
        const idsToRemove = new Set([strId]);
        let changed = true;
        while (changed) {
            changed = false;
            for (const attr of window.categoryNewAttrs) {
                const parentId = attr.parent_id ? String(attr.parent_id) : null;
                const attrKey = getCategoryAttrKey(attr);
                if (parentId && idsToRemove.has(parentId) && !idsToRemove.has(attrKey)) {
                    idsToRemove.add(attrKey);
                    changed = true;
                }
            }
        }
        const attrToRemove = window.categoryNewAttrs[newAttrIndex];
        if (!attrToRemove.parent_id) {
            removeCategoryTopLevelFromOrder(strId);
        }
        window.categoryNewAttrs = window.categoryNewAttrs.filter(a => !idsToRemove.has(getCategoryAttrKey(a)));
        renderCategoryCurrentAttrs();
        showToast('属性已移除', 'success');
        return;
    }
    
    // 判断是否是顶级属性
    const isTopLevel = (window.categoryCurrentAttrs || []).some(a => String(a.id) === strId);

    if (isTopLevel) {
        // 删除顶级属性：子属性会被数据库级联删除，只记录顶级属性ID
        if (!confirm(`确定要删除属性"${name}"吗？\n\n注意：将同时删除其所有子属性。`)) return;

        // 从列表中移除顶级属性及其子属性
        window.categoryCurrentAttrs = (window.categoryCurrentAttrs || []).filter(a => String(a.id) !== strId);
        removeCategoryTopLevelFromOrder(strId);
        renderCategoryCurrentAttrs();
        
        // 只记录顶级属性ID（子属性会被级联删除）
        window.categoryDeletedAttrs.push(strId);
        showToast('已标记删除属性及其子属性（保存类别后生效）', 'success');
    } else {
        // 删除子属性：需要单独删除，收集所有要删除的子属性ID
        const allIdsToDelete = [strId];
        
        // 递归收集子属性的子属性ID
        function collectChildIds(attrs, parentId) {
            for (const attr of attrs) {
                const attrId = String(attr.id || attr.tempId);
                if (attrId === parentId && attr.children && attr.children.length > 0) {
                    for (const child of attr.children) {
                        const childId = String(child.id);
                        allIdsToDelete.push(childId);
                        // 递归收集子属性的子属性
                        collectChildIds([child], childId);
                    }
                }
                if (attr.children && attr.children.length > 0) {
                    collectChildIds(attr.children, parentId);
                }
            }
        }
        
        // 收集要删除属性的所有子属性ID
        collectChildIds(window.categoryCurrentAttrs || [], strId);
        
        if (!confirm(`确定要删除属性"${name}"吗？${allIdsToDelete.length > 1 ? `\n\n注意：将同时删除其 ${allIdsToDelete.length - 1} 个子属性。` : ''}`)) return;
        
        // 递归从列表中移除属性及其子属性
        function removeFromTree(attrs, targetIds) {
            return attrs.map(attr => {
                const attrId = String(attr.id);
                if (attr.children && attr.children.length > 0) {
                    attr.children = attr.children.filter(child => {
                        const childId = String(child.id);
                        if (targetIds.includes(childId)) return false;
                        if (child.children && child.children.length > 0) {
                            child.children = removeFromTree([child], targetIds)[0]?.children || [];
                        }
                        return true;
                    });
                }
                return attr;
            });
        }
        
        window.categoryCurrentAttrs = removeFromTree(window.categoryCurrentAttrs || [], allIdsToDelete);
        renderCategoryCurrentAttrs();
        
        // 记录所有要删除的子属性ID
        for (const deleteId of allIdsToDelete) {
            if (!deleteId.startsWith('cat_new_')) {
                window.categoryDeletedAttrs.push(deleteId);
            }
        }
        showToast(`已标记删除 ${allIdsToDelete.length} 个属性（保存类别后生效）`, 'success');
    }
}

// 递归加载子属性
async function loadCategoryChildrenRecursively(attrs) {
    for (let attr of attrs) {
        const attrId = attr.id;
        if (attrId) {
            const childResult = await api(`/attributes/${attrId}/children`);
            if (childResult.success && childResult.data && childResult.data.length > 0) {
                attr.children = childResult.data;
                // 递归获取子属性的子属性
                await loadCategoryChildrenRecursively(attr.children);
            } else {
                attr.children = [];
            }
        }
    }
}

// 加载类别已有属性
async function loadCategoryCurrentAttrs(categoryId) {
    const result = await api(`/categories/${categoryId}/template`);
    
    if (result.success && result.data && result.data.attributes) {
        window.categoryCurrentAttrs = result.data.attributes;
        window.categoryTopLevelOrder = window.categoryCurrentAttrs.map(attr => getCategoryAttrKey(attr));
    } else {
        window.categoryCurrentAttrs = [];
        window.categoryTopLevelOrder = [];
    }
    
    await loadCategoryChildrenRecursively(window.categoryCurrentAttrs);
    renderCategoryCurrentAttrs();
}

// 渲染属性列表
function renderCategoryCurrentAttrs() {
    const container = document.getElementById('categoryCurrentAttrs');

    // 构建所有属性的统一结构
    // 顶级属性和子属性都使用 id 和 name 字段
    const topLevelFromCurrent = window.categoryCurrentAttrs.map(attr => ({
        tempId: String(attr.id),
        name: attr.name,
        is_required: attr.is_required,
        children: (attr.children || []).map(c => ({
            ...c,
            tempId: String(c.id),
            name: c.name,
            is_required: false
        })),
        _children: []
    }));

    const topLevelFromNew = window.categoryNewAttrs.filter(a => !a.parent_id).map(attr => ({
        tempId: attr.tempId,
        name: attr.name,
        is_required: attr.is_required,
        children: [],
        _children: window.categoryNewAttrs.filter(child => String(child.parent_id) === String(attr.tempId)).map(c => ({
            ...c,
            tempId: c.tempId,
            name: c.name
        }))
    }));

    // 合并所有顶级属性（新添加的在上面）
    const topLevelMap = new Map();
    topLevelFromCurrent.forEach(attr => {
        topLevelMap.set(getCategoryAttrKey(attr), attr);
    });
    topLevelFromNew.forEach(attr => {
        topLevelMap.set(getCategoryAttrKey(attr), attr);
    });
    const allTopLevel = [];
    // 先添加新属性（未在order中）
    const newKeys = new Set(topLevelFromNew.map(a => getCategoryAttrKey(a)));
    (window.categoryTopLevelOrder || []).forEach(key => {
        if (topLevelMap.has(key) && !newKeys.has(key)) {
            allTopLevel.push(topLevelMap.get(key));
            topLevelMap.delete(key);
        }
    });
    // 将新添加的属性放在最前面
    const newAttrs = [];
    const existingAttrs = [];
    topLevelMap.forEach((attr, key) => {
        if (newKeys.has(key)) {
            newAttrs.push(attr);
        } else {
            existingAttrs.push(attr);
        }
    });
    // 新属性在前，保持添加顺序
    allTopLevel.unshift(...newAttrs);
    // 添加剩余的已有属性
    allTopLevel.push(...existingAttrs);

    // 扁平化所有属性
    function flattenAllAttrs(attrList, parentId = null) {
        if (!attrList) return [];
        let result = [];
        for (const attr of attrList) {
            const id = attr.tempId;
            result.push({
                id: id,
                name: attr.name,
                parent_id: parentId,
                is_required: attr.is_required
            });
            // 处理新添加的子属性（_children）- 放在前面
            if (attr._children && attr._children.length > 0) {
                for (const child of attr._children) {
                    result.push({
                        id: child.tempId,
                        name: child.name,
                        parent_id: id,  // 子属性的parent_id应该是当前属性的id
                        is_required: child.is_required
                    });
                }
            }
            // 处理已有属性的子属性（children）- 放在后面
            if (attr.children && attr.children.length > 0) {
                result = result.concat(flattenAllAttrs(attr.children, id));
            }
        }
        return result;
    }

    const allAttrs = flattenAllAttrs(allTopLevel);
    
    if (allAttrs.length === 0 && !window.categoryAddingParentId) {
        container.innerHTML = '<p style="color:var(--muted);font-size:12px;text-align:center;">暂无属性，请添加</p>';
        return;
    }
    
    const topLevelAttrs = allAttrs.filter(a => !a.parent_id);
    const prefix = 'category_';
    
    function renderNode(attr, level = 0) {
        const indent = level * 20;
        const id = String(attr.id);
        const children = allAttrs.filter(a => String(a.parent_id) === id);
        const hasChildren = children.length > 0;
        const isTopLevel = level === 0;
        const isEditing = window.categoryEditingAttrId === id;
        const isAddingChild = window.categoryAddingParentId === id;
        const isCollapsed = collapsedNodes.has(prefix + id);
        
        let html = '';
        
        if (isEditing) {
            html = `
                <div style="margin-bottom:4px;">
                    <div style="display:flex;align-items:center;gap:8px;padding:6px 8px;margin-left:${indent}px;background:var(--white);border-radius:4px;border:1px solid var(--accent);">
                        <span style="width:12px;"></span>
                        <input type="text" id="categoryEditInput_${id}" class="form-control" value="${attr.name}" style="flex:1;height:28px;font-size:13px;" onkeydown="if(event.key==='Enter')confirmEditCategoryAttr('${id}');if(event.key==='Escape')cancelEditCategoryAttr();">
                        <button type="button" onclick="confirmEditCategoryAttr('${id}')" title="保存" style="background:var(--accent);color:#fff;border:none;border-radius:4px;cursor:pointer;font-size:14px;padding:4px 8px;">
                            <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
                        </button>
                        <button type="button" onclick="cancelEditCategoryAttr()" title="取消" style="background:var(--surface);color:var(--sub);border:1px solid var(--border);border-radius:4px;cursor:pointer;font-size:14px;padding:4px 8px;">
                            <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                        </button>
                    </div>
                </div>
            `;
        } else {
            html = `
                <div style="margin-bottom:4px;">
                    <div style="display:flex;align-items:center;gap:8px;padding:6px 8px;margin-left:${indent}px;background:var(--white);border-radius:4px;border:1px solid var(--border);cursor:${hasChildren ? 'pointer' : 'default'};" onclick="${hasChildren ? `toggleCollapse('category', '${id}')` : ''}">
                        ${hasChildren ? `
                            <span class="collapse-arrow ${isCollapsed ? 'collapsed' : ''}" style="color:var(--sub);display:inline-flex;align-items:center;">
                                <svg width="12" height="12" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
                            </span>
                        ` : '<span style="width:12px;"></span>'}
                        <span style="flex:1;font-size:13px;">
                            ${isTopLevel ? '<strong>' + attr.name + '</strong>' : attr.name}
                        </span>
                        <div style="display:flex;gap:4px;" onclick="event.stopPropagation();">
                            <button type="button" onclick="startAddCategoryAttr('${id}')" title="添加子属性" style="background:none;border:none;color:var(--success);cursor:pointer;font-size:14px;padding:2px 6px;">
                                <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                    <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
                                </svg>
                            </button>
                            <button type="button" onclick="startEditCategoryAttr('${id}')" title="编辑属性" style="background:none;border:none;color:var(--sub);cursor:pointer;font-size:14px;padding:2px 6px;">
                                <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                    <path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/>
                                    <path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/>
                                </svg>
                            </button>
                            <button type="button" onclick="removeCategoryAttr('${id}', '${attr.name}')" title="删除属性" style="background:none;border:none;color:var(--danger);cursor:pointer;font-size:14px;padding:2px 6px;">
                                <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                    <path d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
                                </svg>
                            </button>
                        </div>
                    </div>
                    ${isAddingChild ? `
                        <div style="display:flex;align-items:center;gap:8px;padding:6px 8px;margin-left:${indent + 32}px;background:var(--white);border-radius:4px;border:1px solid var(--accent);margin-top:4px;">
                            <input type="text" id="categoryAddInput_${id}" class="form-control" placeholder="子属性名称" style="flex:1;height:28px;font-size:13px;" onkeydown="if(event.key==='Enter')confirmAddCategoryAttr('${id}');if(event.key==='Escape')cancelAddCategoryAttr();" autofocus>
                            <button type="button" onclick="confirmAddCategoryAttr('${id}')" title="保存" style="background:var(--accent);color:#fff;border:none;border-radius:4px;cursor:pointer;font-size:14px;padding:4px 8px;">
                                <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
                            </button>
                            <button type="button" onclick="cancelAddCategoryAttr()" title="取消" style="background:var(--surface);color:var(--sub);border:1px solid var(--border);border-radius:4px;cursor:pointer;font-size:14px;padding:4px 8px;">
                                <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                            </button>
                        </div>
                    ` : ''}
                    <div class="collapse-content ${isCollapsed ? 'hidden' : ''}">
            `;
            
            // 渲染子节点
            for (const child of children) {
                html += renderNode(child, level + 1);
            }
            
            html += '</div></div>';
        }
        
        return html;
    }
    
    let html = '';
    for (const attr of topLevelAttrs) {
        html += renderNode(attr, 0);
    }
    
    container.innerHTML = html;
}

// 切换折叠状态
function toggleCollapse(prefix, id) {
    const key = prefix + '_' + id;
    if (collapsedNodes.has(key)) {
        collapsedNodes.delete(key);
    } else {
        collapsedNodes.add(key);
    }
    
    // 重新渲染
    if (prefix === 'category') {
        renderCategoryCurrentAttrs();
    } else if (prefix === 'template') {
        renderTemplateCurrentAttrs();
    }
}

// 模板配置模态框相关变量
window.templateNewAttrs = [];
window.templateExistingAttrs = [];
window.templateCurrentAttrs = [];
window.templateTopLevelOrder = [];
window.templateEditingAttrId = null;
window.templateAddingParentId = null;
window.templateDeletedAttrs = []; // 记录待删除的属性ID
window.templateEditedAttrs = new Set(); // 记录被编辑的属性ID

function getTemplateAttrKey(attrOrId) {
    if (attrOrId && typeof attrOrId === 'object') {
        return String(attrOrId.tempId || attrOrId.id);
    }
    return String(attrOrId);
}

function addTemplateTopLevelToFront(attrOrId) {
    const key = getTemplateAttrKey(attrOrId);
    window.templateTopLevelOrder = [
        key,
        ...(window.templateTopLevelOrder || []).filter(id => id !== key)
    ];
}

function removeTemplateTopLevelFromOrder(attrOrId) {
    const key = getTemplateAttrKey(attrOrId);
    window.templateTopLevelOrder = (window.templateTopLevelOrder || []).filter(id => id !== key);
}

function showTemplateConfigModal(categoryId) {
    const cat = categories.find(c => c.id === categoryId);
    if (!cat) return;
    window.templateNewAttrs = [];
    window.templateCurrentAttrs = [];
    window.templateTopLevelOrder = [];
    window.templateEditingAttrId = null;
    window.templateAddingParentId = null;
    window.templateDeletedAttrs = []; // 清空待删除列表
    window.templateEditedAttrs = new Set(); // 清空编辑记录
    
    document.getElementById('templateCategoryId').value = categoryId;
    document.getElementById('templateCategoryName').value = cat.name;
    
    loadTemplateCurrentAttrs(categoryId);
    
    new bootstrap.Modal(document.getElementById('templateModal')).show();

// 添加模板属性（使用输入框）
function addTemplateInlineAttr() {

        showToast('请输入属性名称', 'error');
        nameInput.focus();

    // 检查当前类别下是否已有同名顶级属性（不跨类别校验）
    const allAttrs = [...window.templateCurrentAttrs.map(a => ({name: a.name, parent_id: a.parent_id})), ...window.templateNewAttrs];
    const topLevel = allAttrs.filter(a => !a.parent_id);
    if (topLevel.some(a => a.name === name)) {
        showToast('当前类别下已有同名属性', 'error');
        nameInput.focus();
        return;
    }
    
    const newAttr = {
        tempId: 'new_' + Date.now(),
        name: name,
        parent_id: null,
        parent_name: '',
        is_required: true // 顶级属性默认必填
    };
    window.templateNewAttrs.unshift(newAttr);
    addTemplateTopLevelToFront(newAttr.tempId);
    
    nameInput.value = '';
    nameInput.focus();
    
    renderTemplateCurrentAttrs();
}

// 开始添加模板属性（显示行内输入框）
function startAddTemplateAttr(parentId) {

    if (parentId === 'undefined' || parentId === undefined || parentId === null) {
        showToast('无法添加子属性：父属性ID无效', 'error');
        return;
    }
    
    window.templateAddingParentId = String(parentId);
    window.templateEditingAttrId = null;
    renderTemplateCurrentAttrs();
}

// 确认添加模板属性
function confirmAddTemplateAttr(parentId) {
    const strParentId = parentId !== null ? String(parentId) : null;
    
    const inputId = strParentId ? 'templateAddInput_' + strParentId : 'templateAddInput_top';
    const input = document.getElementById(inputId);
    if (!input) return;
    
    const name = input.value.trim();
    
    if (!name) {
        showToast('请输入属性名称', 'error');
        input.focus();
        return;
    }
    
    // 检查当前类别下是否已有同名属性（不跨类别校验）
    const allAttrs = [...window.templateCurrentAttrs.map(a => ({name: a.name, parent_id: a.parent_id})), ...window.templateNewAttrs];
    const siblings = strParentId
        ? allAttrs.filter(a => String(a.parent_id) === strParentId)
        : allAttrs.filter(a => !a.parent_id);
    if (siblings.some(a => a.name === name)) {
        showToast('当前类别下已有同名属性', 'error');
        input.focus();
        return;
    }

    // 检查已有属性的子属性中是否有重名（针对子属性添加）
    if (strParentId) {
        // 找到父属性
        function findAttrInTree(attrs, targetId) {
            for (const attr of attrs) {
                if (String(attr.id) === targetId) {
                    return attr;
                }
                if (attr.children && attr.children.length > 0) {
                    const found = findAttrInTree(attr.children, targetId);
                    if (found) return found;
                }
            }
            return null;
        }
        
        const parentAttr = findAttrInTree(window.templateCurrentAttrs, strParentId);
        if (parentAttr && parentAttr.children && parentAttr.children.length > 0) {
            if (parentAttr.children.some(c => c.name === name)) {
                showToast('当前类别下已有同名属性', 'error');
                input.focus();
                return;
            }
        }
    }

    const newAttr = {
        tempId: 'new_' + Date.now(),
        name: name,
        parent_id: strParentId,
        parent_name: strParentId ? (attributes.find(a => a.id === parseInt(strParentId))?.name || window.templateCurrentAttrs.find(a => a.id === parseInt(strParentId))?.name || '') : '',
        is_required: !strParentId // 顶级属性默认必填
    };
    window.templateNewAttrs.unshift(newAttr);
    if (!strParentId) {
        addTemplateTopLevelToFront(newAttr.tempId);
    }
    
    window.templateAddingParentId = null;
    renderTemplateCurrentAttrs();
}

// 取消添加模板属性

    window.templateAddingParentId = null;
    renderTemplateCurrentAttrs();
}

// 开始编辑模板属性名称（显示行内输入框）
function startEditTemplateAttr(attrId) {
    window.templateEditingAttrId = String(attrId);
    window.templateAddingParentId = null;
    renderTemplateCurrentAttrs();
    
    // 聚焦输入框
    setTimeout(() => {
        const input = document.getElementById('templateEditInput_' + attrId);
        if (input) input.focus();
    }, 50);
}

// 确认编辑模板属性名称
function confirmEditTemplateAttr(attrId) {
    const strAttrId = String(attrId);
    const input = document.getElementById('templateEditInput_' + strAttrId);
    if (!input) return;
    
    const newName = input.value.trim();
    
    if (!newName) {
        showToast('属性名称不能为空', 'error');
        input.focus();
        return;
    }
    
    // 递归查找属性及其父级ID
    function findAttrInTreeWithParent(attrs, targetId, parentId = null) {
        for (const attr of attrs) {
            const attrId = String(attr.id || attr.tempId);
            if (attrId === targetId) return { attr, parentId };
            if (attr.children && attr.children.length > 0) {
                const found = findAttrInTreeWithParent(attr.children, targetId, attrId);
                if (found) return found;
            }
        }
        return null;
    }
    
    // 检查同级是否有重名（完整检查）
    function checkSiblingDuplicate(parentId, currentId) {
        // 检查已有属性中的同级属性
        if (!parentId) {
            // 顶级属性：检查 templateCurrentAttrs 中的顶级属性
            const existingSiblings = (window.templateCurrentAttrs || []).filter(a =>
                String(a.id) !== currentId && !a.parent_id
            );
            if (existingSiblings.some(a => a.name === newName)) {
                return true;
            }
        } else {
            // 子属性：找到父属性，检查其 children
            const parentAttr = findAttrInTreeWithParent(window.templateCurrentAttrs || [], parentId)?.attr;
            if (parentAttr && parentAttr.children) {
                const existingSiblings = parentAttr.children.filter(c =>
                    String(c.id) !== currentId
                );
                if (existingSiblings.some(c => c.name === newName)) {
                    return true;
                }
            }
        }

        // 检查新添加的属性中的同级属性
        const newSiblings = window.templateNewAttrs.filter(a => {
            const aParentId = a.parent_id ? String(a.parent_id) : null;
            return aParentId === (parentId ? String(parentId) : null) &&
                   String(a.tempId || a.id) !== currentId;
        });
        if (newSiblings.some(a => a.name === newName)) {
            return true;
        }

        return false;
    }

    // 检查是否是新添加的属性
    const newAttr = window.templateNewAttrs.find(a => String(a.tempId || a.id) === strAttrId);
    if (newAttr) {
        // 检查同级重名
        const parentId = newAttr.parent_id ? String(newAttr.parent_id) : null;
        if (checkSiblingDuplicate(parentId, strAttrId)) {
            showToast('同级已有同名属性', 'error');
            input.focus();
            return;
        }
        newAttr.name = newName;
        window.templateEditingAttrId = null;
        renderTemplateCurrentAttrs();
        return;
    }

    // 已有属性，查找属性及其父级ID
    const found = findAttrInTreeWithParent(window.templateCurrentAttrs || [], strAttrId);
    if (!found) {
        showToast('属性不存在', 'error');
        return;
    }

    const { attr, parentId } = found;

    // 检查同级重名
    if (checkSiblingDuplicate(parentId, strAttrId)) {
        showToast('同级已有同名属性', 'error');
        input.focus();
        return;
    }

    // 更新显示（仅本地，不调用API）
    attr.name = newName;
    // 记录被编辑的属性
    if (attr.id) {
        window.templateEditedAttrs.add(attr.id);
    }
    window.templateEditingAttrId = null;
    renderTemplateCurrentAttrs();
}

// 取消编辑模板属性名称
function cancelEditTemplateAttr() {
    window.templateEditingAttrId = null;
    renderTemplateCurrentAttrs();
}

async function loadTemplateCurrentAttrs(categoryId) {
    try {
        const result = await api(`/categories/${categoryId}/template`);
        
        if (result.success && result.data && result.data.attributes) {
            window.templateCurrentAttrs = result.data.attributes;
            // 清空新添加的属性列表，因为重新加载后应该以服务器数据为准
            window.templateNewAttrs = [];
            window.templateTopLevelOrder = window.templateCurrentAttrs.map(attr => getTemplateAttrKey(attr));
        } else {
            // 如果没有获取到数据，保持当前状态，避免清空
            console.warn('loadTemplateCurrentAttrs - 未获取到属性数据:', result);
            if (!window.templateCurrentAttrs) {
                window.templateCurrentAttrs = [];
            }
            if (!window.templateNewAttrs) {
                window.templateNewAttrs = [];
            }
            if (!window.templateTopLevelOrder) {
                window.templateTopLevelOrder = [];
            }
        }
        
        // 后端已经返回了完整的属性树（包含children），直接使用，不需要额外API调用
        renderTemplateCurrentAttrs();
    } catch (error) {
        console.error('loadTemplateCurrentAttrs - 加载失败:', error);
        showToast('加载属性配置失败', 'error');
        // 保持当前状态，避免清空
        if (!window.templateCurrentAttrs) {
            window.templateCurrentAttrs = [];
        }
        if (!window.templateNewAttrs) {
            window.templateNewAttrs = [];
        }
        if (!window.templateTopLevelOrder) {
            window.templateTopLevelOrder = [];
        }
        renderTemplateCurrentAttrs();
    }
}

function toggleTemplateAttrRequired(checkbox, attrId) {
    // 检查是否是新添加的属性
    const newAttr = window.templateNewAttrs.find(a => (a.tempId || a.id) === attrId);
    if (newAttr) {
        newAttr.is_required = checkbox.checked;
        return;
    }

    const attr = window.templateCurrentAttrs.find(a => a.id === attrId);
    if (attr) {
        attr.is_required = checkbox.checked;
    }
}

async function removeTemplateExistingAttr(attrId, attrName) {
    const strAttrId = String(attrId);

    // 检查是否是新添加的属性
    const newAttrIndex = window.templateNewAttrs.findIndex(a => String(a.tempId || a.id) === strAttrId);
    if (newAttrIndex >= 0) {
        const idsToRemove = new Set([strAttrId]);
        let changed = true;
        while (changed) {
            changed = false;
            for (const attr of window.templateNewAttrs) {
                const parentId = attr.parent_id ? String(attr.parent_id) : null;
                const attrKey = getTemplateAttrKey(attr);
                if (parentId && idsToRemove.has(parentId) && !idsToRemove.has(attrKey)) {
                    idsToRemove.add(attrKey);
                    changed = true;
                }
            }
        }
        const removedAttr = window.templateNewAttrs[newAttrIndex];
        if (!removedAttr.parent_id) {
            removeTemplateTopLevelFromOrder(strAttrId);
        }
        window.templateNewAttrs = window.templateNewAttrs.filter(a => !idsToRemove.has(getTemplateAttrKey(a)));
        renderTemplateCurrentAttrs();
        return;
    }

    // 判断是否是顶级属性
    const isTopLevel = (window.templateCurrentAttrs || []).some(a => String(a.id) === strAttrId);

    if (isTopLevel) {
        // 删除顶级属性：子属性会被数据库级联删除，只记录顶级属性ID
        if (!confirm(`确定要从类别中移除属性"${attrName}"吗？\n\n注意：将同时删除其所有子属性。`)) return;

        // 从列表中移除顶级属性
        window.templateCurrentAttrs = (window.templateCurrentAttrs || []).filter(a => String(a.id) !== strAttrId);
        removeTemplateTopLevelFromOrder(strAttrId);
        renderTemplateCurrentAttrs();

        // 只记录顶级属性ID（子属性会被级联删除）
        if (!window.templateDeletedAttrs.includes(strAttrId)) {
            window.templateDeletedAttrs.push(strAttrId);
        }
    } else {
        // 删除子属性：需要单独删除
        if (!confirm(`确定要从类别中移除属性"${attrName}"吗？`)) return;

        // 从树中移除子属性
        function removeFromTree(attrs, idToRemove) {
            return attrs.map(attr => {
                if (attr.children && attr.children.length > 0) {
                    attr.children = attr.children.filter(child => {
                        if (String(child.id) === idToRemove) return false;
                        if (child.children && child.children.length > 0) {
                            child.children = removeFromTree([child], idToRemove)[0]?.children || [];
                        }
                        return true;
                    });
                }
                return attr;
            });
        }

        window.templateCurrentAttrs = removeFromTree(window.templateCurrentAttrs || [], strAttrId);
        renderTemplateCurrentAttrs();

        // 记录子属性ID（需要单独删除）
        if (!window.templateDeletedAttrs.includes(strAttrId)) {
            window.templateDeletedAttrs.push(strAttrId);
        }
    }
}

function renderTemplateCurrentAttrs() {
    const container = document.getElementById('templateCurrentAttrs');
    
    // 构建完整的树形结构
    function buildTree(attrList, parentId = null, isNew = false) {
        if (!attrList) return [];
        let result = [];
        for (const attr of attrList) {
            // 使用 _isNew 标记判断是否为新添加的属性
            const attrIsNew = attr._isNew !== undefined ? attr._isNew : isNew;
            const id = attrIsNew ? attr.tempId : attr.id;
            
            // 只处理当前层级的属性（正确处理 null/undefined）
            const attrParentId = attr.parent_id;
            
            const matchParent = (parentId === null || parentId === undefined) 
                ? (attrParentId === null || attrParentId === undefined || attrParentId === 0 || attrParentId === '0')
                : String(attrParentId) === String(parentId);
            
            if (matchParent) {
                // 确保 id 不为 undefined
                const nodeId = id || attr.tempId || attr.id;

                const node = {
                    id: nodeId,
                    name: attr.name,
                    parent_id: parentId,
                    is_required: attr.is_required,
                    is_new: attrIsNew,
                    children: []
                };
                
                // 递归查找子属性
                // 1. 从嵌套的 children 中查找（已有属性）
                if (attr.children && attr.children.length > 0) {
                    node.children = node.children.concat(buildTree(attr.children, id, false));
                }
                // 2. 从 _children 中查找（新添加的子属性，嵌套形式）
                if (attr._children && attr._children.length > 0) {
                    node.children = node.children.concat(buildTree(attr._children, id, true));
                }
                // 3. 从扁平列表 templateNewAttrs 中查找直接子属性
                const directChildren = window.templateNewAttrs.filter(a => String(a.parent_id) === String(id));
                if (directChildren.length > 0) {
                    // 对每个直接子属性，递归构建其子树
                    for (const child of directChildren) {
                        const childNode = {
                            id: child.tempId,
                            name: child.name,
                            parent_id: id,
                            is_required: child.is_required,
                            is_new: true,
                            _isNew: true,  // 添加标记
                            children: []
                        };
                        // 递归查找该子属性的子属性
                        const grandChildren = window.templateNewAttrs.filter(a => String(a.parent_id) === String(child.tempId));
                        if (grandChildren.length > 0) {
                            // 为孙属性添加 _isNew 标记
                            const markedGrandChildren = grandChildren.map(gc => ({...gc, _isNew: true}));
                            childNode.children = buildTree(markedGrandChildren, child.tempId, true);
                        }
                        node.children.push(childNode);
                    }
                }
                
                result.push(node);
            }
        }
        return result;
    }
    
    // 合并所有顶级属性
    const topLevelMap = new Map();
    window.templateCurrentAttrs.forEach(attr => {
        topLevelMap.set(getTemplateAttrKey(attr), {...attr, _isNew: false});
    });
    window.templateNewAttrs.filter(a => !a.parent_id).forEach(attr => {
        topLevelMap.set(getTemplateAttrKey(attr), {...attr, _isNew: true});
    });
    const allTopLevel = [];
    (window.templateTopLevelOrder || []).forEach(key => {
        if (topLevelMap.has(key)) {
            allTopLevel.push(topLevelMap.get(key));
            topLevelMap.delete(key);
        }
    });
    allTopLevel.push(...topLevelMap.values());
    
    // 构建树形结构
    const tree = buildTree(allTopLevel, null);
    
    if (tree.length === 0 && window.templateAddingParentId === null) {
        container.innerHTML = '<p style="color:var(--muted);font-size:12px;text-align:center;">暂无属性，请添加</p>';
        return;
    }
    
    const prefix = 'template_';

                        </button>
                    </div>
                `;
            }
            
            // 递归渲染子属性
            if (hasChildren) {
                attr.children.forEach(child => {
                    html += renderNode(child, level + 1);
                });
            }
            
            html += '</div></div>';
        }
        
        return html;
    }
    
    let content = tree.map(attr => renderNode(attr)).join('');
    container.innerHTML = content;
}

async function saveTemplateConfig() {
    const categoryId = document.getElementById('templateCategoryId').value;
    const name = document.getElementById('templateCategoryName').value.trim();
    
    // 获取类别对应的模板ID
    const cat = categories.find(c => c.id === parseInt(categoryId));
    const templateId = cat ? cat.template_id : null;
    
    // 验证类别名称
    if (!name) {
        showToast('保存失败：请填写类别名称', 'error');
        document.getElementById('templateCategoryName').focus();
        return;
    }
    
    // 验证模板ID
    if (!templateId) {
        showToast('保存失败：无法获取模板信息', 'error');
        return;
    }
    
    // 合并已有属性和新添加的属性
    const allAttrs = [];
    
    // 递归收集所有属性（包括子属性）
    function collectAttrs(attrs, isNew = false) {
        for (const attr of attrs) {
            allAttrs.push({
                id: isNew ? attr.tempId : attr.id,
                name: attr.name,
                parent_id: attr.parent_id,
                isNew: isNew
            });
            // 递归收集子属性
            if (attr.children && attr.children.length > 0) {
                collectAttrs(attr.children, isNew);
            }
        }
    }
    
    // 收集已有属性（树形结构）
    collectAttrs(window.templateCurrentAttrs, false);
    
    // 收集新添加的属性（扁平列表，需要转换为树形）
    // 先找到所有顶级新属性
    const newTopAttrsForValidation = window.templateNewAttrs.filter(a => !a.parent_id);
    
    // 收集新添加的属性（递归收集所有层级，包括已有父属性的新子属性）
    function collectNewAttrsRecursive(parentId, visited) {
        if (!visited) visited = new Set();
        const children = window.templateNewAttrs.filter(a => {
            if (!a.parent_id) return false;
            const key = String(a.tempId || a.id);
            if (visited.has(key)) return false;
            return String(a.parent_id) === String(parentId);
        });
        for (const child of children) {
            const childKey = String(child.tempId || child.id);
            visited.add(childKey);
            allAttrs.push({
                id: child.tempId,
                name: child.name,
                parent_id: child.parent_id,
                isNew: true
            });
            // 递归收集该子属性的子属性
            collectNewAttrsRecursive(child.tempId, visited);
        }
    }
    
    // 收集所有新顶级属性及其子树
    for (const topAttr of newTopAttrsForValidation) {
        allAttrs.push({
            id: topAttr.tempId,
            name: topAttr.name,
            parent_id: topAttr.parent_id,
            isNew: true
        });
        collectNewAttrsRecursive(topAttr.tempId);
    }
    
    // 收集添加到已有父属性（parent_id 为数字）的新子属性
    const newChildrenOfExisting = window.templateNewAttrs.filter(a => {
        if (!a.parent_id) return false;
        const pid = parseInt(a.parent_id);
        return !isNaN(pid) && pid > 0;
    });
    for (const child of newChildrenOfExisting) {
        allAttrs.push({
            id: child.tempId,
            name: child.name,
            parent_id: child.parent_id,
            isNew: true
        });
        // 同时递归收集其子属性（如果它有子属性也是新加的）
        collectNewAttrsRecursive(child.tempId);
    }
    
    // 验证属性（顶级属性）
    const fieldNames = allAttrs.filter(a => !a.parent_id);
    if (fieldNames.length === 0) {
        showToast('保存失败：请至少添加一个属性', 'error');
        return;
    }
    
    // 验证每个新添加的顶级属性下是否有至少一个属性值
    const newTopFields = window.templateNewAttrs.filter(a => !a.parent_id);
    for (const field of newTopFields) {
        const fieldId = field.tempId;
        const fieldValues = allAttrs.filter(a => String(a.parent_id) === String(fieldId));
        if (fieldValues.length === 0) {
            showToast('保存失败：属性"' + field.name + '"下没有属性值，请至少添加一个属性值', 'error');
            return;
        }
    }
    
    // 验证所有顶级属性（包括已有属性）是否都有至少一个属性值
    const allTopLevelFields = [
        ...window.templateCurrentAttrs.map(a => ({id: a.id, name: a.name})),
        ...newTopFields.map(a => ({id: a.tempId, name: a.name}))
    ];
    for (const field of allTopLevelFields) {
        const fieldId = field.id;
        const fieldValues = allAttrs.filter(a => String(a.parent_id) === String(fieldId));
        if (fieldValues.length === 0) {
            showToast('保存失败：属性"' + field.name + '"下没有属性值，请至少添加一个属性值', 'error');
            return;
        }
    }
    
    // 先执行删除操作（待删除的属性）
    if (window.templateDeletedAttrs.length > 0) {
        for (const attrId of window.templateDeletedAttrs) {
            const deleteResult = await api(`/attributes/${attrId}/force-delete`, { method: 'DELETE' });
            if (!deleteResult.success) {
                showToast('保存失败：删除属性失败 - ' + (deleteResult.message || '服务器错误'), 'error');
                return;
            }
        }
        showToast(`已删除 ${window.templateDeletedAttrs.length} 个属性`, 'success');
    }
    
    // 执行属性名称更新（只更新被编辑过的属性）
    if (window.templateEditedAttrs.size > 0) {
        const updatePromises = [];
        
        for (const attrId of window.templateEditedAttrs) {
            // 从 templateCurrentAttrs 中查找该属性的最新名称
            function findAttr(attrs, id) {
                for (const attr of attrs) {
                    if (String(attr.id) === String(id)) return attr;
                    if (attr.children && attr.children.length > 0) {
                        const found = findAttr(attr.children, id);
                        if (found) return found;
                    }
                }
                return null;
            }

            const attr = findAttr(window.templateCurrentAttrs, attrId);
            if (attr) {
                updatePromises.push(
                    api(`/attributes/${attrId}`, {
                        method: 'PUT',
                        body: { name: attr.name }
                    })
                );
            }
        }
        
        // 等待所有更新完成
        if (updatePromises.length > 0) {
            const updateResults = await Promise.all(updatePromises);
            const failedUpdates = updateResults.filter(r => !r.success);
            if (failedUpdates.length > 0) {
                showToast(`部分属性名称更新失败`, 'error');
                return;
            }
        }
    }
    
    // 创建属性的映射表（tempId -> 真实ID）
    const attrIdMap = {};
    
    // 先创建新的顶级属性
    const newTopLevelAttrs = window.templateNewAttrs.filter(a => !a.parent_id);
    for (const newAttr of newTopLevelAttrs) {
        const result = await api('/attributes', { 
            method: 'POST', 
            body: { name: newAttr.name, parent_id: null, template_id: templateId } 
        });
        if (result.success) {
            attrIdMap[newAttr.tempId] = result.data.id;
        } else {
            showToast('保存失败：创建属性"' + newAttr.name + '"失败 - ' + (result.message || '服务器错误'), 'error');
            return;
        }
    }
    
    // 创建新的子级属性
    const newChildAttrs = window.templateNewAttrs.filter(a => a.parent_id);
    let remaining = [...newChildAttrs];
    let maxIterations = 10;
    while (remaining.length > 0 && maxIterations > 0) {
        const createdInThisRound = [];
        for (const newAttr of remaining) {
            const parentId = newAttr.parent_id;
            
            // 检查父级是否已创建（可能是已有属性或新创建的属性）
            let parentRealId = null;
            
            // 1. 先检查映射表（新创建的父属性）
            if (attrIdMap[parentId]) {
                parentRealId = attrIdMap[parentId];
            }
            // 2. 如果是数字ID（已有属性）
            else if (!isNaN(parseInt(parentId)) && parseInt(parentId) > 0) {
                parentRealId = parseInt(parentId);
            }
            
            if (parentRealId) {
                const result = await api('/attributes', { 
                    method: 'POST', 
                    body: { name: newAttr.name, parent_id: parentRealId, template_id: templateId } 
                });
                if (result.success) {
                    attrIdMap[newAttr.tempId] = result.data.id;
                    createdInThisRound.push(newAttr);
                } else {
                    showToast('保存失败：创建子属性"' + newAttr.name + '"失败 - ' + (result.message || '服务器错误'), 'error');
                    return;
                }
            } else {
                // 父属性还未创建，等待下一轮
            }
        }
        remaining = remaining.filter(a => !createdInThisRound.includes(a));
        maxIterations--;
    }
    
    // 检查是否有未创建的子属性
    if (remaining.length > 0) {
        showToast('保存失败：部分子属性的父属性未找到 - ' + remaining.map(a => a.name).join(', '), 'error');
        return;
    }
    
    // 构建属性配置（只包含顶级属性！子属性通过 attributes.parent_id 关联）
    const topLevelConfigMap = new Map();

    window.templateNewAttrs.forEach(newAttr => {
        if (!newAttr.parent_id) {
            const realId = attrIdMap[newAttr.tempId];
            if (realId) {
                topLevelConfigMap.set(getTemplateAttrKey(newAttr), {
                    attribute_id: realId,
                    is_required: newAttr.is_required || true
                });
            }
        }
    });

    window.templateCurrentAttrs.forEach(a => {
        if (!a.parent_id || a.parent_id === 0) {
            topLevelConfigMap.set(getTemplateAttrKey(a), {
                attribute_id: a.id,
                is_required: a.is_required || false
            });
        }
    });

    const attributes_config = [];
    (window.templateTopLevelOrder || []).forEach(key => {
        if (topLevelConfigMap.has(key)) {
            attributes_config.push(topLevelConfigMap.get(key));
            topLevelConfigMap.delete(key);
        }
    });
    attributes_config.push(...topLevelConfigMap.values());
    
    // 更新类别模板
    const result = await api(`/categories/${categoryId}/template`, {
        method: 'PUT',
        body: { name, attributes: attributes_config }
    });
    
    if (result.success) {
        showToast('类别"' + name + '"配置已成功保存', 'success');
        bootstrap.Modal.getInstance(document.getElementById('templateModal')).hide();
        // 重新加载所有数据，确保筛选器和属性树同步
        await Promise.all([loadCategories(), loadAttributes()]);
        // 重新渲染筛选器
        renderSidebarCategories();
        renderFilterContainer();
    } else {
        showToast('保存失败：' + (result.message || '服务器错误，请稍后重试'), 'error');
    }
}

    if (name) form.querySelector('input[name="name"]').value = name;
    const modal = new bootstrap.Modal(document.getElementById('attributeModal'));
    modal.show();

    modal._element.addEventListener('shown.bs.modal', function() {
        const nameInput = document.querySelector('#attributeForm input[name="name"]');
        if (nameInput) nameInput.focus();
    }, { once: true });
}

function handleAttributeAction(id, action) {
    const attr = attributes.find(a => a.id === id);
    if (action === 'edit') showAttributeModal(id, attr?.parent_id, attr?.name);
    else if (action === 'add') showAttributeModal(null, id, '');
    else if (action === 'delete') {
        // 检查属性被引用的数量
        api(`/attributes/${id}`).then(result => {
            if (result.success && result.data) {
                const refCount = result.data.referenced_count || 0;
                if (refCount > 0) {
                    const confirmed = confirm(
                        `该属性被${refCount}个物品引用。\n\n删除后，相关物品都将移除这个属性值。\n\n确定要继续删除吗？`
                    );
                    if (!confirmed) return;
                } else {
                    if (!confirm('确定要删除这个属性吗？')) return;
                }
                
                api(`/attributes/${id}`, { method: 'DELETE' }).then(r => {
                    if (r.success) { showToast('属性已删除', 'success'); loadAttributes(); }
                    else showToast(r.message, 'error');
                });
            }
        });
    }
}

}

        attribute_id: a.id,
        is_required: a.is_required
    }));

    const errors = [];

            if (!hasChildren) {
                errors.push('属性"' + newAttr.name + '"没有属性值');
            }
        }

    // 检查已有顶级属性是否还有属性值（可能因删除子属性导致）
    for (const existingAttr of (window.categoryCurrentAttrs || [])) {
        if (!existingAttr.children || existingAttr.children.length === 0) {
            errors.push('属性"' + existingAttr.name + '"没有属性值');

        showToast('保存失败：' + errors.join('；'), 'error');

                for (const attrId of window.categoryDeletedAttrs) {

                    function findAttr(attrs, targetId) {
                        for (const attr of attrs) {
                            if (String(attr.id) === String(targetId)) return attr;
                            if (attr.children && attr.children.length > 0) {
                                const found = findAttr(attr.children, targetId);
                                if (found) return found;

                        return null;

                            method: 'PUT',

                        });

                });
            });
            const finalAttrs = [];

                : await api('/categories', { method: 'POST', body: { name, attributes: finalAttrs } });
            
            if (result.success) {
                showToast(id ? '类别已更新' : '类别已添加', 'success');
                loadCategories();
                loadAttributes();
            } else {
                showToast(result.message || '操作失败', 'error');
            }
        } catch (err) {
            showToast('操作失败: ' + err.message, 'error');
        }
    })();
});
document.getElementById('attributeForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    const id = document.querySelector('#attributeForm input[name="id"]').value;
    const parentId = document.getElementById('attributeParentSelect').value;
    const name = document.querySelector('#attributeForm input[name="name"]').value.trim();
    
    if (!name) {
        showToast('请输入属性名称', 'error');
        return;
    }
    
    if (!parentId) {
        const existsAttr = attributes.some(a => a.id !== parseInt(id) && !a.parent_id && a.name === name);
        if (existsAttr) {
            showToast('顶级属性名称已存在', 'error');
            return;
        }
        
        const existsCategory = categories.some(c => c.name === name);
        if (existsCategory) {
            showToast('属性名称与类别重名', 'error');
            return;
        }
    }
    
    const result = id
        ? await api(`/attributes/${id}`, { method: 'PUT', body: { name, parent_id: parentId || null } })
        : await api('/attributes', { method: 'POST', body: { name, parent_id: parentId || null } });
    if (result.success) {
        showToast(id ? '属性已更新' : '属性已添加', 'success');
        bootstrap.Modal.getInstance(document.getElementById('attributeModal')).hide();
        // 如果是添加子属性，自动展开父节点
        if (!id && parentId) {
            const parentIdNum = parseInt(parentId);
            if (!expandedAttrIds.includes(parentIdNum)) {
                expandedAttrIds.push(parentIdNum);
            }
        }
        loadAttributes();
    } else showToast(result.message, 'error');
});

// 内嵌类别表单提交处理
document.getElementById('inlineCategoryForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    const name = document.getElementById('inlineCategoryName').value.trim();
    
    // 验证类别名称
    if (!name) {
        showToast('保存失败：请填写类别名称', 'error');
        document.getElementById('inlineCategoryName').focus();
        return;
    }
    
    const existsCategory = categories.some(c => c.name === name);
    if (existsCategory) {
        showToast('保存失败：类别名称"' + name + '"已存在，请使用其他名称', 'error');
        return;
    }
    
    const topLevelAttrs = attributes.filter(a => !a.parent_id);
    const existsAttr = topLevelAttrs.some(a => a.name === name);
    if (existsAttr) {
        showToast('保存失败：类别名称与已有属性"' + name + '"重名，请使用其他名称', 'error');
        return;
    }
    
    // 验证属性（顶级属性）
    const fieldNames = window.inlineSelectedAttrs.filter(a => !a.parent_id);
    if (fieldNames.length === 0) {
        showToast('保存失败：请至少添加一个属性', 'error');
        return;
    }
    
    // 验证每个属性下是否有至少一个属性值
    for (const field of fieldNames) {
        const fieldId = field.id || field.tempId;
        const fieldValues = window.inlineSelectedAttrs.filter(a => a.parent_id === fieldId || a.parent_id === field.tempId);
        if (fieldValues.length === 0) {
            showToast('保存失败：属性"' + field.name + '"下没有属性值，请至少添加一个属性值', 'error');
            return;
        }
    }
    
    // 第一步：先创建一个空类别，拿到 category_id 用于属性隔离
    const categoryResult = await api('/categories', { method: 'POST', body: { name, attributes: [] } });
    if (!categoryResult.success) {
        showToast('保存失败：' + (categoryResult.message || '服务器错误，请稍后重试'), 'error');
        return;
    }
    const categoryId = categoryResult.data.id;
    
    // 创建属性的映射表（tempId -> 真实ID）
    const attrIdMap = {};
    
    // 先处理已有属性作为父级的情况
    attributes.filter(a => !a.parent_id).forEach(a => {
        attrIdMap['existing_' + a.id] = a.id;
    });
    
    // 按层级创建属性（先创建顶级，再创建子级），带 category_id 以便按类别隔离
    // 第一轮：创建所有属性（顶级属性）
    for (const field of fieldNames) {
        if (field.tempId) {
            const result = await api('/attributes', { 
                method: 'POST', 
                body: { name: field.name, parent_id: null, category_id: categoryId } 
            });
            if (result.success) {
                attrIdMap[field.tempId] = result.data.id;
            } else {
                showToast('保存失败：创建属性"' + field.name + '"失败 - ' + (result.message || '服务器错误'), 'error');
                return;
            }
        }
    }
    
    // 第二轮：创建所有子级属性
    const childAttrs = window.inlineSelectedAttrs.filter(a => a.parent_id);
    // 按层级排序（先创建二级，再创建三级...）
    const sortedChildren = [];
    let remaining = [...childAttrs];
    let maxIterations = 10; // 防止无限循环
    while (remaining.length > 0 && maxIterations > 0) {
        const createdInThisRound = [];
        for (const attr of remaining) {
            const parentId = attr.parent_id;
            // 检查父级是否已创建
            if (attrIdMap[parentId]) {
                const result = await api('/attributes', { 
                    method: 'POST', 
                    body: { name: attr.name, parent_id: attrIdMap[parentId], category_id: categoryId } 
                });
                if (result.success) {
                    attrIdMap[attr.tempId] = result.data.id;
                    createdInThisRound.push(attr);
                } else {
                    showToast('保存失败：创建子属性"' + attr.name + '"失败 - ' + (result.message || '服务器错误'), 'error');
                    return;
                }
            }
        }
        remaining = remaining.filter(a => !createdInThisRound.includes(a));
        maxIterations--;
    }
    
    // 收集顶级属性ID用于类别模板
    const templateAttrs = fieldNames.map(attr => {
        const realId = attr.tempId ? attrIdMap[attr.tempId] : attr.id;
        return { attribute_id: realId, is_required: true };
    });
    
    // 第二步：更新类别，把属性关联到模板
    const updateResult = await api(`/categories/${categoryId}/template`, {
        method: 'PUT',
        body: { name: name, attributes: templateAttrs }
    });
    
    if (updateResult.success) {
        showToast('类别"' + name + '"已成功添加', 'success');
        await Promise.all([loadCategories(), loadAttributes()]);
        initInlineCategoryForm();
    } else {
        showToast('保存失败：' + (updateResult.message || '服务器错误，请稍后重试'), 'error');
    }
});

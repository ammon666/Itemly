<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no, viewport-fit=cover">
<title>Itemly — 物品管理</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
:root {
  --accent:   #6366F1;
  --accent-2: #8B5CF6;
  --accent-bg: rgba(99,102,241,0.08);
  --white:    #FFFFFF;
  --surface:  #F8F8FA;
  --border:   #EBEBED;
  --ink:      #18181B;
  --sub:      #52525B;
  --muted:    #A1A1AA;
  --danger:   #EF4444;
  --sidebar-w: 224px;
  --nav-h:    56px;
  --radius:   10px;
  --shadow:   0 1px 4px rgba(0,0,0,0.06), 0 4px 16px rgba(0,0,0,0.04);
  --shadow-hover: 0 4px 12px rgba(0,0,0,0.10), 0 12px 32px rgba(0,0,0,0.07);
}

/* 折叠箭头动画 */
.collapse-arrow {
  display: inline-flex;
  align-items: center;
  transition: transform 0.2s ease;
}
.collapse-arrow.collapsed {
  transform: rotate(-90deg);
}

/* 折叠内容 */
.collapse-content {
  overflow: hidden;
  transition: max-height 0.2s ease;
}
.collapse-content.hidden {
  display: none;
}

/* 初始状态: 页面加载时隐藏两个界面, 直到 checkAuth 完成后再显示正确的界面, 防止登录页闪现 */
body.auth-checking #loginPage,
body.auth-checking #appContainer {
  display: none !important;
}

/* 筛选分类组样式 */
.filter-category-group {
  margin-bottom: 12px;
  border: 1px solid var(--border);
  border-radius: 7px;
  overflow: hidden;
}

.filter-category-header {
  padding: 8px 12px;
  background: var(--surface);
  font-weight: 600;
  font-size: 13px;
  color: var(--ink);
  border-bottom: 1px solid var(--border);
}

.filter-category-attrs {
  padding: 6px;
}

/* 单选按钮样式 */
.attr-radio-label {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 12px;
  margin-bottom: 4px;
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: 6px;
  cursor: pointer;
  transition: all 0.2s;
}
.attr-radio-label:hover {
  background: var(--accent-bg);
  border-color: var(--accent);
}
.attr-radio-label input[type="radio"] {
  width: 16px;
  height: 16px;
  accent-color: var(--accent);
}
.attr-radio-label span {
  font-size: 13px;
  color: var(--ink);
}
.attr-radio-label:has(input:checked) {
  background: var(--accent-bg);
  border-color: var(--accent);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { max-width: 100%; overflow-x: hidden; }
body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--surface); color: var(--ink); line-height: 1.5; }
a { text-decoration: none; color: inherit; }
button { cursor: pointer; border: none; background: none; font-family: inherit; }
img { display: block; width: 100%; }
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }

/* LOGIN PAGE */
.login-page {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: linear-gradient(135deg, var(--ink) 0%, var(--accent) 100%);
}
.login-card {
  width: 100%;
  max-width: 380px;
  margin: 1rem;
  padding: 2rem;
  background: var(--white);
  border-radius: var(--radius);
  box-shadow: 0 8px 32px rgba(0,0,0,0.2);
}
.login-logo {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  margin-bottom: 1.5rem;
}
.login-logo-mark {
  width: 40px;
  height: 40px;
  border-radius: 10px;
  background: var(--ink);
  display: flex;
  align-items: center;
  justify-content: center;
}
.login-logo h1 {
  font-size: 1.5rem;
  font-weight: 800;
  color: var(--ink);
}
.form-label {
  font-size: 13px;
  font-weight: 600;
  color: var(--ink);
  margin-bottom: 6px;
}
.form-control {
  height: 38px;
  border-radius: 7px;
  border: 1px solid var(--border);
  font-size: 13px;
  padding: 0 12px;
  transition: border-color .15s;
}
.form-control:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-bg);
}
.login-btn {
  width: 100%;
  height: 40px;
  border-radius: 7px;
  background: var(--accent);
  color: #fff;
  font-size: 13.5px;
  font-weight: 600;
  margin-top: 1rem;
  transition: opacity .15s;
}
.login-btn:hover { opacity: .88; }

/* NAV */
.nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  width: 100%; max-width: 100vw;
  height: var(--nav-h);
  background: var(--white);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; padding: 0 16px; gap: 12px;
  overflow: hidden;
}
.nav-logo {
  display: flex; align-items: center; gap: 8px;
  font-weight: 700; font-size: 16px; color: var(--ink); flex-shrink: 0;
}
.nav-logo-mark {
  width: 28px; height: 28px; border-radius: 7px;
  background: var(--ink);
  display: flex; align-items: center; justify-content: center;
}
.nav-logo-mark svg { width: 15px; height: 15px; }
.nav-search {
  flex: 1 1 auto; min-width: 0; max-width: 360px; margin-left: auto; position: relative;
}
.nav-search input {
  width: 100%; height: 34px; border-radius: 7px;
  background: var(--surface); border: 1px solid var(--border);
  padding: 0 12px 0 34px; font-size: 13px; font-family: inherit; color: var(--ink);
  outline: none; transition: border-color .15s, background .15s;
}
.nav-search input:focus { border-color: var(--accent); background: var(--white); }
.nav-search input::placeholder { color: var(--muted); }
.nav-search-ico { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--muted); pointer-events: none; }
.nav-right { display: flex; align-items: center; gap: 8px; margin-left: 10px; flex-shrink: 0; max-width: 100%; overflow: hidden; }
.btn-primary {
  height: 32px; padding: 0 14px; border-radius: 7px;
  background: var(--accent); color: #fff;
  font-size: 12.5px; font-weight: 600;
  display: flex; align-items: center; gap: 5px;
  transition: opacity .15s;
}
.btn-primary:hover { opacity: .88; }
.nav-user-btn {
  display: flex; align-items: center; gap: 8px;
  padding: 4px 10px 4px 4px;
  border-radius: 999px;
  background: var(--surface); border: 1px solid var(--border);
  color: var(--sub); font-size: 12px; font-weight: 600;
  cursor: pointer; transition: all .15s;
}
.nav-user-btn:hover { background: var(--border); }
.nav-user-avatar {
  width: 28px; height: 28px; border-radius: 50%;
  background: var(--accent); color: #fff;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.nav-user-avatar .nav-avatar-text {
  font-size: 12px; font-weight: 700; color: #fff; letter-spacing: 0.5px;
}
.nav-user-name {
  color: var(--ink); font-size: 12.5px; font-weight: 600;
  max-width: 140px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.nav-logout-icon {
  opacity: .75; flex-shrink: 0;
}
.menu-toggle {
  display: none; width: 32px; height: 32px; border-radius: 6px;
  color: var(--sub); align-items: center; justify-content: center;
  transition: background .15s; flex-shrink: 0;
}
.menu-toggle:hover { background: var(--surface); }

/* LAYOUT */
.layout { display: flex; padding-top: var(--nav-h); min-height: 100vh; max-width: 100vw; overflow-x: hidden; }

/* SIDEBAR */
.sidebar {
  position: fixed; top: var(--nav-h); left: 0;
  width: var(--sidebar-w); height: calc(100vh - var(--nav-h));
  background: var(--white); border-right: 1px solid var(--border);
  overflow-y: auto; z-index: 90; transition: transform .25s ease;
  display: flex; flex-direction: column; padding: 12px 0 24px;
}

/* MAIN */
.main { margin-left: var(--sidebar-w); flex: 1 1 auto; min-width: 0; padding: 20px 22px 64px; width: 100%; }
.sb-section { padding: 16px 0 4px; }
.sb-label {
  font-size: 10.5px; font-weight: 600; letter-spacing: .07em;
  text-transform: uppercase; color: var(--muted);
  padding: 0 16px 6px;
}
.sb-item {
  display: flex; align-items: center; gap: 8px;
  padding: 7px 16px; font-size: 13px; font-weight: 500;
  color: var(--sub); cursor: pointer;
  transition: color .12s, background .12s; position: relative;
}
.sb-item:hover { color: var(--ink); background: var(--surface); }
.sb-item.active { color: var(--accent); background: var(--accent-bg); }
.sb-item svg { flex-shrink: 0; opacity: .65; }
.sb-item.active svg { opacity: 1; }
.sb-divider { height: 1px; background: var(--border); margin: 6px 12px; }
.tree-row {
  display: flex; align-items: center; gap: 7px;
  padding: 6px 16px 6px 24px; font-size: 13px;
  color: var(--sub); cursor: pointer; transition: color .12s, background .12s;
}
.tree-row:hover { color: var(--ink); background: var(--surface); }
.tree-row.active { color: #fff; background: var(--accent); }
.tree-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; background: var(--border); }
.tree-row.active .tree-dot { background: var(--accent); }

/* STATS */
.stats-row { display: grid; grid-template-columns: repeat(3,1fr); gap: 12px; margin-bottom: 20px; width: 100%; max-width: 100%; overflow: hidden; }
.stat-card {
  min-width: 0;
  background: var(--white); border-radius: var(--radius);
  border: 1px solid var(--border);
  padding: 14px 16px;
  display: flex; align-items: center; gap: 12px;
  animation: up .35s ease both;
}
.stat-card:nth-child(2) { animation-delay: .05s; }
.stat-card:nth-child(3) { animation-delay: .10s; }
.stat-ico {
  width: 36px; height: 36px; border-radius: 8px;
  background: var(--surface); color: var(--sub);
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.stat-ico.hi { background: var(--accent-bg); color: var(--accent); }
.stat-num { font-size: 22px; font-weight: 700; line-height: 1; color: var(--ink); }
.stat-lbl { font-size: 11.5px; color: var(--muted); margin-top: 2px; font-family: 'Inter', sans-serif; }

/* TOOLBAR */
.toolbar { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; }
.toolbar-title { font-size: 14px; font-weight: 600; color: var(--ink); flex-shrink: 0; }
.toolbar-selection { font-size: 12.5px; color: var(--sub); margin-left: 8px; flex-shrink: 0; min-width: 90px; }
.toolbar-selection b { color: var(--accent); margin: 0 2px; }
.toolbar-spacer { flex: 1; }
.toolbar-group { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
.toolbar-sep { display: inline-block; width: 1px; height: 20px; background: var(--border); margin: 0 2px; flex-shrink: 0; }
.toolbar-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; min-width: 0; overflow-x: auto; max-width: 100%; }
.toolbar-right .chips { flex-shrink: 0; }

@media (max-width: 768px) {
  .nav { padding: 0 10px; gap: 8px; }
  .nav-logo { font-size: 14px; }
  .nav-right { gap: 4px; margin-left: 6px; }
  .toolbar-right {
    gap: 4px;
    flex-wrap: wrap;
    overflow-x: visible;
  }
  .toolbar-right .btn-primary span,
  .toolbar-right .sort-btn span {
    display: none;
  }
  .toolbar-right .btn-primary,
  .toolbar-right .sort-btn {
    padding: 0 8px;
  }
  .toolbar-sep { display: none; }
  .toolbar-group { gap: 4px; }
  .card-name { font-size: 12.5px; }
}

@media (max-width: 560px) {
  .main { padding: 14px 12px 64px; }
  .toolbar { gap: 6px; }
  .toolbar-selection { min-width: 0; }
  .nav-search { margin-left: 4px; }
  .nav-right .btn-primary { display: none; }
  .nav-user-name { display: none; }
}

/* 原批量操作条样式保留，但主页面已将按钮嵌入工具栏，此处仅作兼容（其他页面若用到） */
.batch-bar {
  display: flex; align-items: center; gap: 10px;
  background: var(--white); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 8px 12px; margin-bottom: 10px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.04);
}
.batch-count { font-size: 12.5px; color: var(--sub); }
.batch-count b { color: var(--accent); margin: 0 2px; }
.chips { display: flex; gap: 6px; flex-wrap: wrap; }
.chip {
  display: flex; align-items: center; gap: 4px;
  padding: 3px 8px 3px 10px; border-radius: 99px;
  background: var(--accent-bg); color: var(--accent);
  font-size: 11.5px; font-weight: 500; border: 1px solid rgba(99,102,241,.2);
}
.chip-x {
  width: 14px; height: 14px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 9px; background: rgba(99,102,241,.15); cursor: pointer;
  transition: background .12s;
}
.chip-x:hover { background: rgba(99,102,241,.35); }
.sort-btn {
  height: 30px; padding: 0 12px; border-radius: 6px;
  border: 1px solid var(--border); background: var(--white);
  font-size: 12px; font-weight: 500; color: var(--ink);
  display: flex; align-items: center; gap: 5px; transition: border-color .12s, color .12s;
}
.sort-btn:hover { border-color: var(--accent); color: var(--ink); }

/* GRID */
.grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 14px; width: 100%; max-width: 100%; overflow: hidden; }

/* CARD */
.card {
  min-width: 0;
  background: var(--white); border-radius: var(--radius);
  border: 1px solid var(--border); overflow: hidden;
  cursor: pointer; position: relative;
  transition: transform .18s ease, box-shadow .18s ease;
  animation: up .4s ease both;
  display: flex; flex-direction: column;
}
.card:nth-child(2) { animation-delay:.04s }
.card:nth-child(3) { animation-delay:.08s }
.card:nth-child(4) { animation-delay:.12s }
.card:nth-child(5) { animation-delay:.16s }
.card:nth-child(6) { animation-delay:.20s }
.card:hover { transform: translateY(-3px); box-shadow: var(--shadow-hover); }

.card-img {
  position: relative; aspect-ratio: 16/9; overflow: hidden; background: var(--surface);
}
.card-img img { width: 100%; height: 100%; object-fit: cover; transition: transform .35s ease; }
.card:hover .card-img img { transform: scale(1.05); }
.card-img-ph { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; color: var(--border); font-size: 28px; }

/* hover overlay actions */
.card-overlay {
  position: absolute; top: 6px; right: 6px;
  display: flex; gap: 4px;
  opacity: 0; transition: opacity .15s;
}
.card:hover .card-overlay { opacity: 1; }
.ov-btn {
  width: 26px; height: 26px; border-radius: 5px;
  background: rgba(255,255,255,.92); backdrop-filter: blur(4px);
  display: flex; align-items: center; justify-content: center;
  color: var(--sub); transition: color .12s, background .12s;
  border: 1px solid rgba(0,0,0,.06);
}
.ov-btn:hover { color: var(--ink); background: #fff; }
.ov-btn.del:hover { color: var(--danger); }

.card-body { padding: 10px 12px 11px; flex: 1; display: flex; flex-wrap: wrap; align-items: center; gap: 6px; }
.card-name { font-size: 13.5px; font-weight: 600; color: var(--ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex-shrink: 0; }
.card-note {
  font-size: 11.5px; color: var(--muted); font-family: 'Inter', sans-serif; line-height: 1.45;
  display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; overflow: hidden;
}
.card-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px; align-items: center; }
.tag {
  display: inline-flex; align-items: center;
  padding: 2px 7px; border-radius: 4px; font-size: 11px; font-weight: 500;
  cursor: pointer; transition: background .12s;
}
.tag-cat { background: var(--accent-bg); color: #18181B; border: 1px solid rgba(99,102,241,0.25); }
.tag-cat:hover { background: rgba(99,102,241,0.15); color: #18181B; border-color: rgba(99,102,241,0.4); }
.tag-attr { background: #FEFCE8; color: #18181B; border: 1px solid #FDE047; }
.tag-remark { background: #F3F4F6; color: #18181B; border: 1px solid #E5E7EB; }
.tag-divider { display: inline-block; width: 1px; height: 12px; background: #D1D5DB; margin: 0 6px; vertical-align: middle; }
.tag-more { background: transparent; color: var(--muted); border: 1px solid var(--border); font-size: 10.5px; }

/* LIST VIEW */
.list-view {
  display: flex; flex-direction: column; gap: 6px; width: 100%; max-width: 100%;
}
.list-item {
  display: flex; align-items: center; gap: 10px; min-width: 0; width: 100%;
  background: var(--white); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 8px 10px;
  transition: background .12s;
}
.list-item:hover { background: var(--surface); }
.list-item.selected { background: var(--accent-bg); border-color: var(--accent); }
.list-checkbox { width: 16px; height: 16px; border-radius: 4px; flex-shrink: 0; }
.list-img { width: 50px; height: 50px; border-radius: 5px; background: var(--surface); object-fit: cover; flex-shrink: 0; }
.list-info { flex: 1; min-width: 0; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
.list-name { font-size: 13px; font-weight: 600; color: var(--ink); flex-shrink: 0; }
.list-meta { font-size: 12px; color: var(--muted); display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
.list-actions { display: flex; gap: 3px; opacity: 0; transition: opacity .12s; }
.list-item:hover .list-actions { opacity: 1; }
.list-actions .ov-btn { width: 26px; height: 26px; }

/* PAGINATION */
.pagination {
  display: flex; align-items: center; justify-content: center;
  gap: 6px; margin-top: 16px; padding: 10px;
  background: var(--white); border: 1px solid var(--border);
  border-radius: var(--radius);
}
.pagination-info {
  font-size: 12px; color: var(--sub);
  margin-right: 12px;
}
.pagination-size-select {
  height: 28px; padding: 0 10px; border-radius: 5px;
  border: 1px solid var(--border);
  font-size: 12px; color: var(--ink);
}
.pagination-btn {
  width: 28px; height: 28px; border-radius: 5px;
  border: 1px solid var(--border);
  background: var(--white);
  font-size: 12px; color: var(--sub);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  transition: all .12s;
}
.pagination-btn:hover { border-color: var(--accent); color: var(--accent); }
.pagination-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
.pagination-btn:disabled { opacity: 0.4; cursor: not-allowed; }

/* VIEW MODE ACTIVE */
.sort-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

/* EDIT MODE */
.edit-mode .card-overlay { opacity: 1; }
.edit-mode .list-actions { opacity: 1; }

/* MODALS */
.modal-content { border-radius: var(--radius); border: 1px solid var(--border); max-width: 100%; word-break: break-word; }
.modal-dialog { max-width: calc(100vw - 20px); margin: 1.75rem auto; }

/* 内容较多的弹窗：占屏幕 2/3 */
#itemModal .modal-dialog,
#itemDetailModal .modal-dialog,
#templateModal .modal-dialog,
#batchEditModal .modal-dialog {
  max-width: 66.6667vw; width: 66.6667vw; margin-left: auto; margin-right: auto;
}

/* 内容较少的弹窗：占屏幕 1/2 */
#categoryModal .modal-dialog,
#attributeModal .modal-dialog {
  max-width: 50vw; width: 50vw; margin-left: auto; margin-right: auto;
}

@media (max-width: 768px) {
  #itemModal .modal-dialog,
  #itemDetailModal .modal-dialog,
  #templateModal .modal-dialog,
  #batchEditModal .modal-dialog,
  #categoryModal .modal-dialog,
  #attributeModal .modal-dialog {
    max-width: calc(100vw - 20px); width: calc(100vw - 20px);
  }
}
.modal-header { border-bottom: 1px solid var(--border); padding: 14px 16px; flex-wrap: wrap; }
.modal-title { font-size: 15px; font-weight: 600; color: var(--ink); word-break: break-word; }
.modal-body { padding: 16px; }
.modal-footer { border-top: 1px solid var(--border); padding: 12px 16px; gap: 8px; display: flex; align-items: center; flex-wrap: wrap; justify-content: flex-end; }
.modal-footer .btn { height: 34px; padding: 0 14px; border-radius: 7px; font-size: 13px; font-weight: 500; display: inline-flex; align-items: center; justify-content: center; }
.modal-footer .btn-primary { height: 34px; padding: 0 14px; font-size: 13px; font-weight: 500; display: inline-flex; align-items: center; justify-content: center; }
.btn-secondary { background: var(--surface); border: 1px solid var(--border); color: var(--sub); height: 34px; padding: 0 14px; border-radius: 7px; font-size: 13px; font-weight: 500; display: inline-flex; align-items: center; justify-content: center; }
.btn-secondary:hover { background: var(--border); }
.btn-xs {
  width: 26px; height: 26px; border-radius: 6px;
  background: var(--surface); border: 1px solid var(--border);
  color: var(--sub); display: flex; align-items: center;
  justify-content: center; cursor: pointer;
  transition: all .12s;
}
.btn-xs:hover { background: var(--border); }
.btn-xs.btn-danger { background: rgba(239,68,68,.1); border-color: rgba(239,68,68,.3); color: var(--danger); }
.btn-xs.btn-danger:hover { background: rgba(239,68,68,.15); }
.btn-outline-danger { border: 1px solid var(--danger); color: var(--danger); }
.btn-outline-danger:hover { background: rgba(239,68,68,.1); }

/* FORM */
.form-label { font-size: 13px; font-weight: 600; color: var(--ink); margin-bottom: 6px; display: block; }
.form-control, .form-select {
  height: 38px; border-radius: 7px; border: 1px solid var(--border);
  font-size: 13px; padding: 0 12px; font-family: inherit;
  transition: border-color .15s;
}
.form-control:focus, .form-select:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-bg); outline: none; }
textarea.form-control { height: auto; min-height: 80px; padding: 10px 12px; resize: vertical; }

/* IMAGE UPLOAD */
.image-upload-zone {
  border: 2px dashed var(--border); border-radius: var(--radius);
  padding: 2rem; text-align: center; cursor: pointer;
  transition: all .15s; background: var(--surface);
}
.image-upload-zone:hover { border-color: var(--accent); background: var(--accent-bg); }
.image-upload-zone.has-image { padding: 0; border-style: solid; }
.image-upload-zone img { max-width: 100%; max-height: 200px; border-radius: 7px; object-fit: cover; }

/* ATTR SELECTOR */
.attr-selector {
  width: 100%;
  max-width: 100%;
  max-height: 300px; overflow-y: auto; overflow-x: hidden;
  border: 1px solid var(--border); border-radius: 7px; padding: 8px;
  background: var(--surface);
}
.attr-group { margin-bottom: 8px; }
.attr-group-header {
  font-weight: 600; padding: 8px 10px; background: var(--white);
  border-radius: 6px; cursor: pointer; font-size: 13px; color: var(--ink);
  word-break: break-word;
}
.attr-group-header.required { color: var(--danger); }
.attr-group-items { padding-left: 12px; display: none; }
.attr-group-items.show { display: block; }
.attr-item { padding: 6px 10px; cursor: pointer; border-radius: 6px; margin: 2px 0; font-size: 13px; color: var(--sub); }
.attr-item:hover { background: var(--white); }
.attr-item.selected { background: var(--accent); color: #fff; }
.attr-item.disabled { opacity: 0.4; cursor: not-allowed; }

/* TREE SELECTOR */
.tree-selector {
  width: 100%;
  max-width: 100%;
  max-height: calc(100vh - 200px);
  height: calc(100vh - 200px);
  overflow-y: auto;
  overflow-x: hidden;
  border: 1px solid var(--border); border-radius: 7px; padding: 8px;
  background: var(--surface);
}

/* 筛选侧边栏body样式 */
.filter-body {
  padding: 8px;
  margin: 0;
  height: calc(100% - 56px);
  overflow-y: auto;
}

/* ADMIN CARD */
.admin-card {
  background: var(--white); border-radius: var(--radius);
  border: 1px solid var(--border); padding: 16px; margin-bottom: 16px;
  width: 100%; max-width: 100%; overflow: hidden;
}
.admin-card-title {
  font-size: 14px; font-weight: 600; color: var(--ink);
  margin-bottom: 12px; padding-bottom: 10px; border-bottom: 1px solid var(--border);
}
.page-title {
  font-size: 16px; font-weight: 600; color: var(--ink); margin-bottom: 16px;
  display: flex; align-items: center; justify-content: space-between;
}

/* LIGHTBOX */
.lightbox {
  position: fixed; inset: 0; z-index: 999;
  background: rgba(0,0,0,.75);
  display: flex; align-items: center; justify-content: center;
  opacity: 0; pointer-events: none; transition: opacity .2s;
}
.lightbox.open { opacity: 1; pointer-events: auto; }
.lightbox img {
  max-width: min(88vw,760px); max-height: 84vh;
  border-radius: var(--radius); object-fit: contain;
  transform: scale(.94); transition: transform .2s;
}
.lightbox.open img { transform: scale(1); }
.lb-close {
  position: absolute; top: 16px; right: 20px;
  width: 36px; height: 36px; border-radius: 50%;
  background: rgba(255,255,255,.15); color: #fff; font-size: 18px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: background .12s;
}
.lb-close:hover { background: rgba(255,255,255,.25); }

/* TOAST */
.toast-wrap { position: fixed; top: 66px; right: 16px; z-index: 9999; display: flex; flex-direction: column; gap: 6px; pointer-events: none; max-width: calc(100vw - 32px); }
.toast {
  max-width: 100%;
  padding: 8px 14px; border-radius: 7px;
  background: var(--ink); color: #fff;
  font-size: 12.5px; font-weight: 500;
  display: flex; align-items: center; gap: 7px;
  word-break: break-word;
  transform: translateX(110%); transition: transform .25s ease;
  pointer-events: auto; box-shadow: 0 4px 14px rgba(0,0,0,.15);
}
.toast.show { transform: translateX(0); }
.t-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); flex-shrink: 0; }
.toast.success .t-dot { background: #22C55E; }
.toast.error   .t-dot { background: var(--danger); }

/* FAB */
.fab {
  display: none; position: fixed; bottom: 20px; right: 16px; z-index: 200;
  width: 48px; height: 48px; border-radius: 50%;
  background: var(--accent); color: #fff;
  align-items: center; justify-content: center;
  box-shadow: 0 4px 14px rgba(99,102,241,.4);
  transition: transform .15s, box-shadow .15s;
}
.fab:hover { transform: scale(1.07); }

/* OVERLAY */
.sb-overlay { display: none; position: fixed; inset: 0; z-index: 89; background: rgba(0,0,0,.3); }

/* OFFCANVAS */
.offcanvas { width: 280px; max-width: 85vw; }
.offcanvas-header { padding: 14px 16px; border-bottom: 1px solid var(--border); }
.offcanvas-title { font-size: 15px; font-weight: 600; color: var(--ink); }
.offcanvas-body { padding: 16px; overflow-x: hidden; }

/* TREE ROW SELECTED */
.tree-row.selected { color: #fff; background: var(--accent); }
.tree-row.selected .tree-dot { background: #fff; }

/* EMPTY */
.empty { grid-column:1/-1; padding: 56px 24px; text-align: center; color: var(--muted); }
.empty-icon { font-size: 40px; margin-bottom: 10px; opacity: .35; }
.empty-title { font-size: 15px; font-weight: 600; color: var(--ink); margin-bottom: 4px; }
.empty-desc { font-size: 12.5px; }

/* LOADING */
.loading-overlay {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(255,255,255,.9); display: flex;
  align-items: center; justify-content: center; z-index: 9999;
}

@keyframes up {
  from { opacity:0; transform:translateY(10px); }
  to   { opacity:1; transform:translateY(0); }
}
@media (prefers-reduced-motion:reduce) { *,*::before,*::after { animation-duration:0s!important; transition-duration:0s!important; } }

@media (max-width:1080px) { .grid { grid-template-columns:repeat(2,1fr); } }

@media (max-width:900px) {
  .sidebar { transform: translateX(-100%); box-shadow: none; }
  .sidebar.open { transform: translateX(0); box-shadow: 4px 0 24px rgba(0,0,0,.1); }
  .sb-overlay { display: none; }
  .sb-overlay.show { display: block; }
  .main { margin-left: 0; padding: 16px 14px 64px; }
  .menu-toggle { display: flex; }
  .btn-primary span { display: none; }
  .btn-primary { padding: 0 10px; }
  .fab { display: flex; }
}

@media (max-width:560px) {
  .grid { grid-template-columns: 1fr; }
  .stats-row { grid-template-columns: repeat(3,1fr); gap: 6px; }
  .stat-card { padding: 8px 10px; }
  .stat-ico { width: 28px; height: 28px; }
  .stat-ico svg { width: 14px; height: 14px; }
  .stat-num { font-size: 14px; }
  .stat-lbl { font-size: 10px; }
  .nav-search { max-width: 100%; }
  .nav-right .btn-primary { display: none; }
}

/* 管理页面响应式 */
@media (max-width: 900px) {
  #pageManagement > div[style*="grid"],
  #pageSettings > div[style*="grid"] {
    grid-template-columns: 1fr !important;
  }
  .admin-card { overflow: hidden; }
  .attr-selector, .tree-selector { overflow-x: hidden; }
  .nav-user-name { max-width: 80px; }
}

/* 小屏通用优化：防止文字/容器在极窄视口下溢出 */
@media (max-width: 420px) {
  .nav { padding: 0 8px; gap: 6px; }
  .nav-logo { font-size: 13px; gap: 6px; }
  .main { padding: 12px 8px 64px; }
  .stats-row { gap: 4px; }
  .stat-card { padding: 6px 8px; gap: 6px; }
  .stat-num { font-size: 13px; }
  .stat-lbl { font-size: 9.5px; }
  .stat-ico { width: 24px; height: 24px; }
  .toolbar-title { font-size: 13px; }
  .card-name { font-size: 12px; white-space: normal; }
  .login-card { padding: 1.25rem; margin: 0.5rem; }
}

/* App Container */
.app-container { display: none; }
.app-container.active { display: block; }
</style>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<!-- 图片压缩库 -->
<script src="https://cdn.jsdelivr.net/npm/browser-image-compression@2.0.2/dist/browser-image-compression.js"></script>

<script>
const API_BASE = '/api';
let currentUser = null;
let categories = [];
let attributes = [];
let items = [];
let currentItemId = null;
let currentTemplateId = null;
let currentItemImages = [];
let keepAdding = false;
let selectedItemIds = [];
let searchDebounceTimer = null;
let viewMode = 'card';
let editMode = false;
let viewModeBeforeEdit = 'card'; // 记录进入编辑模式前的视图模式

// 统一的属性树折叠状态管理
const collapsedNodes = new Set(); // 存储已折叠的节点ID

const homeFilter = { categories: [], attributes: [], keyword: '' };
const itemsFilter = { categories: [], attributes: [], keyword: '' };
let activeFilter = homeFilter;

// 统一的属性树渲染函数
// params: { attrs, containerId, collapsedKey, onAddChild, onEdit, onDelete, onToggleCollapse }
// collapsedKey: 用于区分不同场景的折叠状态（如 'inline', 'template', 'selector'）
function renderAttrTree({ attrs, containerId, collapsedKey = '', onAddChild, onEdit, onDelete, showActions = true }) {
    const container = document.getElementById(containerId);
    if (!container || attrs.length === 0) {
        if (container) container.innerHTML = '<p style="color:var(--muted);font-size:12px;text-align:center;">暂无属性</p>';
        return;
    }
    
    const prefix = collapsedKey ? collapsedKey + '_' : '';
    
    // 构建ID映射
    const attrMap = {};
    attrs.forEach(a => {
        attrMap[a.id] = a;
    });
    
    // 获取顶级属性
    const topLevelAttrs = attrs.filter(a => !a.parent_id);
    
    function getChildren(parentId) {
        return attrs.filter(a => String(a.parent_id) === String(parentId));
    }
    
    function renderNode(attr, level = 0) {
        const id = String(attr.id);
        const children = getChildren(attr.id);
        const hasChildren = children.length > 0;
        const isCollapsed = collapsedNodes.has(prefix + id);
        const indent = level * 20;
        
        let html = `
            <div style="margin-bottom:4px;">
                <div style="display:flex;align-items:center;gap:8px;padding:6px 8px;margin-left:${indent}px;background:var(--white);border-radius:4px;border:1px solid var(--border);cursor:${hasChildren ? 'pointer' : 'default'};" onclick="${hasChildren ? `toggleAttrCollapse('${prefix}', '${id}')` : ''}">
                    ${hasChildren ? `
                        <span class="collapse-arrow ${isCollapsed ? 'collapsed' : ''}" style="color:var(--sub);transition:transform .2s;display:inline-flex;align-items:center;">
                            <svg width="12" height="12" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
                        </span>
                    ` : '<span style="width:12px;"></span>'}
                    <span style="flex:1;font-size:13px;">
                        ${level === 0 ? '<strong>' + attr.name + '</strong>' : attr.name}
                    </span>
                    ${showActions ? `
                    <div style="display:flex;gap:4px;" onclick="event.stopPropagation();">
                        <button type="button" onclick="${onAddChild ? `${onAddChild}('${id}')` : ''}" title="添加子属性" style="background:none;border:none;color:var(--success);cursor:pointer;font-size:14px;padding:2px 6px;">
                            <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
                            </svg>
                        </button>
                        <button type="button" onclick="${onEdit ? `${onEdit}('${id}')` : ''}" title="编辑属性" style="background:none;border:none;color:var(--sub);cursor:pointer;font-size:14px;padding:2px 6px;">
                            <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                <path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/>
                                <path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/>
                            </svg>
                        </button>
                        <button type="button" onclick="${onDelete ? `${onDelete}('${id}', '${attr.name}')` : ''}" title="删除属性" style="background:none;border:none;color:var(--danger);cursor:pointer;font-size:14px;padding:2px 6px;">
                            <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                <path d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
                            </svg>
                        </button>
                    </div>
                    ` : ''}
                </div>
                <div class="collapse-content ${isCollapsed ? 'hidden' : ''}">
                    ${children.map(child => renderNode(child, level + 1)).join('')}
                </div>
            </div>
        `;
        return html;
    }
    
    container.innerHTML = topLevelAttrs.map(attr => renderNode(attr)).join('');
}

// 切换折叠状态
function toggleAttrCollapse(prefix, id) {
    const key = prefix + id;
    if (collapsedNodes.has(key)) {
        collapsedNodes.delete(key);
    } else {
        collapsedNodes.add(key);
    }
    // 重新渲染
    const container = event.target.closest('div[style*="margin-bottom"]')?.parentElement;
    if (container) {
        // 找到对应的渲染函数并重新调用
        container.innerHTML = container.innerHTML;
    }
    // 触发重新渲染 - 查找是哪个容器
    if (container && container.id) {
        if (container.id === 'inlineAttrTree') renderInlineAttrTree();
        else if (container.id === 'templateCurrentAttrs') renderTemplateCurrentAttrs();
    }
}

// 清除指定前缀的折叠状态
function clearCollapsedState(prefix) {
    collapsedNodes.forEach(key => {
        if (key.startsWith(prefix)) collapsedNodes.delete(key);
    });
}

function stringHash(str) {
    let hash = 0;
    for (let i = 0; i < str.length; i++) {
        const char = str.charCodeAt(i);
        hash = ((hash << 5) - hash) + char;
        hash = hash & hash;
    }
    return Math.abs(hash);
}

async function api(endpoint, options = {}) {
    try {
        const config = { headers: { 'Content-Type': 'application/json' }, credentials: 'include', ...options };
        if (config.body && typeof config.body === 'object') config.body = JSON.stringify(config.body);
        const response = await fetch(API_BASE + endpoint, config);
        let data;
        try { data = await response.json(); } catch (e) {
            if (response.status === 401) {
                // session 失效，统一跳回登录页
                currentUser = null;
                showLogin();
                showToast('登录状态已失效，请重新登录', 'error');
                return { success: false, message: '请先登录', unauthenticated: true };
            }
            return { success: false, message: '服务器返回数据格式错误' };
        }
        if (response.status === 401 || (data && data.unauthenticated)) {
            currentUser = null;
            showLogin();
            showToast(data.message || '登录状态已失效，请重新登录', 'error');
            return { ...(data || {}), success: false, unauthenticated: true };
        }
        return data;
    } catch (error) {
        console.error('API请求失败:', endpoint, error);
        return { success: false, message: '网络请求失败，请检查服务器连接' };
    }
}

function showToast(msg, type = 'default') {
    const w = document.getElementById('toastWrap'), el = document.createElement('div');
    el.className = `toast ${type}`;
    el.innerHTML = `<span class="t-dot"></span>${msg}`;
    w.appendChild(el);
    requestAnimationFrame(() => requestAnimationFrame(() => el.classList.add('show')));
    setTimeout(() => { el.classList.remove('show'); setTimeout(() => el.remove(), 300); }, 2500);
}

// 处理列表项点击事件
function handleListItemClick(itemId, event) {
    // 只有在编辑模式下才响应点击选中
    if (!editMode) return;
    
    // 获取点击的元素
    const target = event.target;
    
    // 检查是否点击了图片、标签、编辑按钮、删除按钮或复选框
    const isSpecialElement = 
        target.classList.contains('list-img') ||
        target.classList.contains('tag') ||
        target.classList.contains('ov-btn') ||
        target.classList.contains('list-checkbox') ||
        target.closest('.list-img') ||
        target.closest('.tag') ||
        target.closest('.ov-btn') ||
        target.closest('.list-checkbox');
    
    // 如果点击的是特殊元素，不触发选中
    if (isSpecialElement) return;
    
    // 切换选中状态
    toggleItemSelection(itemId);
}

/**
 * 工具栏批量按钮控制：批量编辑属性 / 批量删除 放在「进入编辑」按钮左侧，且
 * 「已选择 N 个物品」计数显示在标题右侧，位置固定，避免勾选后页面跳变。
 * 显示条件：列表视图 + 编辑模式 + 有选中物品
 * 批量编辑属性按钮额外要求：所有选中物品必须属于同一类别
 */
function updateBatchButtons() {
    const countBar = document.getElementById('batchCountBar');
    const countEl = document.getElementById('batchCountText');
    const batchEditBtn = document.getElementById('batchEditBtn');
    const batchDeleteBtn = document.getElementById('batchDeleteBtn');

    const shouldShow = (viewMode === 'list') && editMode && (selectedItemIds.length > 0);

    // 标题右侧计数 —— 用 visibility，不挤走其他按钮位置
    if (countBar) countBar.style.visibility = shouldShow ? 'visible' : 'hidden';
    if (countEl) countEl.textContent = selectedItemIds.length;

    // 批量删除按钮用 display:none / inline-flex
    if (batchDeleteBtn) batchDeleteBtn.style.display = shouldShow ? 'inline-flex' : 'none';

    // 批量编辑属性按钮：需要检查所有选中物品是否属于同一类别
    if (batchEditBtn) {
        if (shouldShow) {
            const sameCategory = checkSelectedItemsSameCategory();
            batchEditBtn.style.display = 'inline-flex';
            batchEditBtn.disabled = !sameCategory;
            batchEditBtn.style.opacity = sameCategory ? '1' : '0.5';
            batchEditBtn.style.cursor = sameCategory ? 'pointer' : 'not-allowed';
        } else {
            batchEditBtn.style.display = 'none';
            batchEditBtn.disabled = false;
        }
    }
}

/**
 * 检查所有选中的物品是否属于同一类别
 * @returns {boolean} 是否所有选中物品属于同一类别
 */
function checkSelectedItemsSameCategory() {
    if (selectedItemIds.length === 0) return false;
    
    // 获取所有选中物品的类别ID
    const selectedItems = items.filter(item => selectedItemIds.includes(item.id));
    if (selectedItems.length === 0) return false;
    
    // 获取第一个物品的类别ID
    const firstCategoryId = selectedItems[0].category_id;
    
    // 检查所有选中物品的类别ID是否相同
    return selectedItems.every(item => item.category_id === firstCategoryId);
}

async function batchDeleteItems() {
    if (selectedItemIds.length === 0) { showToast('请先选择物品', 'error'); return; }
    if (!confirm(`确定要删除选中的 ${selectedItemIds.length} 个物品吗？此操作不可撤销。`)) return;
    try {
        const result = await api('/items/batch-delete', {
            method: 'POST',
            body: { item_ids: selectedItemIds }
        });
        if (result.success) {
            showToast(`已删除 ${result.deleted || selectedItemIds.length} 个物品`, 'success');
            selectedItemIds = [];
            loadItems();
        } else {
            showToast(result.message || '批量删除失败', 'error');
        }
    } catch (e) {
        showToast('网络错误', 'error');
    }
}

async function loadItems(filter) {
    const f = filter || activeFilter || homeFilter;
    try {
        const params = new URLSearchParams();
        if (f.categories && f.categories.length) params.append('category_ids', f.categories.join(','));
        if (f.keyword) params.append('keyword', f.keyword);
        if (f.attributes && f.attributes.length) params.append('attribute_ids', f.attributes.join(','));
        const result = await api('/items?' + params.toString());
        if (result.success) {
            items = result.data || [];
            renderItems();
            updateHomeStats();
            const itemsPage = document.getElementById('pageItems');
            if (itemsPage && itemsPage.style.display !== 'none') {
                renderItemsManagement();
                updateItemsStats();
            }
        } else items = [];
    } catch (error) { console.error('加载物品失败:', error); items = []; }
}

function updateFilterChips() {
    const container = document.getElementById('homeFilterChips');
    const resetBtn = document.querySelector('.sort-btn[onclick="clearAllFilters()"]');
    
    // 检查是否有筛选条件
    const hasFilters = activeFilter.categories.length > 0 || 
                       activeFilter.attributes.length > 0 || 
                       activeFilter.keyword;
    
    // 更新重置按钮样式
    if (resetBtn) {
        resetBtn.style.background = hasFilters ? '#F59E0B' : '';
        resetBtn.style.color = hasFilters ? '#fff' : '';
        resetBtn.style.borderColor = hasFilters ? '#F59E0B' : '';
    }
    
    if (!container) return;
    const chips = [];
    if (activeFilter.categories.length) {
        activeFilter.categories.forEach(catId => {
            const cat = categories.find(c => c.id === catId);
            if (cat) chips.push(`<div class="chip">${cat.name}<span class="chip-x" onclick="event.stopPropagation();toggleCategoryFilter(${catId})">✕</span></div>`);
        });
    }
    if (activeFilter.attributes.length) {
        activeFilter.attributes.forEach(attrId => {
            const attr = attributes.find(a => a.id === attrId);
            if (attr) chips.push(`<div class="chip">${attr.name}<span class="chip-x" onclick="event.stopPropagation();toggleAttributeFilter(${attrId})">✕</span></div>`);
        });
    }
    if (activeFilter.keyword) {
        chips.push(`<div class="chip">"${activeFilter.keyword}"<span class="chip-x" onclick="event.stopPropagation();removeKeywordFilter()">✕</span></div>`);
    }
    container.innerHTML = chips.join('');
}

function toggleAttributeFilter(attrId) {
    const f = activeFilter;
    const idx = f.attributes.indexOf(attrId);
    if (idx >= 0) f.attributes.splice(idx, 1);
    else f.attributes.push(attrId);

    updateFilterChips();

function renderFilterContainer() {

                        <span style="display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;border-radius:4px;background:${isCatSelected ? 'rgba(255,255,255,0.2)' : 'var(--accent-bg)'};margin-right:6px;">

                    ` : ''}

                    ${hasAttrs ? renderFilterAttrTree(cat.attributes) : ''}
                </div>

        `;

}

function renderFilterAttrTree(attrTree) {
    function renderNode(nodes, level = 0) {
        if (!nodes || nodes.length === 0) return '';
        
        const indent = level * 16;
        return nodes.map(n => {
            const hasChildren = n.children && n.children.length > 0;
            const isSelected = homeFilter.attributes.includes(n.id);
            const isTopLevel = level === 0;
            const canSelect = !isTopLevel;
            
            return `
                <div style="margin-bottom:2px;">
                    <div style="display:flex;align-items:center;gap:6px;padding:6px 8px;margin-left:${indent}px;background:${isSelected && canSelect ? 'var(--accent)' : 'var(--white)'};border-radius:4px;border:1px solid ${isSelected && canSelect ? 'var(--accent)' : 'var(--border)'};cursor:pointer;color:${isSelected && canSelect ? '#fff' : 'inherit'}" onclick="${hasChildren ? '' : ''}${canSelect ? `toggleHomeAttributeFilter(${n.id})` : ''}">
                        ${hasChildren ? `
                            <span class="collapse-arrow" style="color:${isSelected && canSelect ? '#fff' : 'var(--sub)'};display:inline-flex;align-items:center;" onclick="event.stopPropagation();toggleFilterAttrCollapse('attr_${n.id}')">
                                <svg width="12" height="12" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
                            </span>
                        ` : '<span style="width:12px;"></span>'}
                        <span style="flex:1;font-size:13px;${isTopLevel ? 'font-weight:600;' : ''}">
                            ${n.name}
                        </span>
                        ${isSelected && canSelect ? `
                            <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
                        ` : ''}
                    </div>
                    <div id="attr_${n.id}_content" class="collapse-content" style="padding-left:8px;">
                        ${renderNode(n.children, level + 1)}
                    </div>
                </div>
            `;
        }).join('');
    }
    
    return renderNode(attrTree, 0);
}

/** 从类别模板加载批量编辑的属性 */
async function loadBatchTemplateAttributes(categoryId) {
    const container = document.getElementById('batchAttrSelector');
    
    try {
        const result = await api(`/categories/${categoryId}/template`);
        
        if (!result.success || !result.data || !result.data.attributes || result.data.attributes.length === 0) {
            container.innerHTML = '<p style="color:var(--muted);font-size:12px;text-align:center;padding:20px;">该类别暂无属性配置</p>';
            new bootstrap.Modal(document.getElementById('batchEditModal')).show();
            return;
        }
        
        const attrs = result.data.attributes;
        // 保存属性树到全局变量
        window.batchAttrTree = attrs;
        
        // 初始化选中状态（空）
        batchSelectedAttrValues = {};
        
        // 渲染属性树，默认展开所有属性
        container.innerHTML = renderBatchAttrTree(attrs);
        
        new bootstrap.Modal(document.getElementById('batchEditModal')).show();
    } catch (error) {
        console.error('加载模板属性失败:', error);
        container.innerHTML = '<p style="color:var(--muted);font-size:12px;text-align:center;padding:20px;">加载属性失败</p>';
        new bootstrap.Modal(document.getElementById('batchEditModal')).show();
    }
}

/** 渲染批量编辑属性树（样式与添加物品时一致，支持多选） */
function renderBatchAttrTree(attrList, level = 0, parentId = 'root') {
    if (!attrList || attrList.length === 0) return '';

    const indent = level * 20;
    return attrList.map(attr => {
        const attrId = attr.id;
        const attrKey = String(attrId);
        const children = attr.children || [];
        const hasChildren = children.length > 0;
        const isTopLevel = level === 0;
        
        // 检查是否选中（批量编辑支持多选）
        const isSelected = !isTopLevel && batchSelectedAttrValues[attrKey] === true;
        
        // 只有顶级属性可以折叠，子属性默认展开且不可折叠
        const canCollapse = isTopLevel && hasChildren;
        const isCollapsed = false; // 默认展开所有
        
        return `
            <div style="margin-bottom:4px;" data-attr-id="${attrId}" data-parent-id="${parentId}">
                <div style="display:flex;align-items:center;gap:8px;padding:6px 8px;margin-left:${indent}px;background:${isSelected && !isTopLevel ? '#FEF3C7' : 'var(--white)'};border-radius:4px;border:1px solid ${isSelected && !isTopLevel ? '#FBBF24' : 'var(--border)'};cursor:pointer;color:${isSelected && !isTopLevel ? '#D97706' : 'inherit'}" 
                     onclick="${canCollapse ? `toggleBatchAttrCollapse('${attrKey}');` : ''}${!isTopLevel ? `handleBatchAttrSelect('${attrKey}', '${parentId}', '${attrId}')` : ''}">
                    ${canCollapse ? `
                        <span class="collapse-arrow ${isCollapsed ? 'collapsed' : ''}" style="color:${isSelected && !isTopLevel ? '#D97706' : 'var(--sub)'};display:inline-flex;align-items:center;">
                            <svg width="12" height="12" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
                        </span>
                    ` : '<span style="width:12px;"></span>'}
                    <span style="flex:1;font-size:13px;">
                        ${isTopLevel ? '<strong>' + attr.name + '</strong>' : attr.name}
                    </span>
                    ${isSelected && !isTopLevel ? `
                        <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
                    ` : ''}
                </div>
                <div class="collapse-content ${isTopLevel && isCollapsed ? 'hidden' : ''}">
                    ${renderBatchAttrTree(children, level + 1, attrKey)}
                </div>
            </div>
        `;
    }).join('');
}

/** 切换批量编辑属性折叠状态 */
function toggleBatchAttrCollapse(id) {
    const key = 'batch_' + id;
    if (collapsedNodes.has(key)) {
        collapsedNodes.delete(key);
    } else {
        collapsedNodes.add(key);
    }
    // 重新渲染属性树
    if (window.batchAttrTree) {
        document.getElementById('batchAttrSelector').innerHTML = renderBatchAttrTree(window.batchAttrTree);
    }
}

/** 处理批量编辑属性选择（支持多选） */
function handleBatchAttrSelect(attrKey, parentId, attrId) {
    const numAttrId = parseInt(attrId);
    
    if (batchSelectedAttrValues[attrKey]) {
        // 再次点击取消选择
        delete batchSelectedAttrValues[attrKey];
    } else {
        // 选择该属性值（批量编辑支持多选）
        batchSelectedAttrValues[attrKey] = true;
    }
    
    // 直接更新所有子属性行的样式
    const container = document.getElementById('batchAttrSelector');
    if (!container) return;
    
    const rows = container.querySelectorAll('[data-attr-id]');
    rows.forEach(row => {
        const rowAttrId = row.dataset.attrId;
        const isSelected = batchSelectedAttrValues[rowAttrId] === true;
        const rowDiv = row.querySelector('div');
        if (rowDiv) {
            if (isSelected) {
                rowDiv.style.background = '#FEF3C7';
                rowDiv.style.color = '#D97706';
                rowDiv.style.borderColor = '#FBBF24';
                // 添加勾选图标
                let checkIcon = rowDiv.querySelector('.batch-check-icon');
                if (!checkIcon) {
                    checkIcon = document.createElement('span');
                    checkIcon.className = 'batch-check-icon';
                    checkIcon.innerHTML = '<svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>';
                    rowDiv.appendChild(checkIcon);
                }
            } else {
                rowDiv.style.background = 'var(--white)';
                rowDiv.style.color = 'inherit';
                rowDiv.style.borderColor = 'var(--border)';
                // 移除勾选图标
                const checkIcon = rowDiv.querySelector('.batch-check-icon');
                if (checkIcon) {
                    checkIcon.remove();
                }
            }
        }
    });
}

async function batchUpdateAttrs(action) {
    // 获取选中的属性ID（从批量编辑的选中状态中获取）
    const selectedAttrIds = Object.keys(batchSelectedAttrValues)
        .filter(key => batchSelectedAttrValues[key] === true)
        .map(key => parseInt(key));
    
    // 校验：必须选中至少一条属性值
    if (selectedAttrIds.length === 0) { 
        showToast('请选择至少一个属性值', 'error'); 
        return; 
    }
    
    // 校验：必须选中物品
    if (selectedItemIds.length === 0) { 
        showToast('请先选择物品', 'error'); 
        return; 
    }
    
    const result = await api('/items/batch-attributes', {
        method: 'POST',
        body: { item_ids: selectedItemIds, attribute_ids: selectedAttrIds, action }
    });
    
    if (result.success) {
        showToast(`已${action === 'add' ? '添加' : '移除'} ${selectedAttrIds.length} 个属性`, 'success');
        const modal = bootstrap.Modal.getInstance(document.getElementById('batchEditModal'));
        if (modal) modal.hide();
        // 重置选中状态
        batchSelectedAttrValues = {};
        loadItems();
    } else {
        showToast(result.message, 'error');
    }
}

function renderPagination() {
    const totalPages = Math.ceil(items.length / pageSize);
    const pagination = document.getElementById('homePagination');
    
    if (!pagination) {
        const container = document.createElement('div');
        container.id = 'homePagination';
        container.className = 'pagination';
        document.getElementById('pageHome').appendChild(container);
    }
    
    const paginationEl = document.getElementById('homePagination');
    
    if (totalPages <= 1) {
        paginationEl.style.display = 'none';
        return;
    }
    
    paginationEl.style.display = 'flex';
    
    let html = `
        <span class="pagination-info">共 ${items.length} 条</span>
        <select class="pagination-size-select" onchange="changePageSize(this.value)">
            <option value="10" ${pageSize === 10 ? 'selected' : ''}>10条/页</option>
            <option value="20" ${pageSize === 20 ? 'selected' : ''}>20条/页</option>
            <option value="50" ${pageSize === 50 ? 'selected' : ''}>50条/页</option>
        </select>
        <button class="pagination-btn" onclick="goToPage(1)" ${currentPage === 1 ? 'disabled' : ''}>
            <svg width="12" height="12" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
        </button>
        <button class="pagination-btn" onclick="goToPage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}>
            <svg width="12" height="12" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><line x1="15" y1="19" x2="9" y2="12"/><line x1="15" y1="5" x2="9" y2="12"/></svg>
        </button>
    `;
    
    // 显示页码
    const maxVisible = 5;
    let startPage = Math.max(1, currentPage - Math.floor(maxVisible / 2));
    let endPage = Math.min(totalPages, startPage + maxVisible - 1);
    
    if (endPage - startPage + 1 < maxVisible) {
        startPage = Math.max(1, endPage - maxVisible + 1);
    }
    
    for (let i = startPage; i <= endPage; i++) {
        html += `<button class="pagination-btn ${currentPage === i ? 'active' : ''}" onclick="goToPage(${i})">${i}</button>`;
    }
    
    html += `
        <button class="pagination-btn" onclick="goToPage(${currentPage + 1})" ${currentPage === totalPages ? 'disabled' : ''}>
            <svg width="12" height="12" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><line x1="9" y1="5" x2="15" y2="12"/><line x1="9" y1="19" x2="15" y2="12"/></svg>
        </button>
        <button class="pagination-btn" onclick="goToPage(${totalPages})" ${currentPage === totalPages ? 'disabled' : ''}>
            <svg width="12" height="12" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
        </button>
    `;
    
    paginationEl.innerHTML = html;
}

    const totalPages = Math.ceil(items.length / pageSize);
    if (page < 1 || page > totalPages) return;
    currentPage = page;

    pageSize = parseInt(size);

}

    if (checkbox && checkbox.parentElement) {
        checkbox.parentElement.classList.toggle('selected', checkbox.checked);

    updateBatchButtons();
}

let expandedAttrIds = [];

function renderAttributeTree() {
    const tree = document.getElementById('attributeTree');
    const attrTree = buildTree(attributes);
    if (attrTree.length === 0) { tree.innerHTML = `<div class="empty"><div class="empty-icon"><svg width="40" height="40" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/></svg></div><div class="empty-title">暂无属性</div></div>`; return; }
    tree.innerHTML = renderTreeNodes(attrTree, 'handleAttributeAction', 0);
    expandedAttrIds.forEach(id => {
        const row = document.querySelector(`[data-row-id="row-${id}"]`);
        if (row) {
            const children = row.parentElement.querySelector(':scope > .tree-children');
            if (children) children.style.display = 'block';
        }
    });
}

function toggleAttrTreeRow(el) {
    const rowId = el.getAttribute('data-row-id');
    const itemId = rowId ? parseInt(rowId.replace('row-', '')) : null;
    const children = el.parentElement.querySelector(':scope > .tree-children');
    if (!children) return;
    const isExpanded = children.style.display !== 'none';
    children.style.display = isExpanded ? 'none' : 'block';
    if (itemId) {
        const idx = expandedAttrIds.indexOf(itemId);
        if (isExpanded) { if (idx >= 0) expandedAttrIds.splice(idx, 1); }
        else { if (idx < 0) expandedAttrIds.push(itemId); }
    }
}

function buildTree(flatList) {
    const map = {};
    const roots = [];
    flatList.forEach(a => { map[a.id] = { ...a, children: [] }; });
    flatList.forEach(a => { if (a.parent_id && map[a.parent_id]) map[a.parent_id].children.push(map[a.id]); else roots.push(map[a.id]); });
    return roots;
}

function renderTreeNodes(nodes, actionHandler, level = 0, rootIndex = 0) {
    return nodes.map((n, idx) => {
        const rootIdx = level === 0 ? idx : rootIndex;
        const altClass = level === 0 && rootIdx % 2 === 1 ? ' style="background:var(--surface)"' : '';
        const isExpanded = expandedAttrIds.includes(n.id);
        const folderIcon = n.children.length 
            ? (isExpanded 
                ? '<path d="M20 20H4V10L10 4h10v16zM16 6l-2 2-2-2H6v12h12V6z"/>' 
                : '<path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/>')
            : '<path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8l-6-6z"/><path d="M14 2v6h6M16 13H8M16 17H8"/>';
        return `
        <div>
            <div class="tree-row" onclick="toggleAttrTreeRow(this)" data-row-id="row-${n.id}"${altClass} style="cursor:pointer;padding-left:${24 + level * 16}px">
                <svg width="10" height="10" fill="none" viewBox="0 0 24 24" stroke="var(--sub)" stroke-width="2" style="margin-right:6px;flex-shrink:0;">${n.children.length ? (isExpanded ? '<path d="M6 9l6 6 6-6"/>' : '<path d="M12 5l-6 6 6 6"/>') : ''}</svg>
                <svg width="13" height="13" fill="none" viewBox="0 0 24 24" stroke="var(--accent)" stroke-width="2" style="margin-right:6px;flex-shrink:0;">${folderIcon}</svg>
                <span style="font-weight:${level === 0 ? 600 : 400}">${n.name}</span>
                <div style="margin-left:auto;display:flex;gap:4px;">
                    <button class="btn-xs" style="background:var(--accent);color:#fff;border-color:var(--accent);" onclick="event.stopPropagation();${actionHandler}(${n.id},'add')"><svg width="11" height="11" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></button>
                    <button class="btn-xs" onclick="event.stopPropagation();${actionHandler}(${n.id},'edit')"><svg width="11" height="11" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button>
                    <button class="btn-xs btn-danger" onclick="event.stopPropagation();${actionHandler}(${n.id},'delete')"><svg width="11" height="11" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><polyline points="3,6 5,6 21,6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg></button>
                </div>
            </div>
            ${n.children.length ? `<div class="tree-children" data-parent="row-${n.id}" style="display:${isExpanded ? 'block' : 'none'};">${renderTreeNodes(n.children, actionHandler, level + 1, rootIdx)}</div>` : ''}
        </div>
        `;
    }).join('');
}

function navigateTo(page) {
    document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
    document.querySelectorAll('.sb-item').forEach(m => m.classList.remove('active'));
    const pageEl = document.getElementById('page' + page.charAt(0).toUpperCase() + page.slice(1));
    if (pageEl) pageEl.style.display = 'block';
    const menuItem = document.querySelector(`.sb-item[data-page="${page}"]`);
    if (menuItem) menuItem.classList.add('active');
    const fabBtn = document.getElementById('fabButton');
    if (fabBtn) fabBtn.style.display = page === 'home' ? 'flex' : 'none';
    if (page !== 'home') {
        homeFilter.categories = []; homeFilter.attributes = []; homeFilter.keyword = '';
        const homeSearch = document.getElementById('navSearchInput');
        if (homeSearch) homeSearch.value = '';
        // 移除分类高亮
        document.querySelectorAll('.tree-row').forEach(r => r.classList.remove('active'));
    }
    activeFilter = homeFilter;
    if (page === 'management') {
        // 进入管理页面时，重新加载类别和属性，确保数据同步
        loadCategories().then(() => {
            initInlineCategoryForm();
            renderCategoryList();
        });
        loadAttributes();
    }
    else if (page === 'categories') {
        loadCategories().then(() => renderCategoryList());
        loadAttributes();
    }
    else if (page === 'attributes') renderAttributeTree();
    else if (page === 'home') { renderCategorySelectors(); renderSidebarCategories(); loadItems(homeFilter); updateFilterChips(); }
    else if (page === 'settings') {
        if (currentUser) document.getElementById('settingsUsername').value = currentUser.username || '';
    }
    closeSidebar();
}

function confirmAddInlineAttr(parentId) {

    const input = document.getElementById(inputId);
    if (!input) return;
    
    const name = input.value.trim();
    
    if (!name) {
        showToast('请输入属性名称', 'error');
        input.focus();
        return;
    }
    
    // 检查是否与已有顶级属性重名
    if (attributes.some(a => !a.parent_id && a.name === name)) {
        showToast('已有顶级属性同名', 'error');
        input.focus();
        return;
    }
    
    // 检查当前已添加的顶级属性中是否重名

    if (topLevelSelected.some(a => a.name === name)) {
        showToast('已添加同名顶级属性', 'error');
        input.focus();

    if (parentId) {

    }
    
    const newAttr = {
        tempId: 'new_' + Date.now(),
        name: name,

// 确认编辑属性名称
function confirmEditInlineAttr(attrId) {
    const input = document.getElementById('inlineEditInput_' + attrId);
    if (!input) return;
    
    const newName = input.value.trim();
    
    if (!newName) {
        showToast('属性名称不能为空', 'error');
        input.focus();
        return;
    }
    
    const attr = window.inlineSelectedAttrs.find(a => (a.tempId || a.id) === attrId);
    if (!attr) return;
    
    // 检查是否与已有顶级属性重名
    if (attributes.some(a => !a.parent_id && a.name === newName)) {
        showToast('已有顶级属性同名', 'error');
        input.focus();
        return;
    }
    
    // 检查当前已添加的顶级属性中是否重名
    const topLevelSelected = window.inlineSelectedAttrs.filter(a => !a.parent_id && (a.tempId || a.id) !== attrId);
    if (topLevelSelected.some(a => a.name === newName)) {
        showToast('已添加同名顶级属性', 'error');
        input.focus();
        return;
    }
    
    // 检查同级是否有重名（排除自身）
    if (attr.parent_id) {
        const siblings = window.inlineSelectedAttrs.filter(a => a.parent_id === attr.parent_id && (a.tempId || a.id) !== attrId);
        if (siblings.some(a => a.name === newName)) {
            showToast('同级已有同名属性', 'error');
            input.focus();
            return;
        }
    }
    
    attr.name = newName;
    window.inlineEditingAttrId = null;
    renderInlineAttrTree();
}

            html = `

                                <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                    <path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/>

                                <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">

                `;
            }
            
            children.forEach(child => {
                html += renderNode(child, level + 1);
            });

        }
        
        return html;
    }
    
    let content = topLevelAttrs.map(attr => renderNode(attr)).join('');

}

// 切换inline属性折叠状态
function toggleInlineCollapse(id) {
    const key = 'inline_' + id;
    if (collapsedNodes.has(key)) {
        collapsedNodes.delete(key);
    } else {
        collapsedNodes.add(key);
    }
    renderInlineAttrTree();
}

function removeInlineAttr(attrId) {
    // 删除属性及其所有子属性
    const toRemove = [attrId];
    
    // 递归查找所有子属性
    function findChildren(parentId) {
        window.inlineSelectedAttrs.forEach(a => {
            if (a.parent_id === parentId) {
                const childId = a.tempId || a.id;
                toRemove.push(childId);
                findChildren(childId);
            }
        });
    }
    findChildren(attrId);
    
    // 删除所有找到的属性
    window.inlineSelectedAttrs = window.inlineSelectedAttrs.filter(a => 
        !toRemove.includes(a.tempId || a.id)
    );
    
    renderInlineAttrTree();
    updateInlineSaveBtn();
}

async function loadTemplateAttributes() {
    const templateId = document.getElementById('templateSelect').value;
    if (!templateId) { 
        document.getElementById('attributeSelector').innerHTML = '<p style="color:var(--muted);font-size:12px;text-align:center;padding:20px;">请先选择类别模板</p>'; 
        return; 
    }
    currentTemplateId = templateId;
    const categoryOption = document.getElementById('templateSelect').selectedOptions[0];
    const categoryId = categoryOption.dataset.categoryId;
    
    const result = await api(`/categories/${categoryId}/template`);
    
    // 调试信息
    console.log('loadTemplateAttributes - API返回:', result);
    
    if (!result.success || !result.data || !result.data.attributes || result.data.attributes.length === 0) {
        document.getElementById('attributeSelector').innerHTML = '<p style="color:var(--muted);font-size:12px;text-align:center;padding:20px;">该类别暂无属性配置</p>';
        return;
    }
    
    const attrs = result.data.attributes;
    // 保存属性树到全局变量，供单选逻辑使用
    window.currentAttrTree = attrs;
    console.log('loadTemplateAttributes - 属性数据:', JSON.stringify(attrs, null, 2));
    // 检查每个属性的 children
    attrs.forEach((attr, i) => {
        console.log(`属性${i}:`, attr.name, 'children:', attr.children);
    });
    const container = document.getElementById('attributeSelector');
    
    // 当前选中的值
    const currentValues = selectedAttrValues;
    
    // 递归渲染属性树（处理嵌套的 children 结构）
    function renderAttrTree(attrList, level = 0, parentId = 'root') {
        if (!attrList || attrList.length === 0) return '';

        const indent = level * 20;
        return attrList.map(attr => {
            const attrId = attr.id;
            const attrKey = String(attrId);
            const children = attr.children || [];
            const hasChildren = children.length > 0;
            const isTopLevel = level === 0;
            const attrName = attr.name;
            const isCollapsed = collapsedNodes.has('item_' + attrKey);
            
            // 判断是否选中：只有当当前属性是顶级属性的直接或间接子属性，且是该顶级属性下唯一选中的值时才显示选中
            let isSelected = false;
            if (!isTopLevel) {
                // 对于非顶级属性，检查它是否是其顶级属性下选中的值
                const topLevelId = parentId; // 在渲染时，parentId对于二级属性是顶级属性ID，对于三级属性是二级属性ID
                // 如果是三级属性，需要向上查找顶级属性
                if (!isNaN(parseInt(parentId))) {
                    // parentId是数字，检查它是否是顶级属性（没有父属性）
                    const parentIsTopLevel = !attrs.some(a => a.id === parseInt(parentId));
                    if (!parentIsTopLevel) {
                        // parentId不是顶级属性，需要找到真正的顶级属性
                        const topAttr = attrs.find(a => a.children && a.children.some(c => c.id === parseInt(parentId)));
                        if (topAttr) {
                            isSelected = currentValues[String(topAttr.id)] === attrId;
                        }
                    } else {
                        isSelected = currentValues[String(parentId)] === attrId;
                    }
                } else {
                    isSelected = currentValues[parentId] === attrId;
                }
            }
            
            // 调试信息
            if (level === 0) {
                console.log('顶级属性:', attrName, '子属性数量:', children.length, '子属性:', children);
            }
            
            // 子属性行添加 data 属性用于快速更新样式
            const dataAttrs = !isTopLevel ? `data-attr-id="${attrId}" data-parent-id="${parentId}"` : '';
            
            // 只有顶级属性可以折叠，子属性默认展开且不可折叠
            const canCollapse = isTopLevel && hasChildren;
            
            return `
                <div style="margin-bottom:4px;" ${dataAttrs}>
                    <div style="display:flex;align-items:center;gap:8px;padding:6px 8px;margin-left:${indent}px;background:${isSelected && !isTopLevel ? 'var(--accent)' : 'var(--white)'};border-radius:4px;border:1px solid ${isSelected && !isTopLevel ? 'var(--accent)' : 'var(--border)'};cursor:pointer;color:${isSelected && !isTopLevel ? '#fff' : 'inherit'}" 
                         onclick="${canCollapse ? `toggleItemAttrCollapse('${attrKey}');` : ''}${!isTopLevel ? `handleItemAttrSelectDirect('${attrKey}', '${parentId}', '${attrId}')` : ''}">
                        ${canCollapse ? `
                            <span class="collapse-arrow ${isCollapsed ? 'collapsed' : ''}" style="color:${isSelected && !isTopLevel ? '#fff' : 'var(--sub)'};display:inline-flex;align-items:center;" onclick="event.stopPropagation();toggleItemAttrCollapse('${attrKey}')">
                                <svg width="12" height="12" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
                            </span>
                        ` : '<span style="width:12px;"></span>'}
                        <span style="flex:1;font-size:13px;">
                            ${isTopLevel ? '<strong>' + attrName + '</strong>' : attrName}
                        </span>
                        ${isSelected && !isTopLevel ? `
                            <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
                        ` : ''}
                    </div>
                    <div class="collapse-content ${isTopLevel && isCollapsed ? 'hidden' : ''}">
                        ${renderAttrTree(children, level + 1, attrKey)}
                    </div>
                </div>
            `;
        }).join('');
    }
    
    // 直接渲染整个属性树
    container.innerHTML = renderAttrTree(attrs);
    
    // 更新已选中项的样式
    updateSelectedAttrStyles();
}

// 切换添加物品属性折叠状态
function toggleItemAttrCollapse(id) {
    const key = 'item_' + id;
    if (collapsedNodes.has(key)) {
        collapsedNodes.delete(key);
    } else {
        collapsedNodes.add(key);
    }
    // 重新渲染属性树
    loadTemplateAttributes();
}

// 更新已选中属性的样式
function updateSelectedAttrStyles() {
    const container = document.getElementById('attributeSelector');
    if (!container) return;
    
    const rows = container.querySelectorAll('[data-attr-id]');
    rows.forEach(row => {
        const rowAttrId = parseInt(row.dataset.attrId);
        const rowDiv = row.querySelector('div');
        if (rowDiv) {
            let isSelected = false;
            for (const key of Object.keys(selectedAttrValues)) {
                if (selectedAttrValues[key] === rowAttrId) {
                    isSelected = true;
                    break;
                }
            }
            
            if (isSelected) {
                rowDiv.style.background = 'var(--accent)';
                rowDiv.style.color = '#fff';
                rowDiv.style.borderColor = 'var(--accent)';
                let checkIcon = rowDiv.querySelector('.check-icon');
                if (!checkIcon) {
                    checkIcon = document.createElement('span');
                    checkIcon.className = 'check-icon';
                    checkIcon.innerHTML = '<svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>';
                    rowDiv.appendChild(checkIcon);
                }
            } else {
                rowDiv.style.background = 'var(--white)';
                rowDiv.style.color = 'inherit';
                rowDiv.style.borderColor = 'var(--border)';
                const checkIcon = rowDiv.querySelector('.check-icon');
                if (checkIcon) checkIcon.remove();
            }
        }
    });
}

// 存储已选择的属性值 { topAttrId: selectedChildId }
let selectedAttrValues = {};

function handleItemAttrSelect(el, topAttrId) {
    if (el.checked) {
        selectedAttrValues[topAttrId] = parseInt(el.value);
    } else {
        delete selectedAttrValues[topAttrId];
    }
}

// 在属性树中查找属性所属的顶级属性ID
function findTopLevelAttrId(targetAttrId, attrTree) {
    for (const topAttr of attrTree) {
        if (topAttr.id === parseInt(targetAttrId)) {
            return topAttr.id;
        }
        if (topAttr.children) {
            const found = findInChildren(topAttr.id, topAttr.children, parseInt(targetAttrId));
            if (found !== null) {
                return topAttr.id;
            }
        }
    }
    return null;
}

// 递归查找子属性
function findInChildren(topId, children, targetId) {
    for (const child of children) {
        if (child.id === targetId) {
            return topId;
        }
        if (child.children) {
            const found = findInChildren(topId, child.children, targetId);
            if (found !== null) {
                return found;
            }
        }
    }
    return null;
}

// 直接点击属性值行选择
function handleItemAttrSelectDirect(attrKey, parentId, attrId) {
    const numAttrId = parseInt(attrId);
    
    // 获取当前模板的属性数据
    const templateId = document.getElementById('templateSelect').value;
    let attrTree = [];
    if (templateId && window.currentAttrTree) {
        attrTree = window.currentAttrTree;
    }
    
    // 查找顶级属性ID
    const topLevelId = findTopLevelAttrId(attrId, attrTree);
    
    if (topLevelId === null) {
        // 如果找不到顶级属性，使用parentId作为备选
        console.warn('无法找到顶级属性ID，使用parentId:', parentId);
        return;
    }
    
    const topLevelIdStr = String(topLevelId);
    const currentVal = selectedAttrValues[topLevelIdStr];
    
    if (currentVal === numAttrId) {
        // 再次点击取消选择
        delete selectedAttrValues[topLevelIdStr];
    } else {
        // 选择该属性值（单选：同一顶级属性下只能选择一个）
        selectedAttrValues[topLevelIdStr] = numAttrId;
    }
    
    // 直接更新当前顶级属性组内的子属性行样式，确保单选效果
    const container = document.getElementById('attributeSelector');
    if (!container) return;
    
    // 找到所有子属性的行并更新样式
    const rows = container.querySelectorAll('[data-attr-id]');
    rows.forEach(row => {
        const rowAttrId = parseInt(row.dataset.attrId);
        // 查找该行属性所属的顶级属性
        const rowTopLevelId = findTopLevelAttrId(rowAttrId, attrTree);
        
        // 只更新当前顶级属性组内的行，避免影响其他属性的显示状态
        if (rowTopLevelId !== topLevelId) {
            return;
        }
        
        const isSelected = selectedAttrValues[String(rowTopLevelId)] === rowAttrId;
        const rowDiv = row.querySelector('div');
        if (rowDiv) {
            if (isSelected) {
                rowDiv.style.background = 'var(--accent)';
                rowDiv.style.color = '#fff';
                rowDiv.style.borderColor = 'var(--accent)';
                // 添加勾选图标
                let checkIcon = rowDiv.querySelector('.check-icon');
                if (!checkIcon) {
                    checkIcon = document.createElement('span');
                    checkIcon.className = 'check-icon';
                    checkIcon.innerHTML = '<svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>';
                    rowDiv.appendChild(checkIcon);
                }
            } else {
                rowDiv.style.background = 'var(--white)';
                rowDiv.style.color = 'inherit';
                rowDiv.style.borderColor = 'var(--border)';
                // 移除勾选图标
                const checkIcon = rowDiv.querySelector('.check-icon');
                if (checkIcon) {
                    checkIcon.remove();
                }
            }
        }
    });
}

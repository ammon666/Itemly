<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Itemly — 物品管理</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
:root {
  --accent:   #6366F1;
  --accent-2: #8B5CF6;
  --accent-bg: rgba(99,102,241,0.08);
  --white:    #FFFFFF;
  --surface:  #F8F8FA;
  --border:   #EBEBED;
  --ink:      #18181B;
  --sub:      #52525B;
  --muted:    #A1A1AA;
  --danger:   #EF4444;
  --sidebar-w: 224px;
  --nav-h:    56px;
  --radius:   10px;
  --shadow:   0 1px 4px rgba(0,0,0,0.06), 0 4px 16px rgba(0,0,0,0.04);
  --shadow-hover: 0 4px 12px rgba(0,0,0,0.10), 0 12px 32px rgba(0,0,0,0.07);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--surface); color: var(--ink); line-height: 1.5; overflow-x: hidden; }
a { text-decoration: none; color: inherit; }
button { cursor: pointer; border: none; background: none; font-family: inherit; }
img { display: block; width: 100%; }
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }

/* LOGIN PAGE */
.login-page {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: linear-gradient(135deg, var(--ink) 0%, var(--accent) 100%);
}
.login-card {
  width: 100%;
  max-width: 380px;
  margin: 1rem;
  padding: 2rem;
  background: var(--white);
  border-radius: var(--radius);
  box-shadow: 0 8px 32px rgba(0,0,0,0.2);
}
.login-logo {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  margin-bottom: 1.5rem;
}
.login-logo-mark {
  width: 40px;
  height: 40px;
  border-radius: 10px;
  background: var(--ink);
  display: flex;
  align-items: center;
  justify-content: center;
}
.login-logo h1 {
  font-size: 1.5rem;
  font-weight: 800;
  color: var(--ink);
}
.form-label {
  font-size: 13px;
  font-weight: 600;
  color: var(--ink);
  margin-bottom: 6px;
}
.form-control {
  height: 38px;
  border-radius: 7px;
  border: 1px solid var(--border);
  font-size: 13px;
  padding: 0 12px;
  transition: border-color .15s;
}
.form-control:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-bg);
}
.login-btn {
  width: 100%;
  height: 40px;
  border-radius: 7px;
  background: var(--accent);
  color: #fff;
  font-size: 13.5px;
  font-weight: 600;
  margin-top: 1rem;
  transition: opacity .15s;
}
.login-btn:hover { opacity: .88; }

/* NAV */
.nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  height: var(--nav-h);
  background: var(--white);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; padding: 0 16px; gap: 12px;
}
.nav-logo {
  display: flex; align-items: center; gap: 8px;
  font-weight: 700; font-size: 16px; color: var(--ink); flex-shrink: 0;
}
.nav-logo-mark {
  width: 28px; height: 28px; border-radius: 7px;
  background: var(--ink);
  display: flex; align-items: center; justify-content: center;
}
.nav-logo-mark svg { width: 15px; height: 15px; }
.nav-search {
  flex: 1; max-width: 360px; margin-left: auto; position: relative;
}
.nav-search input {
  width: 100%; height: 34px; border-radius: 7px;
  background: var(--surface); border: 1px solid var(--border);
  padding: 0 12px 0 34px; font-size: 13px; font-family: inherit; color: var(--ink);
  outline: none; transition: border-color .15s, background .15s;
}
.nav-search input:focus { border-color: var(--accent); background: var(--white); }
.nav-search input::placeholder { color: var(--muted); }
.nav-search-ico { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--muted); pointer-events: none; }
.nav-right { display: flex; align-items: center; gap: 8px; margin-left: 10px; }
.btn-primary {
  height: 32px; padding: 0 14px; border-radius: 7px;
  background: var(--accent); color: #fff;
  font-size: 12.5px; font-weight: 600;
  display: flex; align-items: center; gap: 5px;
  transition: opacity .15s;
}
.btn-primary:hover { opacity: .88; }
.nav-user-btn {
  display: flex; align-items: center; gap: 8px;
  padding: 4px 10px 4px 4px;
  border-radius: 999px;
  background: var(--surface); border: 1px solid var(--border);
  color: var(--sub); font-size: 12px; font-weight: 600;
  cursor: pointer; transition: all .15s;
}
.nav-user-btn:hover { background: var(--border); }
.nav-user-avatar {
  width: 28px; height: 28px; border-radius: 50%;
  background: var(--accent); color: #fff;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.nav-user-avatar .nav-avatar-text {
  font-size: 12px; font-weight: 700; color: #fff; letter-spacing: 0.5px;
}
.nav-user-name {
  color: var(--ink); font-size: 12.5px; font-weight: 600;
  max-width: 140px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.nav-logout-icon {
  opacity: .75; flex-shrink: 0;
}
.menu-toggle {
  display: none; width: 32px; height: 32px; border-radius: 6px;
  color: var(--sub); align-items: center; justify-content: center;
  transition: background .15s; flex-shrink: 0;
}
.menu-toggle:hover { background: var(--surface); }

/* LAYOUT */
.layout { display: flex; padding-top: var(--nav-h); min-height: 100vh; }

/* SIDEBAR */
.sidebar {
  position: fixed; top: var(--nav-h); left: 0;
  width: var(--sidebar-w); height: calc(100vh - var(--nav-h));
  background: var(--white); border-right: 1px solid var(--border);
  overflow-y: auto; z-index: 90; transition: transform .25s ease;
  display: flex; flex-direction: column; padding: 12px 0 24px;
}
.sb-section { padding: 16px 0 4px; }
.sb-label {
  font-size: 10.5px; font-weight: 600; letter-spacing: .07em;
  text-transform: uppercase; color: var(--muted);
  padding: 0 16px 6px;
}
.sb-item {
  display: flex; align-items: center; gap: 8px;
  padding: 7px 16px; font-size: 13px; font-weight: 500;
  color: var(--sub); cursor: pointer;
  transition: color .12s, background .12s; position: relative;
}
.sb-item:hover { color: var(--ink); background: var(--surface); }
.sb-item.active { color: var(--accent); background: var(--accent-bg); }
.sb-item svg { flex-shrink: 0; opacity: .65; }
.sb-item.active svg { opacity: 1; }
.sb-divider { height: 1px; background: var(--border); margin: 6px 12px; }
.tree-row {
  display: flex; align-items: center; gap: 7px;
  padding: 6px 16px 6px 24px; font-size: 13px;
  color: var(--sub); cursor: pointer; transition: color .12s, background .12s;
}
.tree-row:hover { color: var(--ink); background: var(--surface); }
.tree-row.active { color: var(--accent); }
.tree-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; background: var(--border); }
.tree-row.active .tree-dot { background: var(--accent); }

/* MAIN */
.main { margin-left: var(--sidebar-w); flex: 1; min-width: 0; padding: 20px 22px 64px; }

/* STATS */
.stats-row { display: grid; grid-template-columns: repeat(3,1fr); gap: 12px; margin-bottom: 20px; }
.stat-card {
  background: var(--white); border-radius: var(--radius);
  border: 1px solid var(--border);
  padding: 14px 16px;
  display: flex; align-items: center; gap: 12px;
  animation: up .35s ease both;
}
.stat-card:nth-child(2) { animation-delay: .05s; }
.stat-card:nth-child(3) { animation-delay: .10s; }
.stat-ico {
  width: 36px; height: 36px; border-radius: 8px;
  background: var(--surface); color: var(--sub);
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.stat-ico.hi { background: var(--accent-bg); color: var(--accent); }
.stat-num { font-size: 22px; font-weight: 700; line-height: 1; color: var(--ink); }
.stat-lbl { font-size: 11.5px; color: var(--muted); margin-top: 2px; font-family: 'Inter', sans-serif; }

/* TOOLBAR */
.toolbar { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; }
.toolbar-title { font-size: 14px; font-weight: 600; color: var(--ink); flex-shrink: 0; }
.toolbar-selection { font-size: 12.5px; color: var(--sub); margin-left: 8px; flex-shrink: 0; min-width: 90px; }
.toolbar-selection b { color: var(--accent); margin: 0 2px; }
.toolbar-spacer { flex: 1; }
.toolbar-group { display: flex; align-items: center; gap: 6px; }
.toolbar-sep { display: inline-block; width: 1px; height: 20px; background: var(--border); margin: 0 2px; flex-shrink: 0; }

/* 原批量操作条样式保留，但主页面已将按钮嵌入工具栏，此处仅作兼容（其他页面若用到） */
.batch-bar {
  display: flex; align-items: center; gap: 10px;
  background: var(--white); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 8px 12px; margin-bottom: 10px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.04);
}
.batch-count { font-size: 12.5px; color: var(--sub); }
.batch-count b { color: var(--accent); margin: 0 2px; }
.chips { display: flex; gap: 6px; flex-wrap: wrap; }
.chip {
  display: flex; align-items: center; gap: 4px;
  padding: 3px 8px 3px 10px; border-radius: 99px;
  background: var(--accent-bg); color: var(--accent);
  font-size: 11.5px; font-weight: 500; border: 1px solid rgba(99,102,241,.2);
}
.chip-x {
  width: 14px; height: 14px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 9px; background: rgba(99,102,241,.15); cursor: pointer;
  transition: background .12s;
}
.chip-x:hover { background: rgba(99,102,241,.35); }
.sort-btn {
  height: 30px; padding: 0 12px; border-radius: 6px;
  border: 1px solid var(--border); background: var(--white);
  font-size: 12px; font-weight: 500; color: var(--muted);
  display: flex; align-items: center; gap: 5px; transition: border-color .12s, color .12s;
}
.sort-btn:hover { border-color: var(--accent); color: var(--ink); }

/* GRID */
.grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 14px; }

/* CARD */
.card {
  background: var(--white); border-radius: var(--radius);
  border: 1px solid var(--border); overflow: hidden;
  cursor: pointer; position: relative;
  transition: transform .18s ease, box-shadow .18s ease;
  animation: up .4s ease both;
  display: flex; flex-direction: column;
}
.card:nth-child(2) { animation-delay:.04s }
.card:nth-child(3) { animation-delay:.08s }
.card:nth-child(4) { animation-delay:.12s }
.card:nth-child(5) { animation-delay:.16s }
.card:nth-child(6) { animation-delay:.20s }
.card:hover { transform: translateY(-3px); box-shadow: var(--shadow-hover); }

.card-img {
  position: relative; aspect-ratio: 16/9; overflow: hidden; background: var(--surface);
}
.card-img img { width: 100%; height: 100%; object-fit: cover; transition: transform .35s ease; }
.card:hover .card-img img { transform: scale(1.05); }
.card-img-ph { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; color: var(--border); font-size: 28px; }

/* hover overlay actions */
.card-overlay {
  position: absolute; top: 6px; right: 6px;
  display: flex; gap: 4px;
  opacity: 0; transition: opacity .15s;
}
.card:hover .card-overlay { opacity: 1; }
.ov-btn {
  width: 26px; height: 26px; border-radius: 5px;
  background: rgba(255,255,255,.92); backdrop-filter: blur(4px);
  display: flex; align-items: center; justify-content: center;
  color: var(--sub); transition: color .12s, background .12s;
  border: 1px solid rgba(0,0,0,.06);
}
.ov-btn:hover { color: var(--ink); background: #fff; }
.ov-btn.del:hover { color: var(--danger); }

.card-body { padding: 10px 12px 11px; flex: 1; display: flex; flex-direction: column; gap: 4px; }
.card-name { font-size: 13.5px; font-weight: 600; color: var(--ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.card-note {
  font-size: 11.5px; color: var(--muted); font-family: 'Inter', sans-serif; line-height: 1.45;
  display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; overflow: hidden;
}
.card-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px; align-items: center; }
.tag {
  display: inline-flex; align-items: center;
  padding: 2px 7px; border-radius: 4px; font-size: 11px; font-weight: 500;
  cursor: pointer; transition: background .12s;
}
.tag-cat { background: var(--surface); color: var(--sub); border: 1px solid var(--border); }
.tag-cat:hover { background: var(--accent-bg); color: var(--accent); border-color: rgba(99,102,241,.25); }
.tag-attr { background: var(--surface); color: var(--muted); border: 1px solid var(--border); }
.tag-more { background: transparent; color: var(--muted); border: 1px solid var(--border); font-size: 10.5px; }

/* LIST VIEW */
.list-view {
  display: flex; flex-direction: column; gap: 8px;
}
.list-item {
  display: flex; align-items: center; gap: 12px;
  background: var(--white); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 10px 12px;
  transition: background .12s;
}
.list-item:hover { background: var(--surface); }
.list-item.selected { background: var(--accent-bg); border-color: var(--accent); }
.list-checkbox { width: 18px; height: 18px; border-radius: 4px; flex-shrink: 0; }
.list-img { width: 64px; height: 64px; border-radius: 6px; background: var(--surface); object-fit: cover; flex-shrink: 0; }
.list-info { flex: 1; min-width: 0; }
.list-name { font-size: 14px; font-weight: 600; color: var(--ink); }
.list-meta { font-size: 12px; color: var(--muted); display: flex; gap: 8px; margin-top: 2px; }
.list-actions { display: flex; gap: 4px; opacity: 0; transition: opacity .12s; }
.list-item:hover .list-actions { opacity: 1; }
.list-actions .ov-btn { width: 28px; height: 28px; }

/* VIEW MODE ACTIVE */
.sort-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

/* EDIT MODE */
.edit-mode .card-overlay { opacity: 1; }
.edit-mode .list-actions { opacity: 1; }

/* MODALS */
.modal-content { border-radius: var(--radius); border: 1px solid var(--border); }
.modal-header { border-bottom: 1px solid var(--border); padding: 14px 16px; }
.modal-title { font-size: 15px; font-weight: 600; color: var(--ink); }
.modal-body { padding: 16px; }
.modal-footer { border-top: 1px solid var(--border); padding: 12px 16px; gap: 8px; }
.modal-footer .btn { height: 34px; padding: 0 14px; border-radius: 7px; font-size: 13px; font-weight: 500; }
.btn-secondary { background: var(--surface); border: 1px solid var(--border); color: var(--sub); }
.btn-secondary:hover { background: var(--border); }
.btn-xs {
  width: 26px; height: 26px; border-radius: 6px;
  background: var(--surface); border: 1px solid var(--border);
  color: var(--sub); display: flex; align-items: center;
  justify-content: center; cursor: pointer;
  transition: all .12s;
}
.btn-xs:hover { background: var(--border); }
.btn-xs.btn-danger { background: rgba(239,68,68,.1); border-color: rgba(239,68,68,.3); color: var(--danger); }
.btn-xs.btn-danger:hover { background: rgba(239,68,68,.15); }
.btn-outline-danger { border: 1px solid var(--danger); color: var(--danger); }
.btn-outline-danger:hover { background: rgba(239,68,68,.1); }

/* FORM */
.form-label { font-size: 13px; font-weight: 600; color: var(--ink); margin-bottom: 6px; display: block; }
.form-control, .form-select {
  height: 38px; border-radius: 7px; border: 1px solid var(--border);
  font-size: 13px; padding: 0 12px; font-family: inherit;
  transition: border-color .15s;
}
.form-control:focus, .form-select:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-bg); outline: none; }
textarea.form-control { height: auto; min-height: 80px; padding: 10px 12px; resize: vertical; }

/* IMAGE UPLOAD */
.image-upload-zone {
  border: 2px dashed var(--border); border-radius: var(--radius);
  padding: 2rem; text-align: center; cursor: pointer;
  transition: all .15s; background: var(--surface);
}
.image-upload-zone:hover { border-color: var(--accent); background: var(--accent-bg); }
.image-upload-zone.has-image { padding: 0; border-style: solid; }
.image-upload-zone img { max-width: 100%; max-height: 200px; border-radius: 7px; object-fit: cover; }

/* ATTR SELECTOR */
.attr-selector {
  max-height: 300px; overflow-y: auto;
  border: 1px solid var(--border); border-radius: 7px; padding: 8px;
  background: var(--surface);
}
.attr-group { margin-bottom: 8px; }
.attr-group-header {
  font-weight: 600; padding: 8px 10px; background: var(--white);
  border-radius: 6px; cursor: pointer; font-size: 13px; color: var(--ink);
}
.attr-group-header.required { color: var(--danger); }
.attr-group-items { padding-left: 12px; display: none; }
.attr-group-items.show { display: block; }
.attr-item { padding: 6px 10px; cursor: pointer; border-radius: 6px; margin: 2px 0; font-size: 13px; color: var(--sub); }
.attr-item:hover { background: var(--white); }
.attr-item.selected { background: var(--accent); color: #fff; }
.attr-item.disabled { opacity: 0.4; cursor: not-allowed; }

/* TREE SELECTOR */
.tree-selector {
  max-height: 280px; overflow-y: auto;
  border: 1px solid var(--border); border-radius: 7px; padding: 8px;
  background: var(--surface);
}

/* ADMIN CARD */
.admin-card {
  background: var(--white); border-radius: var(--radius);
  border: 1px solid var(--border); padding: 16px; margin-bottom: 16px;
}
.admin-card-title {
  font-size: 14px; font-weight: 600; color: var(--ink);
  margin-bottom: 12px; padding-bottom: 10px; border-bottom: 1px solid var(--border);
}
.page-title {
  font-size: 16px; font-weight: 600; color: var(--ink); margin-bottom: 16px;
  display: flex; align-items: center; justify-content: space-between;
}

/* LIGHTBOX */
.lightbox {
  position: fixed; inset: 0; z-index: 999;
  background: rgba(0,0,0,.75);
  display: flex; align-items: center; justify-content: center;
  opacity: 0; pointer-events: none; transition: opacity .2s;
}
.lightbox.open { opacity: 1; pointer-events: auto; }
.lightbox img {
  max-width: min(88vw,760px); max-height: 84vh;
  border-radius: var(--radius); object-fit: contain;
  transform: scale(.94); transition: transform .2s;
}
.lightbox.open img { transform: scale(1); }
.lb-close {
  position: absolute; top: 16px; right: 20px;
  width: 36px; height: 36px; border-radius: 50%;
  background: rgba(255,255,255,.15); color: #fff; font-size: 18px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: background .12s;
}
.lb-close:hover { background: rgba(255,255,255,.25); }

/* TOAST */
.toast-wrap { position: fixed; top: 66px; right: 16px; z-index: 9999; display: flex; flex-direction: column; gap: 6px; pointer-events: none; }
.toast {
  padding: 8px 14px; border-radius: 7px;
  background: var(--ink); color: #fff;
  font-size: 12.5px; font-weight: 500;
  display: flex; align-items: center; gap: 7px;
  transform: translateX(110%); transition: transform .25s ease;
  pointer-events: auto; box-shadow: 0 4px 14px rgba(0,0,0,.15);
}
.toast.show { transform: translateX(0); }
.t-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); flex-shrink: 0; }
.toast.success .t-dot { background: #22C55E; }
.toast.error   .t-dot { background: var(--danger); }

/* FAB */
.fab {
  display: none; position: fixed; bottom: 20px; right: 16px; z-index: 200;
  width: 48px; height: 48px; border-radius: 50%;
  background: var(--accent); color: #fff;
  align-items: center; justify-content: center;
  box-shadow: 0 4px 14px rgba(99,102,241,.4);
  transition: transform .15s, box-shadow .15s;
}
.fab:hover { transform: scale(1.07); }

/* OVERLAY */
.sb-overlay { display: none; position: fixed; inset: 0; z-index: 89; background: rgba(0,0,0,.3); }

/* OFFCANVAS */
.offcanvas { width: 280px; }
.offcanvas-header { padding: 14px 16px; border-bottom: 1px solid var(--border); }
.offcanvas-title { font-size: 15px; font-weight: 600; color: var(--ink); }
.offcanvas-body { padding: 16px; }

/* TREE ROW SELECTED */
.tree-row.selected { color: var(--accent); background: var(--accent-bg); }
.tree-row.selected .tree-dot { background: var(--accent); }

/* EMPTY */
.empty { grid-column:1/-1; padding: 56px 24px; text-align: center; color: var(--muted); }
.empty-icon { font-size: 40px; margin-bottom: 10px; opacity: .35; }
.empty-title { font-size: 15px; font-weight: 600; color: var(--ink); margin-bottom: 4px; }
.empty-desc { font-size: 12.5px; }

/* LOADING */
.loading-overlay {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(255,255,255,.9); display: flex;
  align-items: center; justify-content: center; z-index: 9999;
}

@keyframes up {
  from { opacity:0; transform:translateY(10px); }
  to   { opacity:1; transform:translateY(0); }
}
@media (prefers-reduced-motion:reduce) { *,*::before,*::after { animation-duration:0s!important; transition-duration:0s!important; } }

@media (max-width:1080px) { .grid { grid-template-columns:repeat(2,1fr); } }

@media (max-width:900px) {
  .sidebar { transform: translateX(-100%); box-shadow: none; }
  .sidebar.open { transform: translateX(0); box-shadow: 4px 0 24px rgba(0,0,0,.1); }
  .sb-overlay { display: block; }
  .main { margin-left: 0; padding: 16px 14px 64px; }
  .menu-toggle { display: flex; }
  .btn-primary span { display: none; }
  .btn-primary { padding: 0 10px; }
  .fab { display: flex; }
}

@media (max-width:560px) {
  .grid { grid-template-columns: 1fr; }
  .stats-row { grid-template-columns: 1fr; gap: 8px; }
  .nav-search { max-width: 100%; }
  .nav-right .btn-primary { display: none; }
}

/* App Container */
.app-container { display: none; }
.app-container.active { display: block; }
</style>
</head>
<body>

<div class="toast-wrap" id="toastWrap"></div>

<!-- 登录页面 -->
<div id="loginPage" class="login-page">
  <div class="login-card">
    <div class="login-logo">
      <div class="login-logo-mark">
        <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round">
          <rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/>
          <rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/>
        </svg>
      </div>
      <h1>Itemly</h1>
    </div>
    <form id="loginForm">
      <div class="mb-3">
        <label class="form-label">用户名</label>
        <input type="text" class="form-control" id="username" placeholder="请输入用户名" required>
      </div>
      <div class="mb-3">
        <label class="form-label">密码</label>
        <input type="password" class="form-control" id="password" placeholder="请输入密码" required>
      </div>
      <button type="submit" class="login-btn">登 录</button>
    </form>
  </div>
</div>

<!-- 主应用 -->
<div id="appContainer" class="app-container">

<nav class="nav">
  <button class="menu-toggle" id="menuToggle" aria-label="菜单">
    <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.2">
      <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
    </svg>
  </button>
  <a href="#" class="nav-logo">
    <div class="nav-logo-mark">
      <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round">
        <rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/>
        <rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/>
      </svg>
    </div>
    Itemly
  </a>
  <div class="nav-search">
    <span class="nav-search-ico">
      <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.2">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
    </span>
    <input type="text" placeholder="搜索物品、类别、属性…" id="navSearchInput">
  </div>
  <div class="nav-right">
    <button class="btn-primary" onclick="showAddItemModal()">
      <svg width="12" height="12" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.8">
        <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
      </svg>
      <span>添加物品</span>
    </button>
    <button class="nav-user-btn" id="navUserBtn" onclick="logout()" title="点击登出">
      <span class="nav-user-avatar"><span class="nav-avatar-text" id="navAvatarText">U</span></span>
      <span class="nav-user-name" id="navUsernameText">未登录</span>
      <svg width="12" height="12" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" class="nav-logout-icon">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
      </svg>
    </button>
  </div>
</nav>

<div class="sb-overlay" id="sbOverlay" onclick="closeSidebar()"></div>

<div class="layout">
  <aside class="sidebar" id="sidebar">
    <div class="sb-section">
      <div class="sb-label">菜单</div>
      <div class="sb-item active" data-page="home" onclick="navigateTo('home')">
        <svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/>
          <rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/>
        </svg>物品管理
      </div>
      <div id="sidebarCategories" style="margin-top:4px;"></div>
    </div>
    <div class="sb-divider"></div>
    <div class="sb-section">
      <div class="sb-label">管理</div>
      <div class="sb-item" data-page="categories" onclick="navigateTo('categories')">
        <svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M4 6h16M4 12h16M4 18h7"/></svg>类别管理
      </div>
      <div class="sb-item" data-page="attributes" onclick="navigateTo('attributes')">
        <svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="7" cy="7" r="3"/><circle cx="17" cy="17" r="3"/><path d="M7 10v4M10 7h4"/></svg>属性管理
      </div>
      <div class="sb-item" data-page="settings" onclick="navigateTo('settings')">
        <svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 4.93a10 10 0 0 0 0 14.14"/></svg>设置
      </div>
    </div>
  </aside>

  <main class="main">
    <!-- 首页 -->
    <div id="pageHome" class="page">
      <div class="stats-row">
        <div class="stat-card">
          <div class="stat-ico hi">
            <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M20 7H4a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2Z"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/></svg>
          </div>
          <div><div class="stat-num" id="homeStatsTotal">0</div><div class="stat-lbl">物品总数</div></div>
        </div>
        <div class="stat-card">
          <div class="stat-ico">
            <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M4 6h16M4 12h16M4 18h7"/></svg>
          </div>
          <div><div class="stat-num" id="homeStatsCategories">0</div><div class="stat-lbl">分类数量</div></div>
        </div>
        <div class="stat-card">
          <div class="stat-ico">
            <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="7" cy="7" r="3"/><circle cx="17" cy="17" r="3"/><path d="M7 10v4M10 7h4"/></svg>
          </div>
          <div><div class="stat-num" id="homeStatsAttributes">0</div><div class="stat-lbl">属性数量</div></div>
        </div>
      </div>

      <div class="toolbar">
        <span class="toolbar-title">物品列表</span>
        <span class="toolbar-selection" id="batchCountBar" style="visibility:hidden;">
          已选择 <b id="batchCountText">0</b> 个物品
        </span>
        <div class="toolbar-spacer"></div>
        <div class="chips" id="homeFilterChips"></div>
        <span class="toolbar-sep"></span>
        <div class="toolbar-group" id="actionGroup">
          <button class="btn-primary" id="batchEditBtn" onclick="showBatchEditModal()" style="height:30px;font-size:12px;display:none;">
            <svg width="12" height="12" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.8"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
            <span>批量编辑属性</span>
          </button>
          <button class="btn-primary" id="batchDeleteBtn" onclick="batchDeleteItems()" style="height:30px;font-size:12px;background:#EF4444;display:none;">
            <svg width="12" height="12" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.8"><polyline points="3,6 5,6 21,6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg>
            <span>批量删除</span>
          </button>
          <button class="btn-primary" id="editModeBtn" onclick="toggleEditMode()" style="height:30px;font-size:12px;">
            <svg width="12" height="12" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.8"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
            <span id="editModeBtnText">进入编辑</span>
          </button>
          <button class="sort-btn" id="viewToggleBtn" onclick="toggleViewMode()">
            <svg id="viewToggleIcon" width="12" height="12" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
            <span id="viewToggleText">卡片</span>
          </button>
        </div>
        <span class="toolbar-sep"></span>
        <div class="toolbar-group" id="filterGroup">
          <button class="sort-btn" data-bs-toggle="offcanvas" data-bs-target="#filterOffcanvas">
            <svg width="12" height="12" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.2"><path d="M3 4a4 4 0 0 1 4-4h10a4 4 0 0 1 4 4v16a4 4 0 0 1-4 4H7a4 4 0 0 1-4-4V4z"/><path d="M7 2v20M17 2v20"/></svg>
            筛选
          </button>
          <button class="sort-btn" onclick="clearAllFilters()">
            <svg width="12" height="12" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            重置
          </button>
        </div>
      </div>

      <div class="grid" id="homeItemsGrid"></div>
      <div class="list-view" id="homeItemsList" style="display:none;"></div>
      <div class="empty" id="homeEmptyState" style="display:none;">
        <div class="empty-icon"><svg width="40" height="40" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path d="M20 7H4a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2Z"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/></svg></div>
        <div class="empty-title">暂无物品</div>
        <div class="empty-desc">点击右下角按钮添加新物品</div>
      </div>
    </div>

    <!-- 物品管理页面 -->
    <!-- 类别管理页面 -->
    <div id="pageCategories" class="page" style="display:none;">
      <div class="page-title">
        <span>类别管理</span>
        <button class="btn-primary" onclick="showCategoryModal()">
          <svg width="12" height="12" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.8"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          <span>添加类别</span>
        </button>
      </div>
      <div id="categoryList"></div>
    </div>

    <!-- 属性管理页面 -->
    <div id="pageAttributes" class="page" style="display:none;">
      <div class="page-title">
        <span>属性管理</span>
        <button class="btn-primary" onclick="showAttributeModal()">
          <svg width="12" height="12" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.8"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          <span>添加属性</span>
        </button>
      </div>
      <div class="admin-card">
        <div id="attributeTree" class="tree-selector"></div>
      </div>
    </div>

    <!-- 设置页面 -->
    <div id="pageSettings" class="page" style="display:none;">
      <div class="page-title"><span>设置</span></div>
      <div class="admin-card">
        <div class="admin-card-title">账号信息</div>
        <form id="accountForm">
          <div class="mb-3">
            <label class="form-label">用户名</label>
            <input type="text" class="form-control" id="settingsUsername" required>
          </div>
          <button type="submit" class="btn-primary">保存</button>
        </form>
      </div>
      <div class="admin-card">
        <div class="admin-card-title">修改密码</div>
        <form id="passwordForm">
          <div class="mb-3">
            <label class="form-label">新密码</label>
            <input type="password" class="form-control" name="new_password" required minlength="6">
          </div>
          <div class="mb-3">
            <label class="form-label">确认新密码</label>
            <input type="password" class="form-control" name="confirm_password" required minlength="6">
          </div>
          <button type="submit" class="btn-primary">保存</button>
        </form>
      </div>
    </div>
  </main>
</div>

<button class="fab" id="fabButton" onclick="showAddItemModal()" aria-label="添加物品">
  <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.6">
    <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
  </svg>
</button>

</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox" onclick="closeLB(event)">
  <button class="lb-close" onclick="closeLB(event)">✕</button>
  <img id="lbImg" src="" alt="">
</div>

<!-- 筛选侧边栏 -->
<div class="offcanvas offcanvas-end" tabindex="-1" id="filterOffcanvas">
  <div class="offcanvas-header">
    <h5 class="offcanvas-title">筛选条件</h5>
    <button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>
  </div>
  <div class="offcanvas-body">
    <div class="mb-3">
      <label class="form-label">按类别筛选</label>
      <div id="filterCategories" class="tree-selector"></div>
    </div>
    <div class="mb-3">
      <label class="form-label">按属性筛选</label>
      <div id="filterAttributes" class="tree-selector"></div>
    </div>
  </div>
</div>

<!-- 添加/编辑物品模态框 -->
<div class="modal fade" id="itemModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="itemModalTitle">添加物品</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <form id="itemForm">
        <div class="modal-body">
          <div class="mb-3">
            <label class="form-label">选择类别模板 <span style="color:var(--danger)">*</span></label>
            <select class="form-select" id="templateSelect" required onchange="loadTemplateAttributes()">
              <option value="">请选择类别</option>
            </select>
          </div>
          <div class="mb-3">
            <label class="form-label">图片 <span style="color:var(--danger)">*</span></label>
            <div id="imageUploadZone" class="image-upload-zone" onclick="document.getElementById('imageInput').click()">
              <svg width="32" height="32" fill="none" viewBox="0 0 24 24" stroke="var(--muted)" stroke-width="1.5"><path d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2 1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
              <p style="color:var(--muted);font-size:12px;margin-top:8px;">点击上传图片</p>
            </div>
            <input type="file" id="imageInput" accept="image/*" style="display:none" onchange="handleImageSelect(event)">
          </div>
          <div class="mb-3">
            <label class="form-label">名称 <span style="color:var(--danger)">*</span></label>
            <input type="text" class="form-control" name="name" required>
          </div>
          <div class="mb-3">
            <label class="form-label">属性配置</label>
            <div id="attributeSelector" class="attr-selector">
              <p style="color:var(--muted);font-size:12px;text-align:center;padding:20px;">请先选择类别模板</p>
            </div>
          </div>
          <div class="mb-3">
            <label class="form-label">备注</label>
            <textarea class="form-control" name="remark" rows="2"></textarea>
          </div>
        </div>
        <div class="modal-footer" style="display:flex;align-items:center;justify-content:flex-end;gap:8px;">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
          <button id="saveAndContinueBtn" type="button" class="btn btn-secondary" onclick="saveItemAndContinue()">保存并继续</button>
          <button type="submit" class="btn-primary">保存</button>
        </div>
      </form>
    </div>
  </div>
</div>

<!-- 物品详情模态框 -->
<div class="modal fade" id="itemDetailModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="itemDetailTitle">物品详情</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body" id="itemDetailBody"></div>
      <div class="modal-footer">
        <button type="button" class="btn btn-outline-danger" onclick="deleteCurrentItem()">
          <svg width="12" height="12" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><polyline points="3,6 5,6 21,6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg>
          删除
        </button>
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">关闭</button>
        <button type="button" class="btn-primary" onclick="editCurrentItem()">
          <svg width="12" height="12" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/></svg>
          编辑
        </button>
      </div>
    </div>
  </div>
</div>

<!-- 类别模态框 -->
<div class="modal fade" id="categoryModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="categoryModalTitle">添加类别</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <form id="categoryForm">
        <div class="modal-body">
          <input type="hidden" name="id">
          <div class="mb-3">
            <label class="form-label">类别名称</label>
            <input type="text" class="form-control" name="name" required>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
          <button type="submit" class="btn-primary">保存</button>
        </div>
      </form>
    </div>
  </div>
</div>

<!-- 模板配置模态框 -->
<div class="modal fade" id="templateModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">配置类别</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="templateCategoryId">
        <div class="mb-3">
          <label class="form-label">类别名称</label>
          <input type="text" class="form-control" id="templateCategoryName" required>
        </div>
        <div class="mb-3">
          <label class="form-label">选择属性字段（勾选是否必填）</label>
          <div id="templateAttributeSelector" class="attr-selector"></div>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
        <button type="button" class="btn-primary" onclick="saveTemplateConfig()">保存配置</button>
      </div>
    </div>
  </div>
</div>

<!-- 属性模态框 -->
<div class="modal fade" id="attributeModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="attributeModalTitle">添加属性</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <form id="attributeForm">
        <div class="modal-body">
          <input type="hidden" name="id">
          <div class="mb-3">
            <label class="form-label">上级属性</label>
            <select class="form-select" name="parent_id" id="attributeParentSelect">
              <option value="">无（顶级属性）</option>
            </select>
          </div>
          <div class="mb-3">
            <label class="form-label">属性名称</label>
            <input type="text" class="form-control" name="name" required>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
          <button type="submit" class="btn-primary">保存</button>
        </div>
      </form>
    </div>
  </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<!-- 图片压缩库 -->
<script src="https://cdn.jsdelivr.net/npm/browser-image-compression@2.0.2/dist/browser-image-compression.js"></script>

<script>
const API_BASE = '/api';
let currentUser = null;
let categories = [];
let attributes = [];
let items = [];
let currentItemId = null;
let currentTemplateId = null;
let currentItemImages = [];
let keepAdding = false;
let selectedItemIds = [];
let searchDebounceTimer = null;
let viewMode = 'card';
let editMode = false;

const homeFilter = { categories: [], attributes: [], keyword: '' };
const itemsFilter = { categories: [], attributes: [], keyword: '' };
let activeFilter = homeFilter;

function stringHash(str) {
    let hash = 0;
    for (let i = 0; i < str.length; i++) {
        const char = str.charCodeAt(i);
        hash = ((hash << 5) - hash) + char;
        hash = hash & hash;
    }
    return Math.abs(hash);
}

async function api(endpoint, options = {}) {
    try {
        const config = { headers: { 'Content-Type': 'application/json' }, credentials: 'include', ...options };
        if (config.body && typeof config.body === 'object') config.body = JSON.stringify(config.body);
        const response = await fetch(API_BASE + endpoint, config);
        let data;
        try { data = await response.json(); } catch (e) { return { success: false, message: '服务器返回数据格式错误' }; }
        return data;
    } catch (error) {
        console.error('API请求失败:', endpoint, error);
        return { success: false, message: '网络请求失败，请检查服务器连接' };
    }
}

function showToast(msg, type = 'default') {
    const w = document.getElementById('toastWrap'), el = document.createElement('div');
    el.className = `toast ${type}`;
    el.innerHTML = `<span class="t-dot"></span>${msg}`;
    w.appendChild(el);
    requestAnimationFrame(() => requestAnimationFrame(() => el.classList.add('show')));
    setTimeout(() => { el.classList.remove('show'); setTimeout(() => el.remove(), 300); }, 2500);
}

function showLoading() { document.getElementById('loadingOverlay').style.display = 'flex'; }
function hideLoading() { document.getElementById('loadingOverlay').style.display = 'none'; }

async function checkAuth() {
    try {
        const result = await api('/auth/check');
        if (result.authenticated) {
            currentUser = result.data;
            showApp();
            loadAllData();
            updateNavUser(currentUser);
        } else {
            showLogin();
        }
    } catch (error) {
        console.error('检查登录状态失败:', error);
        showLogin();
    }
}

function showLogin() {
    document.getElementById('loginPage').style.display = 'flex';
    document.getElementById('appContainer').classList.remove('active');
}

function showApp() {
    document.getElementById('loginPage').style.display = 'none';
    document.getElementById('appContainer').classList.add('active');
}

function updateNavUser(user) {
    if (!user) return;
    const avatarText = document.getElementById('navAvatarText');
    if (avatarText) avatarText.textContent = (user.username || 'U').charAt(0).toUpperCase();
    const nameEl = document.getElementById('navUsernameText');
    if (nameEl) nameEl.textContent = user.username;
    const btn = document.getElementById('navUserBtn');
    if (btn) btn.title = '点击登出: ' + user.username;
}

async function login(e) {
    e.preventDefault();
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;
    showLoading();
    const result = await api('/auth/login', { method: 'POST', body: { username, password } });
    hideLoading();
    if (result.success) {
        currentUser = result.data;
        showApp();
        loadAllData();
        updateNavUser(currentUser);
        document.getElementById('loginForm').reset();
    } else showToast(result.message, 'error');
}

async function logout() {
    await api('/auth/logout', { method: 'POST' });
    currentUser = null;
    showLogin();
    showToast('已退出登录', 'success');
}

function toggleViewMode() {
    const next = viewMode === 'card' ? 'list' : 'card';
    setViewMode(next);
}

function setViewMode(mode) {
    viewMode = mode;
    const toggleBtn = document.getElementById('viewToggleBtn');
    const toggleText = document.getElementById('viewToggleText');
    const toggleIcon = document.getElementById('viewToggleIcon');
    // 为避免浏览器可能 null 安全
    if (toggleText) toggleText.textContent = mode === 'card' ? '卡片' : '列表';
    if (toggleIcon) {
        if (mode === 'card') {
            toggleIcon.innerHTML = '<rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/>';
        } else {
            toggleIcon.innerHTML = '<line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/>';
        }
    }
    document.getElementById('homeItemsGrid').style.display = mode === 'card' ? 'grid' : 'none';
    document.getElementById('homeItemsList').style.display = mode === 'list' ? 'flex' : 'none';
    // 切换到非列表视图时清空选择，避免状态残留
    if (viewMode !== 'list') {
        selectedItemIds = [];
    }
    loadItems();
    updateBatchButtons();
}

function toggleEditMode() {
    editMode = !editMode;
    const btn = document.getElementById('editModeBtn');
    const btnText = document.getElementById('editModeBtnText');
    // 编辑模式：用中性/主题色，避免红色警告色
    // 非编辑模式：保持默认主题蓝；编辑模式：使用蓝紫色「次要色」，明显但不刺眼
    if (editMode) {
        if (btn) btn.style.background = 'var(--accent-2, #6366F1)';
        if (btnText) btnText.textContent = '退出编辑';
        showToast('已进入编辑模式');
    } else {
        if (btn) btn.style.background = '';
        if (btnText) btnText.textContent = '进入编辑';
        selectedItemIds = [];
        showToast('已退出编辑模式');
    }
    loadItems();
    updateBatchButtons();
}

/**
 * 工具栏批量按钮控制：批量编辑属性 / 批量删除 放在「进入编辑」按钮左侧，且
 * 「已选择 N 个物品」计数显示在标题右侧，位置固定，避免勾选后页面跳变。
 * 显示条件：列表视图 + 编辑模式 + 有选中物品
 */
function updateBatchButtons() {
    const countBar = document.getElementById('batchCountBar');
    const countEl = document.getElementById('batchCountText');
    const batchEditBtn = document.getElementById('batchEditBtn');
    const batchDeleteBtn = document.getElementById('batchDeleteBtn');

    const shouldShow = (viewMode === 'list') && editMode && (selectedItemIds.length > 0);

    // 标题右侧计数 —— 用 visibility，不挤走其他按钮位置
    if (countBar) countBar.style.visibility = shouldShow ? 'visible' : 'hidden';
    if (countEl) countEl.textContent = selectedItemIds.length;

    // 批量按钮用 display:none / inline-flex；位于 edit 按钮左侧，组内顺序固定
    if (batchEditBtn) batchEditBtn.style.display = shouldShow ? 'inline-flex' : 'none';
    if (batchDeleteBtn) batchDeleteBtn.style.display = shouldShow ? 'inline-flex' : 'none';
}

async function batchDeleteItems() {
    if (selectedItemIds.length === 0) { showToast('请先选择物品', 'error'); return; }
    if (!confirm(`确定要删除选中的 ${selectedItemIds.length} 个物品吗？此操作不可撤销。`)) return;
    showLoading();
    try {
        const result = await api('/items/batch-delete', {
            method: 'POST',
            body: { item_ids: selectedItemIds }
        });
        hideLoading();
        if (result.success) {
            showToast(`已删除 ${result.deleted || selectedItemIds.length} 个物品`, 'success');
            selectedItemIds = [];
            loadItems();
        } else {
            showToast(result.message || '批量删除失败', 'error');
        }
    } catch (e) {
        hideLoading();
        showToast('网络错误', 'error');
    }
}

async function loadAllData() {
    showLoading();
    try {
        await Promise.all([loadCategories(), loadAttributes(), loadItems()]);
    } catch (error) {
        console.error('加载数据失败:', error);
        showToast('部分数据加载失败', 'warning');
    } finally { hideLoading(); }
}

async function loadCategories() {
    try {
        const result = await api('/categories');
        if (result.success) {
            categories = result.data || [];
            renderCategorySelectors();
            renderSidebarCategories();
            renderFilterCategories();
            const catPage = document.getElementById('pageCategories');
            if (catPage && catPage.style.display !== 'none') renderCategoryList();
        } else categories = [];
    } catch (error) { console.error('加载类别失败:', error); categories = []; }
}

async function loadAttributes() {
    try {
        const result = await api('/attributes?flat=true');
        if (result.success) {
            attributes = result.data || [];
            renderAttributeSelectors();
            const attrPage = document.getElementById('pageAttributes');
            if (attrPage && attrPage.style.display !== 'none') renderAttributeTree();
            renderSidebarAttributes();
        } else attributes = [];
    } catch (error) { console.error('加载属性失败:', error); attributes = []; }
}

async function loadItems(filter) {
    const f = filter || activeFilter || homeFilter;
    try {
        const params = new URLSearchParams();
        if (f.categories && f.categories.length) params.append('category_ids', f.categories.join(','));
        if (f.keyword) params.append('keyword', f.keyword);
        if (f.attributes && f.attributes.length) params.append('attribute_ids', f.attributes.join(','));
        const result = await api('/items?' + params.toString());
        if (result.success) {
            items = result.data || [];
            renderItems();
            updateHomeStats();
            const itemsPage = document.getElementById('pageItems');
            if (itemsPage && itemsPage.style.display !== 'none') {
                renderItemsManagement();
                updateItemsStats();
            }
        } else items = [];
    } catch (error) { console.error('加载物品失败:', error); items = []; }
}

function updateHomeStats() {
    const total = items.length;
    const uniqueCats = new Set(items.map(i => i.category_id).filter(Boolean)).size;
    const uniqueAttrs = new Set(items.flatMap(i => (i.attributes || []).map(a => a.attribute_id))).size;
    document.getElementById('homeStatsTotal').textContent = total;
    document.getElementById('homeStatsCategories').textContent = uniqueCats;
    document.getElementById('homeStatsAttributes').textContent = uniqueAttrs;
}

function updateStats(page) {
    const total = items.length;
    const uniqueCats = new Set(items.map(i => i.category_id).filter(Boolean)).size;
    const uniqueAttrs = new Set(items.flatMap(i => (i.attributes || []).map(a => a.attribute_id))).size;
    document.getElementById(`${page}StatsTotal`).textContent = total;
    document.getElementById(`${page}StatsCategories`).textContent = uniqueCats;
    document.getElementById(`${page}StatsAttributes`).textContent = uniqueAttrs;
}

let sortBy = 'name';
let sortOrder = 'asc';

function updateFilterChips() {
    const container = document.getElementById('homeFilterChips');
    if (!container) return;
    const chips = [];
    if (activeFilter.categories.length) {
        activeFilter.categories.forEach(catId => {
            const cat = categories.find(c => c.id === catId);
            if (cat) chips.push(`<div class="chip">${cat.name}<span class="chip-x" onclick="event.stopPropagation();toggleCategoryFilter(${catId})">✕</span></div>`);
        });
    }
    if (activeFilter.attributes.length) {
        activeFilter.attributes.forEach(attrId => {
            const attr = attributes.find(a => a.id === attrId);
            if (attr) chips.push(`<div class="chip">${attr.name}<span class="chip-x" onclick="event.stopPropagation();toggleAttributeFilter(${attrId})">✕</span></div>`);
        });
    }
    if (activeFilter.keyword) {
        chips.push(`<div class="chip">"${activeFilter.keyword}"<span class="chip-x" onclick="event.stopPropagation();removeKeywordFilter()">✕</span></div>`);
    }
    container.innerHTML = chips.join('');
}

function toggleAttributeFilter(attrId) {
    const f = activeFilter;
    const idx = f.attributes.indexOf(attrId);
    if (idx >= 0) f.attributes.splice(idx, 1);
    else f.attributes.push(attrId);
    loadItems(f);
    updateFilterChips();
}

function clearAllFilters() {
    activeFilter.categories = [];
    activeFilter.attributes = [];
    activeFilter.keyword = '';
    renderSidebarCategories();
    renderFilterCategories();
    renderFilterAttributes();
    const searchInput = document.getElementById('navSearchInput');
    if (searchInput) searchInput.value = '';
    loadItems(activeFilter);
    updateFilterChips();
}

function renderSidebarCategories() {
    const container = document.getElementById('sidebarCategories');
    if (!container) return;
    if (categories.length === 0) {
        container.innerHTML = '<div class="tree-row" style="opacity:0.5;cursor:default;">暂无类别</div>';
        return;
    }
    const catColors = ['#6366F1','#22C55E','#F59E0B','#EF4444','#8B5CF6','#EC4899','#14B8A6','#F97316'];
    let html = `<div class="tree-row ${!homeFilter.categories.length ? 'active' : ''}" onclick="clearHomeCategoryFilter()"><span class="tree-dot"></span>全部</div>`;
    html += categories.map(c => {
        const isSelected = homeFilter.categories.includes(c.id);
        const colorIdx = stringHash(c.name) % 8;
        return `<div class="tree-row ${isSelected ? 'active' : ''}" onclick="toggleHomeCategoryFilter(${c.id})"><span class="tree-dot" style="background:${catColors[colorIdx]}"></span>${c.name}</div>`;
    }).join('');
    container.innerHTML = html;
}

function renderSidebarAttributes() {
    // 侧边栏属性树由 filterOffcanvas 中的 tree-selector 负责
    renderFilterAttributes();
}

function renderFilterCategories() {
    const container = document.getElementById('filterCategories');
    if (!container) return;
    if (categories.length === 0) {
        container.innerHTML = '<div class="tree-row" style="opacity:0.5;cursor:default;">暂无类别</div>';
        return;
    }
    const catColors = ['#6366F1','#22C55E','#F59E0B','#EF4444','#8B5CF6','#EC4899','#14B8A6','#F97316'];
    let html = `<div class="tree-row ${!homeFilter.categories.length ? 'selected' : ''}" onclick="clearHomeCategoryFilter()"><span class="tree-dot"></span>全部类别</div>`;
    html += categories.map(c => {
        const isSelected = homeFilter.categories.includes(c.id);
        const colorIdx = stringHash(c.name) % 8;
        return `<div class="tree-row ${isSelected ? 'selected' : ''}" onclick="toggleHomeCategoryFilter(${c.id})"><span class="tree-dot" style="background:${catColors[colorIdx]}"></span>${c.name}</div>`;
    }).join('');
    container.innerHTML = html;
}

function renderFilterAttributes() {
    const container = document.getElementById('filterAttributes');
    if (!container) return;
    const attrTree = buildTree(attributes);
    if (attrTree.length === 0) {
        container.innerHTML = '<div class="tree-row" style="opacity:0.5;cursor:default;"><svg width="13" height="13" fill="none" viewBox="0 0 24 24" stroke="var(--muted)" stroke-width="2" style="vertical-align:middle;margin-right:4px;"><path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/></svg>暂无属性</div>';
        return;
    }
    container.innerHTML = renderAttrTreeForFilter(attrTree, 0);
}

function renderAttrTreeForFilter(nodes, level) {
    return nodes.map(n => {
        const isSelected = homeFilter.attributes.includes(n.id);
        const hasChildren = n.children && n.children.length > 0;
        const isExpanded = expandedAttrIds.includes(n.id);
        // 一级属性仅作为分组标题，不可被筛选（没有子属性则照常展示）
        const isTopLevel = (level === 0);
        const canSelect = !isTopLevel || !hasChildren;

        return `
        <div>
            <div class="tree-row ${isSelected ? 'selected' : ''}" data-row-id="row-${n.id}" style="padding-left:${24 + level * 16}px">
                <svg width="10" height="10" fill="none" viewBox="0 0 24 24" stroke="var(--sub)" stroke-width="2" style="margin-right:6px;flex-shrink:0;cursor:pointer;" onclick="event.stopPropagation();toggleAttrTreeRow(this.parentElement)">${hasChildren ? (isExpanded ? '<path d="M6 9l6 6 6-6"/>' : '<path d="M12 5l-6 6 6 6"/>') : ''}</svg>
                <svg width="13" height="13" fill="none" viewBox="0 0 24 24" stroke="${isSelected ? 'var(--accent)' : 'var(--sub)'}" stroke-width="2" style="margin-right:6px;flex-shrink:0;"><path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/></svg>
                <span style="flex:1;${isTopLevel && hasChildren ? 'color:var(--ink);font-weight:600;' : ''}">${n.name}${isTopLevel && hasChildren ? '<span style="font-size:11px;color:var(--muted);margin-left:4px;font-weight:normal;">（仅子属性可选）</span>' : ''}</span>
                ${canSelect ? `<input type="checkbox" ${isSelected ? 'checked' : ''} onchange="event.stopPropagation();toggleHomeAttributeFilter(${n.id})" style="width:16px;height:16px;">` : `<span style="color:var(--muted);font-size:12px;">分组</span>`}
            </div>
            ${hasChildren ? `<div class="tree-children" data-parent="row-${n.id}" style="display:${isExpanded ? 'block' : 'none'};">${renderAttrTreeForFilter(n.children, level + 1)}</div>` : ''}
        </div>
        `;
    }).join('');
}

function toggleHomeAttributeFilter(attrId) {
    const idx = homeFilter.attributes.indexOf(attrId);
    if (idx >= 0) homeFilter.attributes.splice(idx, 1);
    else homeFilter.attributes.push(attrId);
    renderFilterAttributes();
    loadItems(homeFilter);
    updateFilterChips();
}

function clearHomeAttributeFilter() {
    homeFilter.attributes = [];
    renderFilterAttributes();
    loadItems(homeFilter);
    updateFilterChips();
}

/** 批量编辑属性对话框：一级属性只做分组/展开，只有二级及以下属性可以被选择 */
function renderBatchAttrTree(nodes, level = 0) {
    return nodes.map(n => {
        const hasChildren = n.children && n.children.length > 0;
        const isExpanded = expandedAttrIds.includes(n.id);
        const isTopLevel = (level === 0);
        const canSelect = !isTopLevel || !hasChildren;
        return `
        <div>
            <div class="tree-row" data-attr-id="${n.id}" style="padding-left:${24 + level * 16}px;${canSelect ? 'cursor:pointer;' : 'cursor:default;'}">
                <svg width="10" height="10" fill="none" viewBox="0 0 24 24" stroke="var(--sub)" stroke-width="2" style="margin-right:6px;flex-shrink:0;cursor:pointer;" onclick="event.stopPropagation();toggleAttrTreeRow(this.parentElement)">${hasChildren ? (isExpanded ? '<path d="M6 9l6 6 6-6"/>' : '<path d="M12 5l-6 6 6 6"/>') : ''}</svg>
                <svg width="13" height="13" fill="none" viewBox="0 0 24 24" stroke="var(--sub)" stroke-width="2" style="margin-right:6px;flex-shrink:0;"><path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/></svg>
                <span style="flex:1;${isTopLevel && hasChildren ? 'color:var(--ink);font-weight:600;' : ''}">${n.name}${isTopLevel && hasChildren ? '<span style="font-size:11px;color:var(--muted);margin-left:4px;font-weight:normal;">（仅子属性可选）</span>' : ''}</span>
                ${canSelect ? `<input type="checkbox" onclick="event.stopPropagation();this.parentElement.classList.toggle('selected',this.checked);" style="width:16px;height:16px;">` : ''}
            </div>
            ${hasChildren ? `<div class="tree-children" data-parent="row-${n.id}" style="display:${isExpanded ? 'block' : 'none'};">${renderBatchAttrTree(n.children, level + 1)}</div>` : ''}
        </div>
        `;
    }).join('');
}

function showBatchEditModal() {
    if (selectedItemIds.length === 0) { showToast('请先选择物品', 'error'); return; }
    document.getElementById('batchEditInfo').textContent = `已选择 ${selectedItemIds.length} 个物品`;
    const container = document.getElementById('batchAttrSelector');
    const attrTree = buildTree(attributes);
    if (attrTree.length === 0) {
        container.innerHTML = '<div class="tree-row" style="opacity:0.5;cursor:default;"><svg width="13" height="13" fill="none" viewBox="0 0 24 24" stroke="var(--muted)" stroke-width="2" style="vertical-align:middle;margin-right:4px;"><path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/></svg>暂无属性</div>';
    } else {
        container.innerHTML = renderBatchAttrTree(attrTree, 0);
    }
    new bootstrap.Modal(document.getElementById('batchEditModal')).show();
}

async function batchUpdateAttrs(action) {
    // 只有非顶级属性（有父节点）才能被选中，避免用户误选一级属性
    const selectedAttrIds = Array.from(document.querySelectorAll('#batchAttrSelector .tree-row.selected'))
        .map(el => parseInt(el.dataset.attrId))
        .filter(id => {
            const attr = attributes.find(a => a.id === id);
            return attr && attr.parent_id !== null && attr.parent_id !== undefined;
        });
    if (selectedAttrIds.length === 0) { showToast('请选择至少一个二级及以下属性', 'error'); return; }
    if (selectedItemIds.length === 0) { showToast('请先选择物品', 'error'); return; }
    showLoading();
    const result = await api('/items/batch-attributes', {
        method: 'POST',
        body: { item_ids: selectedItemIds, attribute_ids: selectedAttrIds, action }
    });
    hideLoading();
    if (result.success) {

let expandedAttrIds = [];

function renderAttributeTree() {
    const tree = document.getElementById('attributeTree');
    const attrTree = buildTree(attributes);
    if (attrTree.length === 0) { tree.innerHTML = '<div style="color:var(--muted);font-size:12px;text-align:center;padding:20px;display:flex;align-items:center;justify-content:center;gap:6px;"><svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/></svg>暂无属性</div>'; return; }
    tree.innerHTML = renderTreeNodes(attrTree, 'handleAttributeAction', 0);
    expandedAttrIds.forEach(id => {
        const row = document.querySelector(`[data-row-id="row-${id}"]`);
        if (row) {
            const children = row.parentElement.querySelector(':scope > .tree-children');
            if (children) children.style.display = 'block';
        }
    });
}

function toggleAttrTreeRow(el) {
    const rowId = el.getAttribute('data-row-id');
    const itemId = rowId ? parseInt(rowId.replace('row-', '')) : null;
    const children = el.parentElement.querySelector(':scope > .tree-children');
    if (!children) return;
    const isExpanded = children.style.display !== 'none';
    children.style.display = isExpanded ? 'none' : 'block';
    if (itemId) {
        const idx = expandedAttrIds.indexOf(itemId);
        if (isExpanded) { if (idx >= 0) expandedAttrIds.splice(idx, 1); }
        else { if (idx < 0) expandedAttrIds.push(itemId); }
    }
}

function buildTree(flatList) {
    const map = {};
    const roots = [];
    flatList.forEach(a => { map[a.id] = { ...a, children: [] }; });
    flatList.forEach(a => { if (a.parent_id && map[a.parent_id]) map[a.parent_id].children.push(map[a.id]); else roots.push(map[a.id]); });
    return roots;
}

function renderTreeNodes(nodes, actionHandler, level = 0, rootIndex = 0) {
    return nodes.map((n, idx) => {
        const rootIdx = level === 0 ? idx : rootIndex;
        const altClass = level === 0 && rootIdx % 2 === 1 ? ' style="background:var(--surface)"' : '';
        return `
        <div>
            <div class="tree-row" onclick="toggleAttrTreeRow(this)" data-row-id="row-${n.id}"${altClass} style="cursor:pointer;padding-left:${24 + level * 16}px">
                <svg width="10" height="10" fill="none" viewBox="0 0 24 24" stroke="var(--sub)" stroke-width="2" style="margin-right:6px;flex-shrink:0;">${n.children.length ? (expandedAttrIds.includes(n.id) ? '<path d="M6 9l6 6 6-6"/>' : '<path d="M12 5l-6 6 6 6"/>') : ''}</svg>
                <svg width="13" height="13" fill="none" viewBox="0 0 24 24" stroke="var(--accent)" stroke-width="2" style="margin-right:6px;flex-shrink:0;"><path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/></svg>
                <span style="font-weight:${level === 0 ? 600 : 400}">${n.name}</span>
                <div style="margin-left:auto;display:flex;gap:4px;">
                    <button class="btn-xs" onclick="event.stopPropagation();${actionHandler}(${n.id},'edit')"><svg width="11" height="11" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button>
                    <button class="btn-xs" onclick="event.stopPropagation();${actionHandler}(${n.id},'add')"><svg width="11" height="11" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></button>
                    <button class="btn-xs btn-danger" onclick="event.stopPropagation();${actionHandler}(${n.id},'delete')"><svg width="11" height="11" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><polyline points="3,6 5,6 21,6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg></button>
                </div>
            </div>
            ${n.children.length ? `<div class="tree-children" data-parent="row-${n.id}" style="display:${expandedAttrIds.includes(n.id) ? 'block' : 'none'};">${renderTreeNodes(n.children, actionHandler, level + 1, rootIdx)}</div>` : ''}
        </div>
        `;
    }).join('');
}

function navigateTo(page) {
    document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
    document.querySelectorAll('.sb-item').forEach(m => m.classList.remove('active'));
    const pageEl = document.getElementById('page' + page.charAt(0).toUpperCase() + page.slice(1));
    if (pageEl) pageEl.style.display = 'block';
    const menuItem = document.querySelector(`.sb-item[data-page="${page}"]`);
    if (menuItem) menuItem.classList.add('active');
    const fabBtn = document.getElementById('fabButton');
    if (fabBtn) fabBtn.style.display = page === 'home' ? 'flex' : 'none';
    if (page !== 'home') {
        homeFilter.categories = []; homeFilter.attributes = []; homeFilter.keyword = '';
        const homeSearch = document.getElementById('navSearchInput');
        if (homeSearch) homeSearch.value = '';
    }
    activeFilter = homeFilter;
    if (page === 'categories') renderCategoryList();
    else if (page === 'attributes') renderAttributeTree();
    else if (page === 'home') { renderCategorySelectors(); loadItems(homeFilter); updateFilterChips(); }
    else if (page === 'settings') {
        if (currentUser) document.getElementById('settingsUsername').value = currentUser.username || '';
    }
    closeSidebar();
}

async function loadTemplateAttributes() {
    const templateId = document.getElementById('templateSelect').value;
    if (!templateId) { document.getElementById('attributeSelector').innerHTML = '<p style="color:var(--muted);font-size:12px;text-align:center;padding:20px;">请先选择类别模板</p>'; return; }
    currentTemplateId = templateId;
    showLoading();
    const categoryOption = document.getElementById('templateSelect').selectedOptions[0];
    const categoryId = categoryOption.dataset.categoryId;
    const result = await api(`/categories/${categoryId}/template`);
    hideLoading();
    if (result.success && result.data.attributes) {
        const attrs = result.data.attributes;
        const container = document.getElementById('attributeSelector');
        const grouped = {};
        attrs.forEach(a => {
            const groupName = a.category_name || '未分类';
            if (!grouped[groupName]) grouped[groupName] = [];
            grouped[groupName].push(a);
        });
        container.innerHTML = Object.entries(grouped).map(([catName, items]) => `
            <div class="attr-group">
                <div class="attr-group-header">${catName}</div>
                <div class="attr-group-items show">
                    ${items.map(a => `<div class="attr-item" data-attr-id="${a.id}" onclick="toggleAttrSelection(this,${a.id})">${a.name || a.attribute_name || '未命名'}${a.is_required ? ' <span style="color:var(--danger)">*</span>' : ''}</div>`).join('')}
                </div>
            </div>
        `).join('');
    }
}

let selectedAttrIds = [];
function toggleAttrSelection(el, attrId) {
    el.classList.toggle('selected');
    const idx = selectedAttrIds.indexOf(attrId);
    if (idx >= 0) selectedAttrIds.splice(idx, 1);
    else selectedAttrIds.push(attrId);
}

async function handleImageSelect(event) {
    const file = event.target.files[0];
    if (!file) return;
    try {
        const options = { maxSizeMB: 1, maxWidthOrHeight: 1200 };
        const compressedFile = await imageCompression(file, options);
        const formData = new FormData();
        formData.append('file', compressedFile);
        showLoading();
        const result = await api('/upload', { method: 'POST', body: formData });
        hideLoading();
        if (result.success) {
            currentItemImages = [result.filename];
            const zone = document.getElementById('imageUploadZone');
            zone.innerHTML = `<img src="/uploads/${result.filename}" alt="预览">`;
            zone.classList.add('has-image');
        } else showToast(result.message || '上传失败', 'error');
    } catch (error) { hideLoading(); console.error('图片处理失败:', error); showToast('图片处理失败', 'error'); }
}

async function saveItem() {
    const name = document.querySelector('#itemForm input[name="name"]').value.trim();
    const remark = document.querySelector('#itemForm textarea[name="remark"]').value.trim();
    if (!name) { showToast('请输入物品名称', 'error'); return false; }
    if (!currentItemImages.length) { showToast('请上传图片', 'error'); return false; }
    const templateId = document.getElementById('templateSelect').value;
    if (!templateId) { showToast('请选择类别', 'error'); return false; }
    showLoading();
    const body = { name, remark, template_id: templateId, images: currentItemImages[0], attribute_ids: selectedAttrIds };
    let result;
    if (currentItemId) result = await api(`/items/${currentItemId}`, { method: 'PUT', body });
    else result = await api('/items', { method: 'POST', body });
    hideLoading();
    if (result.success) {
        showToast(currentItemId ? '物品已更新' : '物品已添加', 'success');
        bootstrap.Modal.getInstance(document.getElementById('itemModal')).hide();
        loadItems();
    } else showToast(result.message, 'error');
    return result.success;
}

async function saveItemAndContinue() {
    keepAdding = true;
    if (await saveItem()) {
        selectedAttrIds = [];
        currentItemImages = [];
        document.getElementById('itemForm').reset();
        document.getElementById('imageUploadZone').innerHTML = `<svg width="32" height="32" fill="none" viewBox="0 0 24 24" stroke="var(--muted)" stroke-width="1.5"><path d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2 1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg><p style="color:var(--muted);font-size:12px;margin-top:8px;">点击上传图片</p>`;
        document.getElementById('imageUploadZone').classList.remove('has-image');
        selectedAttrIds = [];
        loadTemplateAttributes();
    }
    keepAdding = false;
}

function editItem(itemId) {
    const item = items.find(i => i.id === itemId);
    if (!item) return;
    currentItemId = itemId;
    currentItemImages = item.images ? [item.images] : [];
    currentTemplateId = item.template_id;
    selectedAttrIds = (item.attributes || []).map(a => a.attribute_id);
    document.getElementById('itemModalTitle').textContent = '编辑物品';
    document.querySelector('#itemForm input[name="name"]').value = item.name;
    document.querySelector('#itemForm textarea[name="remark"]').value = item.remark || '';
    document.getElementById('templateSelect').value = item.template_id || '';
    if (item.images) {
        const zone = document.getElementById('imageUploadZone');
        zone.innerHTML = `<img src="/uploads/${item.images}" alt="预览">`;
        zone.classList.add('has-image');
    }
    loadTemplateAttributes();
    document.getElementById('saveAndContinueBtn').style.display = 'none';
    new bootstrap.Modal(document.getElementById('itemModal')).show();
}

async function deleteItem(itemId) {
    if (!confirm('确定要删除这个物品吗？')) return;
    showLoading();
    const result = await api(`/items/${itemId}`, { method: 'DELETE' });
    hideLoading();
    if (result.success) { showToast('物品已删除', 'success'); loadItems(); }
    else showToast(result.message, 'error');
}

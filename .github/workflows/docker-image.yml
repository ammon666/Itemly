name: Build and Push Docker Image

# 触发条件：
#   - push 到 main 分支
#   - 打 v* 标签（例如 v1.0.0）
#   - 手动在 Actions 页面触发（workflow_dispatch）
on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}   # 例如 your-name/itemly（自动小写）

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # 向 GHCR 推送镜像需要

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v5

      - name: Log in to GHCR
        uses: docker/login-action@v5
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          # 生成的 tag：
          #   - main 分支 -> latest
          #   - v* 标签   -> 对应版本号（例如 v1.0.0）
          #   - 任何提交  -> sha-<short sha>
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=sha-

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # 利用 GitHub Actions 缓存加速后续构建
          cache-from: type=gha
          cache-to: type=gha,mode=max
